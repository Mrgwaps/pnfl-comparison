                border:`2px solid ${active?'#ffd700':'#2d5a2d'}`,
                background:active?'rgba(255,215,0,0.07)':'rgba(13,40,24,0.5)',
                transition:'all 0.2s'
              }}>
              <div style={{
                width:'20px',height:'20px',borderRadius:'50%',flexShrink:0,
                border:`3px solid ${active?'#ffd700':'#3a6a3a'}`,
                background:active?'#ffd700':'transparent',
                display:'flex',alignItems:'center',justifyContent:'center'
              }}>
                {active && <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#1a2e1a'}}/>}
              </div>
              <div>
                <div style={{fontFamily:'Orbitron',fontWeight:'700',fontSize:'0.88rem',color:active?'#ffd700':'#d0d0d0',letterSpacing:'0.5px'}}>{opt.label}</div>
                <div style={{fontSize:'0.78rem',color:'#608060',fontFamily:'Roboto Condensed',marginTop:'2px'}}>{opt.desc}</div>
              </div>
              {opt.value==='AO' && <div style={{marginLeft:'auto',fontSize:'0.65rem',color:'#5a8a6a',fontFamily:'Orbitron',letterSpacing:'1px',border:'1px solid #2d5a2d',borderRadius:'3px',padding:'2px 6px'}}>DEFAULT</div>}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:'14px',padding:'10px 14px',background:'rgba(74,158,255,0.06)',border:'1px solid rgba(74,158,255,0.2)',borderRadius:'6px',fontSize:'0.78rem',color:'#4a9eff',fontFamily:'Roboto Condensed'}}>
        <strong>Note:</strong> I and IR players can be activated before game day — use <em>All Slots</em> to reflect true depth and talent potential.
      </div>
    </div>
  );
}

function WeightsPanel({ weights, onWeightsChange }) {
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(weights)));
  const handle=(pos,attr,val)=>{const n=Math.max(0,Math.min(10,parseInt(val)||0));setLocal(p=>({...p,[pos]:{...p[pos],[attr]:n}}));};
  const apply=()=>{onWeightsChange(local);saveWeights(local);};
  const reset=()=>{const d=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));setLocal(d);onWeightsChange(d);saveWeights(d);};
  const preset=(p)=>{
    const base=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));
    if(p==='balanced'){Object.keys(base).forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:2,HA:2,EN:2,IN:2,DI:2});}
    else if(p==='speed'){Object.keys(base).forEach(pos=>base[pos]={SP:4,AC:3,AG:2,ST:1,HA:2,EN:1,IN:1,DI:1});}
    else if(p==='trench'){['C','G','T'].forEach(pos=>base[pos]={SP:1,AC:1,AG:2,ST:4,HA:1,EN:4,IN:3,DI:3});['DE','DT'].forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:4,HA:2,EN:3,IN:1,DI:3});}
    setLocal(base);
  };
  return (
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'20px',color:'#a0d2a0'}}>Adjust weights (0-10) per attribute/position. Higher = more important.</div>
      <div className="position-weights">
        {Object.entries(local).map(([pos,attrs])=>(
          <div className="position-card" key={pos}>
            <h4>{POSITION_DISPLAY[pos]||pos}</h4>
            {ATTRIBUTES.map(attr=>(
              <div className="weight-row" key={attr}>
                <label>{attr}</label>
                <input type="number" min="0" max="10" value={attrs[attr]} onChange={e=>handle(pos,attr,e.target.value)}/>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="button-group">
        <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
        <button className="btn-secondary" onClick={reset}>↺ Reset</button>
        <button className="btn-secondary" onClick={()=>preset('balanced')}>⚖️ Balanced</button>
        <button className="btn-secondary" onClick={()=>preset('speed')}>⚡ Speed</button>
        <button className="btn-secondary" onClick={()=>preset('trench')}>🏋️ Trench</button>
      </div>
    </div>
  );
}

// ── Team Selector ──
function TeamSelector({ selectedTeams, onTeamsChange }) {
  const handle=(e,idx)=>{const t=[...selectedTeams];t[idx]=e.target.value;onTeamsChange(t);};
  const add=()=>{if(selectedTeams.length<4)onTeamsChange([...selectedTeams,'']);};
  const remove=(idx)=>onTeamsChange(selectedTeams.filter((_,i)=>i!==idx));
  return (
    <div className="control-group">
      <label>🏈 Select Teams (2-4)</label>
      {selectedTeams.map((team,idx)=>(
        <div key={idx} className="team-select-container">
          <div className="team-select-wrapper">
            <TeamLogo teamName={team} size="small"/>
            <select value={team} onChange={e=>handle(e,idx)}>
              <option value="">-- Select Team --</option>
              {[...TEAM_NAMES].sort().map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            {selectedTeams.length>2&&(
              <button type="button" onClick={()=>remove(idx)} className="btn-danger btn-small" style={{width:'35px',padding:'8px'}}>✕</button>
            )}
          </div>
        </div>
      ))}
      {selectedTeams.length<4&&(
        <button type="button" onClick={add} className="btn-secondary" style={{marginTop:'10px',width:'100%'}}>+ Add Team</button>
      )}
      <div className="helper-text">Compare 2–4 teams. ✓ marks position winner.</div>
    </div>
  );
}

// ── Comparison Table ──
function ComparisonTable({ teams, data, contractData }) {
  const [expandedPos, setExpandedPos] = useState(null);
  const [lightbox, setLightbox] = useState(null); // {player, position, teamName}
  if (!data||teams.length<2) return null;
  const togglePos=(pos)=>setExpandedPos(prev=>prev===pos?null:pos);

  // Player drill-down row
  const STATUS_COLOR={'A':'#4aff4a','O':'#ffd700','I':'#ff9944','IR':'#ff4444'};
  const STATUS_BG={'A':'rgba(74,255,74,0.1)','O':'rgba(255,215,0,0.1)','I':'rgba(255,153,68,0.08)','IR':'rgba(255,68,68,0.08)'};
  const renderDrillDown=(pos)=>{
    const wts=data.weights||DEFAULT_WEIGHTS;
    return(
    <tr key={`drill_${pos}`}>
      <td colSpan={teams.length+1} style={{padding:'0',background:'rgba(0,0,0,0.0)'}}>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${teams.length},1fr)`,gap:'0',margin:'0 0 4px 0',borderTop:'1px solid rgba(255,215,0,0.15)'}}>
          {teams.map((team,ti)=>{
            const td=data.rosterData&&data.rosterData[team]||{};
            const allPlayers=(td[pos]||[]);
            const scored=allPlayers.map(p=>({...p,ws:calculatePlayerScore(p.attrs,pos,wts)}))
              .sort((a,b)=>{
                const so={'A':0,'O':1,'I':2,'IR':3};
                const sd=(so[a.status]||0)-(so[b.status]||0);
                return sd!==0?sd:b.ws-a.ws;
              });
            const maxWs=scored.length?Math.max(...scored.map(p=>p.ws)):100;
            const minWs=scored.length?Math.min(...scored.map(p=>p.ws)):60;
            const range=Math.max(maxWs-minWs,1);
            return(
              <div key={team} style={{background:ti%2===0?'rgba(8,18,35,0.97)':'rgba(12,28,20,0.97)',padding:'10px 12px',borderRight:ti<teams.length-1?'1px solid rgba(45,90,45,0.3)':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',paddingBottom:'6px',borderBottom:'1px solid rgba(255,215,0,0.2)'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <span style={{fontFamily:'Orbitron',fontSize:'0.78rem',color:'#ffd700',fontWeight:'700'}}>{team}</span>
                  <span style={{marginLeft:'auto',fontSize:'0.68rem',color:'#608060',fontFamily:'Orbitron'}}>{scored.length} players</span>
                </div>
                {scored.length===0
                  ?<div style={{color:'#608060',fontStyle:'italic',fontSize:'0.8rem',padding:'8px 0'}}>No players</div>
                  :scored.map((p,i)=>{
                    const barPct=Math.round(((p.ws-minWs)/range)*100);
                    const isIR=p.status==='IR';
                    const isI=p.status==='I';
                    return(
                      <div key={i}
                        onClick={()=>{playSound('click');haptic('light');setLightbox({player:p,position:pos,teamName:team});}}
                        className="haptic-btn"                        style={{padding:'5px 0',borderBottom:'1px solid rgba(45,90,45,0.15)',opacity:isIR?0.55:isI?0.75:1,cursor:'pointer',transition:'background 0.1s',borderRadius:'4px'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(74,158,255,0.08)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                      >
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',marginBottom:'3px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'5px',minWidth:0,flex:1}}>
                            <span style={{
                              color:STATUS_COLOR[p.status]||'#aaa',
                              background:STATUS_BG[p.status]||'transparent',
                              fontSize:'0.58rem',fontWeight:'900',minWidth:'18px',textAlign:'center',
                              border:`1px solid ${STATUS_COLOR[p.status]||'#aaa'}44`,
                              borderRadius:'3px',padding:'1px 3px',letterSpacing:'0.3px',flexShrink:0
                            }}>{p.status}</span>
                            {p.num&&<span style={{color:'#4a6a6a',fontSize:'0.7rem',flexShrink:0}}>#{p.num}</span>}
                            <span style={{color:isIR?'#888':isI?'#aaa':'#d0ecd0',fontSize:'0.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                            <span style={{color:isIR?'#888':'#4a9eff',fontWeight:'700',fontFamily:'Orbitron',fontSize:'0.8rem'}} title="Click for player card">{p.ws.toFixed(1)}</span>
                            <span style={{color:'#3a6a8a',fontSize:'0.6rem'}}>ℹ</span>
                          </div>
                        </div>
                        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:'2px',height:'3px',overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${barPct}%`,background:isIR?'#555':isI?'#888':i===0?'#ffd700':'#4a9eff',borderRadius:'2px',transition:'width 0.4s ease'}}/>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
            );
          })}
        </div>
      </td>
    </tr>
    );
  };

  const renderScoreRow=(label,scores,isGroupTotal=false,isUnitTotal=false,indent=false,pos=null)=>{
    const nums=scores.map(s=>parseFloat(s));
    const validNums=nums.filter(s=>!isNaN(s));
    const max=validNums.length?Math.max(...validNums):-Infinity;
    const tie=nums.filter(s=>s===max&&!isNaN(s)).length>1;
    let rowStyle={};
    if(isUnitTotal) rowStyle={fontWeight:'bold',background:label.includes('OFFENSE')?'rgba(42,157,143,0.28)':'rgba(220,50,60,0.28)'};
    else if(isGroupTotal) rowStyle={fontWeight:'bold',background:'rgba(255,215,0,0.08)',borderTop:'2px solid rgba(255,215,0,0.3)'};
    const isClickable=pos&&!isGroupTotal&&!isUnitTotal;
    const isExpanded=expandedPos===pos;
    if(isClickable&&rowStyle.background===undefined) rowStyle.cursor='pointer';
    return (
      <tr key={label} style={rowStyle}
        onClick={isClickable?()=>togglePos(pos):undefined}
        onMouseEnter={isClickable?e=>{e.currentTarget.style.background='rgba(45,90,45,0.25)';}:undefined}
        onMouseLeave={isClickable?e=>{e.currentTarget.style.background=rowStyle.background||'';}:undefined}>
        <td style={{paddingLeft:indent?'28px':'15px',color:indent?'#c0d8c0':isGroupTotal?'#ffd700':'#fff',fontSize:indent?'0.88rem':'0.95rem'}}>
          {indent&&<span style={{color:'#4a7c4a',marginRight:'6px'}}>└</span>}
          {label}
          {isClickable&&<span style={{fontSize:'0.68rem',color:'#4a7c4a',marginLeft:'6px',fontStyle:'italic'}}>{isExpanded?'▲ hide':'▼ players'}</span>}
        </td>
        {teams.map((team,i)=>{
          const isWinner=nums[i]===max&&!isNaN(nums[i])&&!tie;
          return(
            <td key={`${team}-${label}`} className={isWinner?'score-cell':''} style={{fontSize:indent?'0.9rem':'0.95rem'}}>
              {scores[i]}{isWinner&&<span className="advantage">✓</span>}
            </td>
          );
        })}
      </tr>
    );
  };
  const renderGroupHeader=(label,color)=>(
    <tr key={`hdr_${label}`} style={{background:'rgba(0,0,0,0.4)'}}>
      <td colSpan={teams.length+1} style={{padding:'8px 15px 5px',fontFamily:'Orbitron,sans-serif',fontSize:'0.8rem',fontWeight:'700',color,letterSpacing:'2px',textTransform:'uppercase',borderBottom:`2px solid ${color}33`}}>
        {label}
      </td>
    </tr>
  );
  const thStyle={display:'flex',alignItems:'center',gap:'8px'};
  const offenseRows=[];
  ['QB','HB','FB','TE','WR'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderGroupHeader('── Offensive Line ──','#4a9eff'));
  OL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderScoreRow('OL Group Total',teams.map(t=>data.teams[t]?.offensePositions['OL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['K','P'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  const defenseRows=[];
  defenseRows.push(renderGroupHeader('── Defensive Line ──','#ff6b6b'));
  DL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  defenseRows.push(renderScoreRow('DL Group Total',teams.map(t=>data.teams[t]?.defensePositions['DL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['LB','CB','S'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  return (
    <div className="card full-width">
      {lightbox && (
        <PlayerLightbox
          player={lightbox.player}
          position={lightbox.position}
          teamName={lightbox.teamName}
          allTeamsRosterData={data.rosterData}
          contractData={contractData}
          onClose={()=>setLightbox(null)}
        />
      )}
      <h3 className="card-title">📊 Position Comparison <span style={{fontSize:'0.7rem',color:'#608060',fontWeight:'400',letterSpacing:'0',textTransform:'none'}}>· click any row for player breakdown · click player for card</span></h3>
      <h4 style={{margin:'20px 0 12px',color:'#4a9eff',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔵 OFFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{offenseRows}{renderScoreRow('🔵 OFFENSE TOTAL',teams.map(t=>data.teams[t]?.offenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <h4 style={{margin:'25px 0 12px',color:'#ff6b6b',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔴 DEFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{defenseRows}{renderScoreRow('🔴 DEFENSE TOTAL',teams.map(t=>data.teams[t]?.defenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <div style={{marginTop:'25px',padding:'20px',background:'rgba(0,0,0,0.3)',borderRadius:'12px',border:'2px solid #2d5a2d'}}>
        <h4 style={{marginBottom:'15px',fontFamily:'Orbitron',color:'#ffd700',fontSize:'1.3rem'}}>🏆 OVERALL TEAM RANKINGS</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'15px'}}>
          {teams.map(team=>{
            const isWinner=data.overall.winner===team;
            return(
              <div key={team} style={{padding:'18px',borderRadius:'12px',
                background:isWinner?'linear-gradient(135deg,#2d5a2d,#1a3a1a)':'rgba(0,0,0,0.3)',
                border:isWinner?'3px solid #ffd700':'2px solid #2d5a2d',
                color:isWinner?'#fff':'#a0d2a0',textAlign:'center',
                boxShadow:isWinner?'0 0 20px rgba(255,215,0,0.4)':'none',
                transform:isWinner?'scale(1.05)':'scale(1)',transition:'all 0.3s'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'10px'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <div style={{fontWeight:'bold',fontSize:'1.1rem',fontFamily:'Orbitron'}}>{isWinner&&'👑 '}{team}</div>
                </div>
                <div style={{fontSize:'2.2rem',fontWeight:'900',fontFamily:'Orbitron',color:isWinner?'#ffd700':'#4a9eff'}}>
                  {data.teams[team]?.overallScore?.toFixed(1)}
                </div>
                <div style={{fontSize:'0.9rem',opacity:isWinner?1:0.7,marginTop:'5px'}}>Overall Score</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Charts ──
const TEAM_CHART_COLORS = [
  {border:'#4a9eff', bg:'rgba(74,158,255,0.15)'},
  {border:'#ffd700', bg:'rgba(255,215,0,0.15)'},
  {border:'#ff6b6b', bg:'rgba(255,107,107,0.15)'},
  {border:'#69BE28', bg:'rgba(105,190,40,0.15)'},
];

function ChartsPanel({ teams, data }) {
  const radarRef=useRef(null); const radarChart=useRef(null);
  const barRef=useRef(null);   const barChart=useRef(null);
  const hbarRef=useRef(null);  const hbarChart=useRef(null);
  const [activeChart, setActiveChart]=useState('radar');

  const buildData=()=>{
    if(!data||teams.length<2) return null;
    // Position scores for bar charts — all positions
    const allPos=[...POSITION_GROUPS.offense,...POSITION_GROUPS.defense];
    const posLabels=allPos.map(p=>POSITION_DISPLAY[p]||p);
    // Attribute averages for radar
    const attrScores=teams.map(team=>{
      const td=data.rosterData[team]||{};
      return ATTRIBUTES.map((_,ai)=>{
        let total=0,count=0;
        Object.values(td).forEach(players=>players.forEach(p=>{total+=p.attrs[ai];count++;}));
        return count>0?total/count:70;
      });
    });
    // Unit scores
    const unitLabels=['Offense','OL Group','DL Group','Defense','LB','CB','S'];
    const unitScores=teams.map(team=>[
      data.teams[team]?.offenseScore||0,
      data.teams[team]?.offensePositions?.OL_TOTAL||0,
      data.teams[team]?.defensePositions?.DL_TOTAL||0,
      data.teams[team]?.defenseScore||0,
      data.teams[team]?.defensePositions?.LB||0,
      data.teams[team]?.defensePositions?.CB||0,
      data.teams[team]?.defensePositions?.S||0,
    ]);
    // Position group scores for grouped bar
    const posScores=teams.map(team=>allPos.map(pos=>{
      const v=data.teams[team]?.offensePositions?.[pos]??data.teams[team]?.defensePositions?.[pos]??null;
      return v!==null?parseFloat(v.toFixed(1)):0;
    }));
    return {posLabels,posScores,attrScores,unitLabels,unitScores};
  };

  useEffect(()=>{
    if(!data||teams.length<2) return;
    const d=buildData();
    if(!d) return;
    Chart.defaults.color='#a0d2a0';
    Chart.defaults.borderColor='#2d5a2d';

    // Destroy all first
    [radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});

    // ── Radar: attribute averages ──
    if(radarRef.current&&activeChart==='radar'){
      radarChart.current=new Chart(radarRef.current.getContext('2d'),{
        type:'radar',
        data:{labels:ATTRIBUTES,datasets:teams.map((team,i)=>({
          label:team,data:d.attrScores[i],
          borderColor:TEAM_CHART_COLORS[i].border,backgroundColor:TEAM_CHART_COLORS[i].bg,
          borderWidth:2,pointRadius:4,pointHoverRadius:6
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{r:{angleLines:{color:'rgba(45,90,45,0.5)'},grid:{color:'rgba(45,90,45,0.3)'},
            pointLabels:{font:{size:11,weight:'700',family:'Orbitron'},color:'#ffd700'},
            ticks:{stepSize:5,backdropColor:'transparent',color:'#a0d2a0'},min:60,max:100}},
          plugins:{legend:{position:'bottom',labels:{padding:20,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.r?.toFixed(1)}`}}}}
      });
    }

    // ── Grouped Bar: position scores ──
    if(barRef.current&&activeChart==='bar'){
      barChart.current=new Chart(barRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.posLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.posScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.7'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.2)'},ticks:{font:{family:'Orbitron',size:9},color:'#a0d2a0',maxRotation:45}},
            y:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100,title:{display:true,text:'Score',color:'#608060'}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(1)}`}}}}
      });
    }

    // ── Horizontal Bar: unit comparison ──
    if(hbarRef.current&&activeChart==='units'){
      hbarChart.current=new Chart(hbarRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.unitLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.unitScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.75'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100},
            y:{grid:{color:'rgba(45,90,45,0.1)'},ticks:{color:'#ffd700',font:{family:'Orbitron',size:10}}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x?.toFixed(1)}`}}}}
      });
    }

    return ()=>[radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});
  },[teams,data,activeChart]);

  if(!data||teams.length<2){
    return(
      <div className="card full-width">
        <h3 className="card-title">📈 Visual Analysis</h3>
        <div className="loading">Select 2+ teams and run comparison to see charts</div>
      </div>
    );
  }

  const tabBtn=(id,label)=>(
    <button className={activeChart===id?'active btn-primary':'btn-secondary'}
      onClick={()=>setActiveChart(id)} style={{padding:'8px 16px',fontSize:'0.9rem'}}>{label}</button>
  );

  return(
    <div className="card full-width">
      <h3 className="card-title">📈 Visual Analysis</h3>
      {/* Team logo header */}
      <div style={{display:'flex',justifyContent:'center',gap:'24px',marginBottom:'18px',flexWrap:'wrap',alignItems:'center',padding:'12px 16px',background:'rgba(0,0,0,0.2)',borderRadius:'10px',border:'1px solid #2d5a2d'}}>
        {teams.map((team,i)=>(
          <div key={team} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
            <div style={{
              padding:'4px',borderRadius:'10px',
              border:`2px solid ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}`,
              background:'rgba(0,0,0,0.3)',
              filter:`drop-shadow(0 0 8px ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}55)`
            }}>
              <TeamLogo teamName={team} size="medium"/>
            </div>
            <div style={{fontFamily:'Orbitron',fontWeight:'700',fontSize:'0.75rem',color:TEAM_CHART_COLORS[i]?.border||'#ffd700',letterSpacing:'0.5px',textAlign:'center'}}>{team}</div>
          </div>
        ))}
      </div>
      <div className="chart-toggle" style={{marginBottom:'20px'}}>
        {tabBtn('radar','🕷️ Attributes Radar')}
        {tabBtn('bar','📊 Position Scores')}
        {tabBtn('units','↔ Unit Comparison')}
      </div>
      {activeChart==='radar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Average attribute ratings across each team's full active roster. Higher = better.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={radarRef}></canvas></div>
        </div>
      )}
      {activeChart==='bar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Weighted position group scores for every position — side by side.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={barRef}></canvas></div>
        </div>
      )}
      {activeChart==='units'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Horizontal comparison of key unit scores — instantly see where each team dominates.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={hbarRef}></canvas></div>
        </div>
      )}
    </div>
  );
}

// ── Player Lightbox ──
function PlayerLightbox({ player, position, teamName, allTeamsRosterData, contractData, onClose }) {
  if (!player || !position) return null;
  const [aiQuery, setAiQuery] = useState('');
  const [aiResponse, setAiResponse] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiReady, setAiReady] = useState(() => !!(window.pnflAI && window.pnflAI.isReady && window.pnflAI.isReady()));
  const [showAIModal, setShowAIModal] = useState(false);
  const aiResponseRef = React.useRef('');

  const askAI = async () => {
    if (!aiQuery.trim() || !window.pnflAI?.isReady?.()) return;
    setAiLoading(true);
    setAiResponse('');
    aiResponseRef.current = '';
    try {
      const liveCtx = window.pnflDB?._ready ? window.pnflDB.buildPlayerPrompt(player.name, teamName) : '' || '';

      const systemPrompt = `You are a PNFL digital analyst for a fantasy football simulation game set in 2048. CRITICAL RULES:
1. NEVER reference real NFL salaries, contracts, or real-world stats. This is a simulation game.
2. ONLY use the PNFL data provided below. If data is missing, say so clearly.
3. Contract value = PNFL contract data only (years, salary from contract file).
4. Be specific with numbers. Answer in 3-4 sentences max.

${liveCtx}`;

      const contract = lookupContract(contractData, player.name, player.num);
      const userMsg = `=== PLAYER CARD DATA ===
Name: ${player.name} | Team: ${teamName} | Position: ${POSITION_DISPLAY[position]||position} | Status: ${player.status}
Attributes (SP/AC/AG/ST/HA/EN/IN/DI): ${player.attrs.join('/')} actual | ${pattrs.join('/')} potential
Development: ${actualTotal}/${playerPotentialTotal} total (${pctOfMax}% developed) | ${maxedCount}/8 attrs maxed
League rank at ${POSITION_DISPLAY[position]||position}: #${leagueRank} of ${leagueTotal}
PNFL Contract: ${contract
  ? `${contract.contractLength} years (${contract.contractStart}-${contract.contractEnd}) | Salary: ${contract.currentSalary ? fmtSalary(contract.currentSalary)+'/yr' : 'not in file'} | Years remaining: ${contract.yearsLeft} | Draft: ${contract.draftSlot||'N/A'}`
  : 'Contract not loaded — click Core Data button to load contract file'}

=== QUESTION ===
${aiQuery}`;

      await window.pnflAI.ask(systemPrompt, userMsg, 200,
        (partial) => { aiResponseRef.current = partial; setAiResponse(partial); }
      );
    } catch(e) {
      setAiResponse('⚠ ' + e.message);
    }
    setAiLoading(false);
    // Speak the completed response if voice is enabled
    const finalText = aiResponseRef.current;
    if (finalText && !finalText.startsWith('⚠') && window.pnflVoice?.isEnabled?.()) {
      window.pnflVoice.speakPlayer(player.name, teamName, finalText);
    }
  };

  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  // Validate pattrs: must have 8 values all in realistic attribute range (40-99)
  const pattrsValid = player.pattrs
    && player.pattrs.length === 8
    && player.pattrs.every(v => Number.isInteger(v) && v >= 40 && v <= 99);
  const pattrs = pattrsValid ? player.pattrs : pMax;
  const hasPattrs = !!pattrsValid;

  const actualTotal = player.attrs.reduce((s,v)=>s+v,0);
  const playerPotentialTotal = pattrs.reduce((s,v)=>s+v,0);
  const potentialTotal = pMax.reduce((s,v)=>s+v,0);
  // % of player's own potential (not position max)
  const pctOfPlayerPotential = Math.round((actualTotal / playerPotentialTotal) * 100);
  // Count how many attrs are at or above the player's potential ceiling
  const maxedCount = player.attrs.filter((v,i) => v >= pattrs[i]).length;
  const pctOfMax = pctOfPlayerPotential;

  // League ranking: compare player's score vs all same-position players across all teams
  const weights = loadWeights();
  const playerScore = calculatePlayerScore(player.attrs, position, weights);
  const allSamePos = [];
  Object.values(allTeamsRosterData || {}).forEach(teamData => {
    (teamData[position] || []).forEach(p => {
      allSamePos.push({ name: p.name, score: calculatePlayerScore(p.attrs, position, weights) });
    });
  });
  allSamePos.sort((a,b) => b.score - a.score);
  const leagueRank = allSamePos.findIndex(p => p.name === player.name) + 1;
  const leagueTotal = allSamePos.length;

  const barColor = pctOfMax >= 90 ? '#4aff4a' : pctOfMax >= 75 ? '#ffd700' : pctOfMax >= 55 ? '#4a9eff' : '#ff6b6b';

  // Contract data lookup — try by name and player num as PID
  const contract = lookupContract(contractData, player.name, player.num);
  const hasContract = !!contract;

  return (
    <div onClick={onClose} className="lightbox-outer" style={{
      position:'fixed',inset:0,zIndex:9999,
      background:'rgba(0,0,0,0.85)',
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'20px',backdropFilter:'blur(4px)'
    }}>
      <div onClick={e=>e.stopPropagation()} className="lightbox-inner" style={{
        background:'linear-gradient(135deg,rgba(10,22,40,0.99),rgba(13,40,24,0.99))',
        border:'2px solid #ffd700',borderRadius:'16px',
        maxWidth:'600px',width:'100%',maxHeight:'90vh',overflowY:'auto',
        boxShadow:'0 0 60px rgba(255,215,0,0.15)',
        position:'relative'
      }}>
        {/* Close */}
        <button onClick={onClose} style={{
          position:'absolute',top:'12px',right:'12px',
          background:'rgba(255,100,100,0.15)',border:'1px solid #ff4a4a44',
          borderRadius:'50%',width:'30px',height:'30px',color:'#ff6b6b',
          cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'
        }}>✕</button>

        {/* Header: logo + name */}
        <div style={{
          padding:'20px 24px 16px',
          borderBottom:'1px solid #2d5a2d',
          display:'flex',alignItems:'center',gap:'16px'
        }}>
          <div style={{filter:'drop-shadow(0 0 10px rgba(255,215,0,0.4))'}}>
            <TeamLogo teamName={teamName} size="medium"/>
          </div>
          <div>
            <div style={{fontFamily:'Orbitron',fontWeight:'900',fontSize:'1.2rem',color:'#fff',letterSpacing:'0.5px'}}>{player.name}</div>
            <div style={{display:'flex',gap:'10px',marginTop:'5px',alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontFamily:'Orbitron',fontSize:'0.75rem',color:'#ffd700',letterSpacing:'1px'}}>{POSITION_DISPLAY[position]||position}</span>
              {player.num && <span style={{color:'#608060',fontSize:'0.8rem',fontFamily:'Roboto Condensed'}}>#{player.num}</span>}
              <span style={{
                fontSize:'0.68rem',fontFamily:'Orbitron',fontWeight:'700',letterSpacing:'1px',
                padding:'2px 7px',borderRadius:'4px',
                color:player.status==='A'?'#4aff4a':player.status==='O'?'#ffd700':player.status==='I'?'#ff9944':'#ff4444',
                background:player.status==='A'?'rgba(74,255,74,0.1)':player.status==='O'?'rgba(255,215,0,0.1)':player.status==='I'?'rgba(255,153,68,0.08)':'rgba(255,68,68,0.08)',
                border:`1px solid ${player.status==='A'?'#4aff4a44':player.status==='O'?'#ffd70044':player.status==='I'?'#ff994444':'#ff444444'}`
              }}>{player.status}</span>
              <span style={{color:'#5a8a6a',fontSize:'0.75rem',fontFamily:'Roboto Condensed'}}>{teamName}</span>
            </div>
            {/* Salary row — shown if contract data has salary info */}
            {contract && (contract.currentSalary || contract.nextSalary) && (
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'6px',flexWrap:'wrap'}}>

                {contract.currentSalary && contract.nextSalary && (

                    YR {contract.nextSalaryYear} {fmtSalary(contract.nextSalary)}

              </div>

          </div>
        </div>

        {/* Attribute table */}
        <div style={{padding:'16px 24px'}}>
          <div style={{marginBottom:'8px',fontSize:'0.72rem',color:'#608060',fontFamily:'Orbitron',letterSpacing:'1.5px',textTransform:'uppercase'}}>Attribute Breakdown</div>
          {!hasPattrs && (
            <div style={{marginBottom:'8px',padding:'5px 10px',background:'rgba(74,158,255,0.05)',border:'1px solid rgba(74,158,255,0.12)',borderRadius:'6px',fontSize:'0.68rem',color:'#5a8aaa',fontFamily:'Roboto Condensed',display:'flex',alignItems:'center',gap:'6px'}}>
              <span>ℹ️</span>

          <div style={{display:'grid',gridTemplateColumns:'104px repeat(8,1fr)',gap:'4px',marginBottom:'6px'}}>
            <div/>
            {ATTRIBUTES.map(attr=>(
              <div key={attr} style={{
                textAlign:'center',padding:'4px 0',borderRadius:'12px',fontSize:'0.6rem',fontWeight:'700',
                background:'linear-gradient(135deg,#1a4a8a,#0d2a5a)',
                border:'1px solid #2a5a9a',color:'#fff',letterSpacing:'0.5px',fontFamily:'Orbitron'

          {/* Row 1: Player Actuals */}
          <div style={{display:'grid',gridTemplateColumns:'104px repeat(8,1fr)',gap:'4px',marginBottom:'4px'}}>
            <div style={{fontSize:'0.62rem',color:'#a0d2a0',fontFamily:'Roboto Condensed',display:'flex',alignItems:'center',fontWeight:'700'}}>Actuals</div>
            {player.attrs.map((v,i)=>{
              const isMaxed = v >= pattrs[i];
              return (
                <div key={i} style={{

// ── AI Scouting Report Panel ──
// ═══════════════════════════════════════════════════════════════
// PNFL SCOUTING REPORT — v2 (Live data, no contract/draft fluff)
// Sections: Overview | Offense | Defense | Weekly Highlights |
//           Top Performers | Opponents | Next Game | AI Analysis
// ═══════════════════════════════════════════════════════════════

function buildScoutingData(team, getTeamData, weights, depth, designation, contractData, standingsData, rosterMeta) {
  const ctx      = window.pnflDB || {};
  const td       = getTeamData(team) || {};
  const wts      = weights || loadWeights();
  const dep      = depth   || loadDepth();
  const desg     = designation || 'AO';
  const season   = rosterMeta?.season || ctx.season || '2048';
  const week     = rosterMeta?.week   || ctx.week   || '?';

  // ── 1. Standing & Power Ranking ──
  const standing = (standingsData?.rankings || []).find(r => r.team === team) || {};
  const ctxStand = ctx.standings?.[team] || {};
  const pRank    = (ctx.powerRankings || []).find(r => r.team === team);
  const record   = `${ctxStand.wins ?? standing.wins ?? 0}-${ctxStand.losses ?? standing.losses ?? 0}`;
  const pf       = ctxStand.pf ?? standing.pf ?? 0;
  const pa       = ctxStand.pa ?? standing.pa ?? 0;
  const streak   = ctxStand.streak || '';

  // ── 2. Roster position scores ──
  const posScores = {};
  const allPos = [...(POSITION_GROUPS.offense||[]), ...(POSITION_GROUPS.defense||[])];
  allPos.forEach(pos => {
    const s = calculatePositionScore(td, pos, wts, dep[pos]||3, desg);
    if (s !== null) posScores[pos] = s;
  });
  const sortedPos  = Object.entries(posScores).sort((a,b)=>b[1]-a[1]);
  const offPos     = sortedPos.filter(([p])=>(POSITION_GROUPS.offense||[]).includes(p));
  const defPos     = sortedPos.filter(([p])=>(POSITION_GROUPS.defense||[]).includes(p));
  const topOff     = offPos.slice(0,3).map(([p,s])=>({ pos:POSITION_DISPLAY[p]||p, score:s.toFixed(1) }));
  const weakOff    = offPos.slice(-2).reverse().map(([p,s])=>({ pos:POSITION_DISPLAY[p]||p, score:s.toFixed(1) }));
  const topDef     = defPos.slice(0,3).map(([p,s])=>({ pos:POSITION_DISPLAY[p]||p, score:s.toFixed(1) }));
  const weakDef    = defPos.slice(-2).reverse().map(([p,s])=>({ pos:POSITION_DISPLAY[p]||p, score:s.toFixed(1) }));
  const offScore   = (calculateUnitScore(td,'offense',wts,dep,desg)||0).toFixed(1);
  const defScore   = (calculateUnitScore(td,'defense',wts,dep,desg)||0).toFixed(1);
  const overall    = (calculateOverallScore(td,wts,dep,desg)||0).toFixed(1);

  // ── 3. Offensive ranking across all teams ──
  const allTeamOff = TEAM_NAMES.map(t => ({
    team: t,
    score: calculateUnitScore(getTeamData(t)||{}, 'offense', wts, dep, desg) || 0
  })).sort((a,b)=>b.score-a.score);
  const allTeamDef = TEAM_NAMES.map(t => ({
    team: t,
    score: calculateUnitScore(getTeamData(t)||{}, 'defense', wts, dep, desg) || 0
  })).sort((a,b)=>b.score-a.score);
  const offRank = allTeamOff.findIndex(t=>t.team===team) + 1;
  const defRank = allTeamDef.findIndex(t=>t.team===team) + 1;

  // ── 4. Top players by roster score ──
  const playerScores = [];
  Object.entries(td).forEach(([pos, players]) => {
    if (!Array.isArray(players)) return;
    players.forEach(p => {
      if (!p?.attrs) return;
      const s = calculatePlayerScore(p.attrs, pos, wts);
      if (s !== null) playerScores.push({ name:p.name, pos:POSITION_DISPLAY[pos]||pos, score:s, status:p.status });
    });
  });
  playerScores.sort((a,b)=>b.score-a.score);
  const topPlayers = playerScores.slice(0,5);

  // ── 5. Season stats from pnflDB ──
  const rawSeasonText = ctx.raw?.seasonStats || '';
  const rawTeamStats  = ctx.raw?.teamStats   || '';

  // Extract this team's passing/rushing from season stats raw text
  const findTeamSeasonStat = (rawText, teamName, statType) => {
    const lines = rawText.split('\n');
    let inSection = false;
    for (const line of lines) {
      if (line.toLowerCase().includes(statType.toLowerCase())) inSection = true;
      if (inSection && line.includes('Back to top')) inSection = false;
      if (inSection) {
        const m = line.match(new RegExp(teamName + '\\s+([\\d,. ]+)'));
        if (m) return m[1].trim().split(/\s+/).filter(Boolean);
      }
    }
    return null;
  };

  // Team season passing/rushing rank (position in table = rank)
  const getTeamRankInSection = (rawText, teamName, sectionHeader) => {
    const lines = rawText.split('\n');
    let inSection = false, rank = 0;
    for (const line of lines) {
      if (line.includes(sectionHeader)) { inSection = true; rank = 0; continue; }
      if (inSection && line.includes('Back to top')) { inSection = false; continue; }
      if (inSection && line.trim()) {
        const m = line.match(/^\s*\d+\s+(.+?)\s{2,}/);
        if (m) { rank++; if (m[1].trim() === teamName || line.includes(teamName)) return rank; }
      }
    }
    return null;
  };

  const passRank = getTeamRankInSection(rawSeasonText, team, 'Team Passing\n') || offRank;
  const rushRank = getTeamRankInSection(rawSeasonText, team, 'Team Rushing\n') || offRank;
  const passDefRank = getTeamRankInSection(rawSeasonText, team, 'Team Passing - Opponents') || defRank;
  const rushDefRank = getTeamRankInSection(rawSeasonText, team, 'Team Rushing - Opponents') || defRank;

  // ── 6. Game stats for top players this week ──
  const playerGameHighlights = [];
  topPlayers.slice(0,8).forEach(p => {
    const lastName = p.name.split(' ').pop();
    const gs = ctx.playerGameStats?.[lastName] || ctx.playerGameStats?.[p.name];
    if (gs) playerGameHighlights.push({ name:p.name, pos:p.pos, ...gs });
  });

  // ── 7. Opponents defeated from power rankings ──
  const pwrEntry   = (ctx.powerRankings||[]).find(r=>r.team===team);
  const oppsText   = (standingsData?.rankings||[]).find(r=>r.team===team)?.oppsDefeated || [];
  const oppsDefeated = pwrEntry ? [] : oppsText;

  // Parse opponents defeated from raw standings
  const rawStand   = ctx.raw?.standings || '';
  const oppMatch   = rawStand.match(new RegExp(team + '.*?\\[W\\]([A-Z ,a-z]+)', 's'));
  const oppsWon    = oppMatch ? oppMatch[1].trim().split(/\s+/).filter(Boolean) : [];
  const oppsLost   = rawStand.match(new RegExp(team + '.*?\\[L\\]([A-Z ,a-z]+)', 's'));
  const oppsLostArr = oppsLost ? oppsLost[1].trim().split(/\s+/).filter(Boolean) : [];

  // ── 8. Next opponent from schedule ──
  const nextWeekNum = parseInt(week) + 1;
  const schedMatch  = rawStand.match(new RegExp('Week ' + nextWeekNum + '[\\s\\S]*?(' + team + ' at ([A-Za-z ]+)|([A-Za-z ]+) at ' + team + ')'));
  let nextOpponent  = '';
  if (schedMatch) {
    nextOpponent = schedMatch[2] || schedMatch[3] || '';
  } else {
    // Try from team stats raw
    const tsMatch = rawTeamStats.match(new RegExp('Week ' + nextWeekNum + '.*?(?:vs|at)\\s+([A-Za-z ]+?)\\s*$', 'm'));
    if (tsMatch) nextOpponent = tsMatch[1].trim();
  }

  // ── 9. AI prompt data ──
  const aiPromptData = {
    team, season, week, record, pf, pa, streak,
    powerRank: pRank?.rank || '?',
    offRank, defRank, passRank, rushRank, passDefRank, rushDefRank,
    offScore, defScore, overall,
    topOff, weakOff, topDef, weakDef,
    topPlayers: topPlayers.slice(0,5),
    playerGameHighlights,
    nextOpponent: nextOpponent || 'TBD',
    oppsWon, oppsLostArr,
    rawGameStats: (ctx.raw?.gameStats||'').slice(0,3000),  // first 3KB of game stats
  };

  return aiPromptData;
}

function ScoutingReport({ getTeamData, weights, depth, designation, contractData, standingsData, seasonData, gameStatsData, rosterMeta }) {
  const [team,     setTeam]     = useState('');
  const [report,   setReport]   = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');
  const [rawText,  setRawText]  = useState('');
  const aiReady = !!(window.pnflAI?.isReady?.());
  const ctxReady = !!(window.pnflDB?._ready);

  const generateReport = async () => {
    if (!team || !aiReady) return;
    setLoading(true); setError(''); setReport(null); setRawText('');

    try {
      const d = buildScoutingData(team, getTeamData, weights, depth, designation, contractData, standingsData, rosterMeta);

      const systemPrompt = `You are the PNFL Digital Analyst for the 2048 season. You analyze a fantasy football simulation.
CRITICAL: Use ONLY the data provided below. Never use real NFL knowledge. Never mention real salaries or real-world contracts.
Respond with EXACTLY these 6 section headers, each on its own line, followed by 2-3 sentences of analysis:
OFFENSIVE ANALYSIS:
DEFENSIVE ANALYSIS:
WEEKLY HIGHLIGHTS:
TOP PERFORMERS:
STRENGTHS:
AREAS TO IMPROVE:`;

      const gameStatsSnippet = (window.pnflDB?._raw?.gameStats || '').split('\n')
        .filter(l => l.includes(team.split(' ')[0]) || l.includes('Player of') || l.includes('Individual'))
        .slice(0, 30).join('\n');

      const seasonStatsSnippet = (window.pnflDB?._raw?.season || '').split('\n')
        .filter(l => l.trim() && (l.includes(team) || l.match(/^\s*\d+\s/)))
        .slice(0, 20).join('\n');

      const userMsg = `Generate a scouting report for the ${team}, Season ${d.season} Week ${d.week}.

=== TEAM OVERVIEW ===
Record: ${d.record} | PF: ${d.pf} PA: ${d.pa} | Streak: ${d.streak}
Power Ranking: #${d.powerRank} of 18 teams
Roster Overall Score: ${d.overall} | Offense: ${d.offScore} (ranked #${d.offRank}/18) | Defense: ${d.defScore} (ranked #${d.defRank}/18)
Pass offense rank: #${d.passRank} | Rush offense rank: #${d.rushRank} | Pass defense rank: #${d.passDefRank} | Rush defense rank: #${d.rushDefRank}

=== TOP ROSTER POSITIONS (by score) ===
Offense strengths: ${d.topOff.map(p=>`${p.pos} (${p.score})`).join(', ')}
Offense weaknesses: ${d.weakOff.map(p=>`${p.pos} (${p.score})`).join(', ')}
Defense strengths: ${d.topDef.map(p=>`${p.pos} (${p.score})`).join(', ')}
Defense weaknesses: ${d.weakDef.map(p=>`${p.pos} (${p.score})`).join(', ')}

=== TOP 5 PLAYERS (roster rating) ===
${d.topPlayers.map((p,i)=>`${i+1}. ${p.name} (${p.pos}) - Score: ${p.score}`).join('\n')}

=== WEEK ${d.week} GAME STATS (${team} players) ===
${gameStatsSnippet || 'No individual game stats found'}

=== SEASON STATS CONTEXT ===
${seasonStatsSnippet || 'No season stats available'}

=== SCHEDULE ===
Opponents beaten (W): ${d.oppsWon.join(', ') || 'none yet'}
Opponents lost to (L): ${d.oppsLostArr.join(', ') || 'none yet'}
Next opponent (Week ${parseInt(d.week)+1}): ${d.nextOpponent}`;

      let full = '';
      await window.pnflAI.ask(systemPrompt, userMsg, 400,
        partial => { full = partial; setRawText(partial); }
      );
      const finalReport = parseScoutingReport(full);
      setReport(finalReport);
      playSound('compareDone'); haptic('medium');
      // Speak the report sections with emotion-matched narration
      if (window.pnflVoice?.isEnabled?.()) {
        window.pnflVoice.speakReport(finalReport);
      }
    } catch(e) {
      setError(e.message || String(e));
    }
    setLoading(false);
  };

  const d = team ? buildScoutingData(team, getTeamData, weights, depth, designation, contractData, standingsData, rosterMeta) : null;

  return (
    <div className="panel-content">
      <div style={{display:'flex',gap:'10px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}}>
        <select value={team} onChange={e=>{setTeam(e.target.value);setReport(null);setRawText('');}}
          style={{flex:1,padding:'8px 12px',background:'rgba(10,22,40,0.9)',border:'1px solid #2d5a2d',borderRadius:'8px',color:'#a0d2a0',fontFamily:'Roboto Condensed',fontSize:'0.9rem',outline:'none',minWidth:'160px'}}>
          <option value="">Select team…</option>
          {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <button onClick={()=>{playSound('click');haptic('medium');generateReport();}} disabled={!team||loading||!aiReady} className="haptic-btn"

          <span style={{display:'inline-block',animation:'spin2 1s linear infinite',fontSize:'1.2rem'}}>⟳</span>

      )}
    </div>
  );
}

function parseScoutingReport(text) {
  const keys = ['OFFENSIVE ANALYSIS','DEFENSIVE ANALYSIS','WEEKLY HIGHLIGHTS','TOP PERFORMERS','STRENGTHS','AREAS TO IMPROVE'];
  const sections = {};
  keys.forEach((key, i) => {
    const next = keys[i+1];
    const pattern = new RegExp(key + ':?\\s*([\\s\\S]*?)(?=' + (next ? next + ':' : '$') + ')', 'i');
    const m = text.match(pattern);
    if (m) sections[key] = m[1].trim();
  });
  if (!Object.values(sections).some(Boolean)) sections.RAW = text;
  return sections;
}

// ── Logo-aware team picker dropdown ──
function TeamPickerDropdown({ value, teams, onChange, accentColor }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  // Close when clicking outside
  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const accent = accentColor || '#4a9eff';
  const selectedTeam = value || '';

  return (
    <div ref={ref} style={{position:'relative',marginBottom:'6px',userSelect:'none'}}>
      {/* Trigger button */}
      <div onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',borderRadius:'7px',cursor:'pointer',
          background:'rgba(10,20,40,0.95)',border:`1px solid ${open?accent:'rgba(74,158,255,0.25)'}`,
          transition:'border-color 0.15s'}}>
        {selectedTeam
          ? <><TeamLogo teamName={selectedTeam} size="tiny"/>
              <span style={{flex:1,fontFamily:'Roboto Condensed',fontSize:'0.82rem',color:'#a0d2ff'}}>{selectedTeam}</span></>
          : <><span style={{width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.7rem',color:'#3a5a7a',flexShrink:0}}>🏈</span>
              <span style={{flex:1,fontFamily:'Roboto Condensed',fontSize:'0.82rem',color:'#3a6a8a',fontStyle:'italic'}}>All Teams</span></>
        }
        <span style={{fontSize:'0.6rem',color:'#3a5a7a',flexShrink:0}}>{open?'▲':'▼'}</span>
      </div>

      {/* Dropdown list */}
      {open && (
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,zIndex:200,
          background:'rgba(8,18,36,0.99)',border:`1px solid ${accent}44`,borderRadius:'9px',
          maxHeight:'220px',overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,0.7)'}}>
          {/* All teams option */}
          <div onClick={()=>{onChange('');setOpen(false);}}
            style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',cursor:'pointer',
              background:!selectedTeam?`${accent}18`:'transparent',
              borderBottom:'1px solid rgba(74,158,255,0.08)'}}>
            <span style={{width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.75rem',flexShrink:0}}>🏈</span>
            <span style={{fontFamily:'Roboto Condensed',fontSize:'0.82rem',color:!selectedTeam?accent:'#7090a0',fontStyle:'italic'}}>All Teams</span>
          </div>
          {teams.map(t=>(
            <div key={t} onClick={()=>{onChange(t);setOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',cursor:'pointer',transition:'background 0.1s',
                background:t===selectedTeam?`${accent}18`:'transparent'}}
              onMouseEnter={e=>e.currentTarget.style.background=t===selectedTeam?`${accent}20`:'rgba(255,255,255,0.04)'}
              onMouseLeave={e=>e.currentTarget.style.background=t===selectedTeam?`${accent}18`:'transparent'}>
              <TeamLogo teamName={t} size="tiny"/>
              <span style={{fontFamily:'Roboto Condensed',fontSize:'0.82rem',color:t===selectedTeam?accent:'#a0c0d0',fontWeight:t===selectedTeam?'700':'400'}}>{t}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ComparePlayersModal({ rosterData, contractData, onClose }) {
  const ALL_POS = ['QB','HB','FB','WR','TE','C','G','T','K','P','DE','DT','LB','CB','S'];
  const [pos,        setPos]        = React.useState('WR');
  const [leftTeam,   setLeftTeam]   = React.useState('');
  const [rightTeam,  setRightTeam]  = React.useState('');
  const [leftPick,   setLeftPick]   = React.useState(null);
  const [rightPick,  setRightPick]  = React.useState(null);
  const [leftSearch, setLeftSearch] = React.useState('');
  const [rightSearch,setRightSearch]= React.useState('');
  const [showResult, setShowResult] = React.useState(false);

  const allTeams   = rosterData?.teams || HARDCODED_ROSTER_DATA?.teams || {};
  const teamNames  = Object.keys(allTeams).length > 0 ? Object.keys(allTeams).sort() : TEAM_NAMES;

  const getPlayers = (teamFilter, search) => {
    const teams = teamFilter ? [teamFilter] : Object.keys(allTeams);
    const out = [];
    teams.forEach(t => {
      (allTeams[t]?.[pos] || []).forEach(p => {
        if (!search || p.name.toLowerCase().includes(search.toLowerCase()))
          out.push({ ...p, teamName: t });
      });
    });
    return out.sort((a,b) => a.name.localeCompare(b.name));
  };

  const leftList  = getPlayers(leftTeam,  leftSearch);
  const rightList = getPlayers(rightTeam, rightSearch);
  const canCompare = !!(leftPick && rightPick && (leftPick.name !== rightPick.name || leftPick.teamName !== rightPick.teamName));

  const selStyle = {
    width:'100%', padding:'6px 10px', borderRadius:'7px',
    background:'rgba(10,20,40,0.95)', border:'1px solid rgba(74,158,255,0.25)',
    color:'#a0d2ff', fontFamily:'Roboto Condensed', fontSize:'0.82rem', outline:'none',
    marginBottom:'6px', cursor:'pointer',
  };

  if (showResult && leftPick && rightPick) {
    return (
      <PlayerCompareResult
        left={leftPick} right={rightPick} pos={pos}
        contractData={contractData}
        onBack={()=>setShowResult(false)}
        onClose={onClose}
      />
    );
  }

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',backdropFilter:'blur(6px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'linear-gradient(135deg,rgba(8,18,35,0.99),rgba(12,35,22,0.99))',
        border:'2px solid rgba(74,158,255,0.5)',borderRadius:'18px',
        width:'min(860px,95vw)',maxHeight:'88vh',display:'flex',flexDirection:'column',
        boxShadow:'0 0 60px rgba(74,158,255,0.15)',overflow:'hidden',
      }}>

        {/* ── Header ── */}
        <div style={{padding:'16px 22px',borderBottom:'1px solid rgba(74,158,255,0.15)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:'0.95rem',color:'#4a9eff',fontWeight:'900',letterSpacing:'1.5px'}}>⚔ COMPARE PLAYERS</div>
            <div style={{fontSize:'0.68rem',color:'#4a7a8a',fontFamily:'Roboto Condensed',marginTop:'3px'}}>Select one player per side — same position only</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#3a6a8a',fontSize:'1.4rem',cursor:'pointer',lineHeight:1}}>✕</button>
        </div>

        {/* ── Position tabs ── */}
        <div style={{padding:'10px 20px',borderBottom:'1px solid rgba(74,158,255,0.1)',display:'flex',gap:'5px',flexWrap:'wrap',flexShrink:0,background:'rgba(0,0,0,0.15)'}}>
          {ALL_POS.map(p=>(
            <button key={p} onClick={()=>{haptic('light');playSound('click');setPos(p);setLeftPick(null);setRightPick(null);}} className="haptic-btn"
              style={{padding:'4px 13px',borderRadius:'20px',cursor:'pointer',fontFamily:'Orbitron',fontSize:'0.65rem',fontWeight:'700',transition:'all 0.15s',border:'none',
                background:pos===p?'linear-gradient(135deg,rgba(74,158,255,0.35),rgba(40,100,200,0.25))':'rgba(255,255,255,0.04)',
                color:pos===p?'#7ec8ff':'#3a6a8a',

              {/* Player list */}
              <div style={{flex:1,overflowY:'auto',padding:'0 10px 10px'}}>

                  ? <div style={{padding:'24px',textAlign:'center',color:'#2a4a5a',fontSize:'0.75rem',fontFamily:'Roboto Condensed'}}>No {pos} found</div>

                        {sel && <span style={{fontSize:'0.8rem',flexShrink:0}}>{ci===0?'✓':'✓'}</span>}
                      </div>
                    );
                  })
                }
              </div>

              {/* Selection confirmed strip */}
              <div style={{flexShrink:0,padding:'8px 12px',borderTop:'1px solid rgba(74,158,255,0.1)',minHeight:'52px',display:'flex',alignItems:'center',background:'rgba(0,0,0,0.25)'}}>
                {col.pick ? (
                  <div style={{display:'flex',alignItems:'center',gap:'8px',width:'100%'}}>
                    <TeamLogo teamName={col.pick.teamName} size="tiny"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'0.8rem',color:ci===0?'#7ec8ff':'#4aff8a',fontFamily:'Roboto Condensed',fontWeight:'700',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{col.pick.name}</div>
                      <div style={{fontSize:'0.6rem',color:'#3a6a5a',fontFamily:'Orbitron'}}>{col.pick.teamName} · {pos}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();col.setPick(null);}} style={{background:'none',border:'none',color:'#3a5a6a',cursor:'pointer',fontSize:'0.9rem',padding:'2px 4px',flexShrink:0}}>✕</button>
                  </div>
                ) : (
                  <div style={{fontSize:'0.7rem',color:'#2a4a5a',fontFamily:'Roboto Condensed',fontStyle:'italic'}}>No {pos} selected</div>
                )}

            </div>
          ))}
        </div>

        {/* ── Footer: Compare button turns green when ready ── */}
        <div style={{padding:'12px 20px',borderTop:'1px solid rgba(74,158,255,0.15)',display:'flex',gap:'10px',justifyContent:'flex-end',alignItems:'center',flexShrink:0,background:'rgba(0,0,0,0.2)'}}>
          {canCompare && (
            <span style={{fontSize:'0.72rem',color:'#4aff8a',fontFamily:'Roboto Condensed',marginRight:'auto'}}>
              ✓ {leftPick.name} vs {rightPick.name} — ready
            </span>
          )}
          <button onClick={onClose} className="haptic-btn"
            style={{padding:'9px 18px',background:'transparent',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'9px',color:'#4a6a7a',fontFamily:'Roboto Condensed',fontSize:'0.82rem',cursor:'pointer'}}>
            Cancel
          </button>
          <button onClick={()=>{haptic('medium');playSound('click');setShowResult(true);}}
            disabled={!canCompare} className="haptic-btn"
            style={{
              padding:'10px 28px',borderRadius:'9px',fontFamily:'Orbitron',fontSize:'0.78rem',fontWeight:'700',cursor:canCompare?'pointer':'not-allowed',transition:'all 0.3s',border:'2px solid',
              background: canCompare ? 'linear-gradient(135deg,#1a6a2a,#0d4a1a)' : 'rgba(20,40,30,0.4)',
              borderColor: canCompare ? '#4aff8a' : 'rgba(74,255,138,0.15)',
              color: canCompare ? '#4aff8a' : '#2a5a3a',
              boxShadow: canCompare ? '0 0 16px rgba(74,255,138,0.25)' : 'none',
            }}>
            {canCompare ? '▶ Compare Players' : 'Select Both Players'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Comparison result ──
function PlayerCompareResult({ left, right, pos, contractData, onBack, onClose }) {
  const weights = loadWeights();
  const ATTRS   = ['SP','AC','AG','ST','HA','EN','IN','DI'];
  const AFULL   = {SP:'Speed',AC:'Accuracy',AG:'Agility',ST:'Strength',HA:'Hands',EN:'Endurance',IN:'Intelligence',DI:'Discipline'};
  const aMax    = POS_ACTUAL_MAX[pos]    || POS_ACTUAL_MAX.LB;
  const pMax    = POS_POTENTIAL_MAX[pos] || POS_POTENTIAL_MAX.LB;

  const lScore = calculatePlayerScore(left.attrs,  pos, weights) || 0;
  const rScore = calculatePlayerScore(right.attrs, pos, weights) || 0;
  const lWins  = lScore > rScore;
  const tie    = Math.abs(lScore - rScore) < 0.01;

  const lAct = left.attrs.reduce((s,v)=>s+v,0);
  const rAct = right.attrs.reduce((s,v)=>s+v,0);
  const lPattrs = (left.pattrs  && left.pattrs.length===8)  ? left.pattrs  : pMax;
  const rPattrs = (right.pattrs && right.pattrs.length===8) ? right.pattrs : pMax;
  const lPot = lPattrs.reduce((s,v)=>s+v,0);
  const rPot = rPattrs.reduce((s,v)=>s+v,0);

  const deltas = ATTRS.map((a,i)=>({attr:a,full:AFULL[a],lv:left.attrs[i]||0,rv:right.attrs[i]||0,max:aMax[i]||99,delta:(left.attrs[i]||0)-(right.attrs[i]||0)}));
  const lMaxed = ATTRS.filter((a,i)=>(left.attrs[i]||0)>=(lPattrs[i]||99));
  const rMaxed = ATTRS.filter((a,i)=>(right.attrs[i]||0)>=(rPattrs[i]||99));
  const lContract = lookupContract(contractData, left.name,  left.num);
  const rContract = lookupContract(contractData, right.name, right.num);

  const diff    = Math.abs(lScore-rScore).toFixed(1);
  const pctDiff = Math.max(lScore,rScore) > 0 ? Math.round((Math.abs(lScore-rScore)/Math.min(lScore,rScore))*100) : 0;
  const winName = lWins ? left.name : right.name;
  const losName = lWins ? right.name : left.name;
  const winMaxed = lWins ? lMaxed : rMaxed;
  const topEdge = deltas.filter(d=>lWins?d.delta>0:d.delta<0).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)).slice(0,3);

  const writeup = tie
    ? `${left.name} and ${right.name} are identically rated at ${lScore.toFixed(1)} — a true toss-up at ${pos}. The edge comes down to role, team context, and contract situation.`
    : `${winName} edges ${losName} at ${pos} with a ${diff}-point advantage (${pctDiff}% higher score). ${topEdge.length?`The gap is most pronounced in ${topEdge.map(d=>d.full).join(', ')}.`:''} ${winMaxed.length?`${winName} has already maxed out ${winMaxed.slice(0,2).join(' and ')}.`:''}`;

  const Bar = ({val,max,win,flip})=>{
    const pct = Math.min(100,Math.round((val/max)*100));
    const col  = win?'#4aff8a':'rgba(255,255,255,0.25)';
    return (
      <div style={{display:'flex',alignItems:'center',gap:'5px',flex:1}}>
        {flip&&<span style={{fontFamily:'Orbitron',fontSize:'0.72rem',color:col,fontWeight:'700',width:'26px',textAlign:'right',flexShrink:0}}>{val}</span>}
        <div style={{flex:1,height:'7px',background:'rgba(255,255,255,0.05)',borderRadius:'4px',overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:col,borderRadius:'4px',marginLeft:flip?'auto':0,transition:'width 0.5s ease'}}/>
        </div>
        {!flip&&<span style={{fontFamily:'Orbitron',fontSize:'0.72rem',color:col,fontWeight:'700',width:'26px',flexShrink:0}}>{val}</span>}
      </div>
    );
  };

  const CardHeader = ({p,score,act,pot,isWinner,flip})=>(
    <div style={{marginBottom:'10px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',flexDirection:flip?'row-reverse':'row'}}>
        {isWinner&&!tie&&<span style={{fontSize:'1.5rem',lineHeight:1}}>👑</span>}
        <TeamLogo teamName={p.teamName} size="small"/>
        <div style={{textAlign:flip?'right':'left'}}>
          <div style={{fontFamily:'Orbitron',fontSize:'0.82rem',fontWeight:'900',color:isWinner&&!tie?'#ffd700':'#c0d8f0',lineHeight:1.2}}>{p.name}</div>
          <div style={{fontSize:'0.62rem',color:'#4a7a8a',fontFamily:'Roboto Condensed'}}>{p.teamName} · {pos} · {p.status}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:'6px',justifyContent:flip?'flex-end':'flex-start'}}>
        {[['SCORE',score.toFixed(1),isWinner&&!tie?'#4aff8a':'#7ec8ff'],['ACTUAL',act,'#a0d2a0'],['POT',pot,'#c090ff']].map(([l,v,col])=>(
          <div key={l} style={{textAlign:'center',padding:'5px 10px',background:'rgba(0,0,0,0.25)',borderRadius:'7px',border:`1px solid ${col}22`}}>
            <div style={{fontSize:'0.52rem',color:'#3a6a5a',fontFamily:'Orbitron',letterSpacing:'0.5px'}}>{l}</div>
            <div style={{fontSize:'1rem',color:col,fontFamily:'Orbitron',fontWeight:'900'}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.92)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'12px',backdropFilter:'blur(6px)',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'linear-gradient(135deg,rgba(6,14,30,0.99),rgba(8,26,16,0.99))',border:'2px solid rgba(74,255,138,0.4)',borderRadius:'18px',width:'min(1080px,96vw)',marginTop:'8px',overflow:'hidden',boxShadow:'0 0 60px rgba(74,255,138,0.1)'}}>

        {/* Header */}
        <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(74,255,138,0.15)',display:'flex',alignItems:'center',gap:'14px'}}>
          <button onClick={onBack} className="haptic-btn"
            style={{padding:'5px 14px',background:'transparent',border:'1px solid rgba(74,158,255,0.3)',borderRadius:'8px',color:'#4a9eff',fontFamily:'Orbitron',fontSize:'0.62rem',cursor:'pointer',flexShrink:0}}>
            ← Back
          </button>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Orbitron',fontSize:'0.88rem',color:'#4aff8a',fontWeight:'900',letterSpacing:'1px'}}>⚔ {pos} COMPARISON</div>
            <div style={{fontSize:'0.65rem',color:'#2a6a3a',fontFamily:'Roboto Condensed'}}>{left.name} vs {right.name}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#3a6a5a',fontSize:'1.3rem',cursor:'pointer',flexShrink:0}}>✕</button>
        </div>

        <div style={{padding:'14px 16px'}}>
          {/* Three-column layout */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 200px 1fr',gap:'10px',marginBottom:'12px',alignItems:'start'}}>

            {/* LEFT */}
            <div style={{background:'rgba(5,12,28,0.7)',borderRadius:'12px',padding:'14px',border:`1px solid ${lWins&&!tie?'rgba(74,255,138,0.3)':'rgba(74,158,255,0.15)'}`}}>
              <CardHeader p={left} score={lScore} act={lAct} pot={lPot} isWinner={lWins} flip={false}/>
              {deltas.map(d=>(
                <div key={d.attr} style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'5px'}}>
                  <span style={{fontSize:'0.58rem',color:'#3a6a7a',fontFamily:'Orbitron',width:'22px',flexShrink:0}}>{d.attr}</span>
                  <Bar val={d.lv} max={d.max} win={d.lv>=d.rv} flip={false}/>
                </div>
              ))}
              {lContract&&<div style={{marginTop:'10px',padding:'7px 10px',background:'rgba(0,0,0,0.3)',borderRadius:'7px',border:'1px solid rgba(61,220,132,0.15)'}}>
                <div style={{fontSize:'0.55rem',color:'#2a6a4a',fontFamily:'Orbitron',marginBottom:'2px'}}>CONTRACT</div>
                <div style={{fontSize:'0.76rem',color:'#3ddc84',fontFamily:'Roboto Condensed'}}>{lContract.contractLength}yr · {lContract.currentSalary?fmtSalary(lContract.currentSalary)+'/yr':'N/A'} · {lContract.yearsLeft}yr left</div>
              </div>}
            </div>

            {/* DELTA CENTER */}
            <div style={{background:'rgba(0,5,15,0.9)',borderRadius:'12px',padding:'12px',border:'1px solid rgba(255,215,0,0.2)'}}>
              <div style={{textAlign:'center',marginBottom:'8px',fontFamily:'Orbitron',fontSize:'0.58rem',color:'#7a6a2a',letterSpacing:'1px'}}>DELTA</div>
              <div style={{padding:'7px',background:'rgba(255,215,0,0.05)',borderRadius:'8px',marginBottom:'10px',border:'1px solid rgba(255,215,0,0.1)'}}>
                <div style={{fontSize:'0.52rem',color:'#5a5a2a',fontFamily:'Orbitron',textAlign:'center',marginBottom:'4px'}}>COMBINED</div>
                <div style={{display:'flex',justifyContent:'space-around'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:'0.55rem',color:'#4a7a5a',fontFamily:'Roboto Condensed'}}>ACT</div>
                    <div style={{fontSize:'1rem',color:'#a0d2a0',fontFamily:'Orbitron',fontWeight:'700'}}>{lAct+rAct}</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:'0.55rem',color:'#4a5a8a',fontFamily:'Roboto Condensed'}}>POT</div>
                    <div style={{fontSize:'1rem',color:'#c090ff',fontFamily:'Orbitron',fontWeight:'700'}}>{lPot+rPot}</div>
                  </div>
                </div>
              </div>
              {deltas.map(d=>{
                const lw=d.delta>0, rw=d.delta<0, even=d.delta===0;
                return (
                  <div key={d.attr} style={{display:'flex',alignItems:'center',marginBottom:'5px',gap:'3px'}}>
                    <span style={{fontSize:'0.62rem',fontFamily:'Orbitron',fontWeight:'700',color:lw?'#4aff8a':even?'#3a5a4a':'rgba(255,255,255,0.2)',width:'26px',textAlign:'right',flexShrink:0}}>{d.lv}</span>
                    <span style={{flex:1,fontSize:'0.55rem',color:'#2a4a3a',fontFamily:'Orbitron',textAlign:'center',letterSpacing:'0.3px'}}>{d.attr}</span>
                    <span style={{fontSize:'0.62rem',fontFamily:'Orbitron',fontWeight:'700',color:rw?'#4aff8a':even?'#3a5a4a':'rgba(255,255,255,0.2)',width:'26px',flexShrink:0}}>{d.rv}</span>
                  </div>
                );
              })}
              <div style={{marginTop:'8px',padding:'7px',background:tie?'rgba(255,255,255,0.05)':'rgba(255,215,0,0.08)',borderRadius:'8px',border:'1px solid rgba(255,215,0,0.2)',textAlign:'center'}}>
                <div style={{fontSize:'0.52rem',color:'#5a5020',fontFamily:'Orbitron',marginBottom:'2px'}}>SCORE DIFF</div>
                <div style={{fontSize:'1.15rem',color:'#ffd700',fontFamily:'Orbitron',fontWeight:'900'}}>{tie?'TIE':(lWins?'+':'-')+diff}</div>
              </div>
            </div>

            {/* RIGHT */}
            <div style={{background:'rgba(5,12,28,0.7)',borderRadius:'12px',padding:'14px',border:`1px solid ${!lWins&&!tie?'rgba(74,255,138,0.3)':'rgba(74,158,255,0.15)'}`}}>
              <CardHeader p={right} score={rScore} act={rAct} pot={rPot} isWinner={!lWins} flip={true}/>
              {deltas.map(d=>(
                <div key={d.attr} style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'5px'}}>
                  <Bar val={d.rv} max={d.max} win={d.rv>=d.lv} flip={true}/>
                  <span style={{fontSize:'0.58rem',color:'#3a6a7a',fontFamily:'Orbitron',width:'22px',textAlign:'right',flexShrink:0}}>{d.attr}</span>
                </div>
              ))}
              {rContract&&<div style={{marginTop:'10px',padding:'7px 10px',background:'rgba(0,0,0,0.3)',borderRadius:'7px',border:'1px solid rgba(61,220,132,0.15)'}}>
                <div style={{fontSize:'0.55rem',color:'#2a6a4a',fontFamily:'Orbitron',marginBottom:'2px'}}>CONTRACT</div>
                <div style={{fontSize:'0.76rem',color:'#3ddc84',fontFamily:'Roboto Condensed'}}>{rContract.contractLength}yr · {rContract.currentSalary?fmtSalary(rContract.currentSalary)+'/yr':'N/A'} · {rContract.yearsLeft}yr left</div>
              </div>}
            </div>
          </div>

          {/* Analysis writeup */}
          <div style={{padding:'12px 16px',background:'rgba(0,0,0,0.3)',borderRadius:'10px',border:`1px solid ${tie?'rgba(255,255,255,0.08)':'rgba(74,255,138,0.15)'}`}}>
            <div style={{fontSize:'0.58rem',color:tie?'#4a7a6a':'#2a7a4a',fontFamily:'Orbitron',letterSpacing:'1px',marginBottom:'6px'}}>
              {tie?'🤝 VERDICT — EVEN MATCH':`👑 VERDICT — ${winName.toUpperCase()} IS THE BETTER PLAYER`}
            </div>
            <div style={{fontSize:'0.85rem',color:'#9abcca',fontFamily:'Roboto Condensed',lineHeight:1.65}}>{writeup}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Trade Analyzer ──
function TradeAnalyzer({ getTeamData, weights, depth, designation }) {
  const [teamA,setTeamA]=useState('');
  const [teamB,setTeamB]=useState('');
  const [giveAway,setGiveAway]=useState([]);
  const [getBack,setGetBack]=useState([]);
  const [result,setResult]=useState(null);

  const getPlayers=(team)=>{
    const td=getTeamData(team)||{};
    const out=[];
    Object.entries(td).forEach(([pos,players])=>(players||[]).forEach(p=>out.push({...p,pos,key:`${pos}_${p.name}`})));
    return out.sort((a,b)=>a.pos.localeCompare(b.pos)||a.name.localeCompare(b.name));
  };
  const togglePlayer=(list,setList,player)=>{
    const k=player.key;
    setList(prev=>prev.find(p=>p.key===k)?prev.filter(p=>p.key!==k):[...prev,player]);
  };
  const DeltaBadge=({before,after,label})=>{
    const diff=(after-before); const d=diff.toFixed(1);
    const up=diff>0.05; const down=diff<-0.05;
    return(
      <div style={{textAlign:'center',padding:'10px',background:'rgba(0,0,0,0.3)',borderRadius:'8px',border:'1px solid #2d5a2d'}}>
        <div style={{fontSize:'0.68rem',color:'#608060',textTransform:'uppercase',letterSpacing:'1px',fontFamily:'Orbitron',marginBottom:'3px'}}>{label}</div>
        <div style={{fontSize:'1.1rem',fontWeight:'900',fontFamily:'Orbitron',color:'#fff'}}>{after.toFixed(1)}</div>
        <div style={{fontSize:'0.85rem',fontWeight:'700',color:up?'#4aff4a':down?'#ff4a4a':'#a0a0a0',marginTop:'2px'}}>
          {up?`▲ +${d}`:down?`▼ ${d}`:'—'}
        </div>
      </div>
    );
  };
  const analyzeTrade=()=>{
    if(!teamA||!teamB){alert('Select both teams first');return;}
    if(giveAway.length===0&&getBack.length===0){alert('Select at least one player to trade');return;}
    const cloneRoster=(team)=>JSON.parse(JSON.stringify(getTeamData(team)||buildPlaceholderRoster(team)));
    const tdA=cloneRoster(teamA); const tdB=cloneRoster(teamB);
    const beforeA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const beforeB=computeTeamResult(teamB,tdB,weights,depth,designation);
    const move=(src,dest,players)=>players.forEach(p=>{
      const pos=p.pos;
      if(src[pos]) src[pos]=src[pos].filter(pl=>pl.name!==p.name);
      if(!dest[pos]) dest[pos]=[];
      dest[pos].push({name:p.name,num:p.num,status:p.status,attrs:p.attrs});
    });
    move(tdA,tdB,giveAway); move(tdB,tdA,getBack);
    const afterA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const afterB=computeTeamResult(teamB,tdB,weights,depth,designation);
    setResult({beforeA,afterA,beforeB,afterB});
  };
  const PList=({team,list,setList})=>(
    <div style={{maxHeight:'260px',overflowY:'auto',background:'rgba(0,0,0,0.2)',borderRadius:'8px',padding:'8px',border:'1px solid #2d5a2d'}}>
      <div style={{fontSize:'0.72rem',color:'#608060',marginBottom:'6px',fontStyle:'italic'}}>Click to add/remove from trade:</div>
      {getPlayers(team).map(p=>{
        const sel=!!list.find(x=>x.key===p.key);
        return(
          <div key={p.key} onClick={()=>togglePlayer(list,setList,p)}
            style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 8px',margin:'2px 0',borderRadius:'5px',cursor:'pointer',
              background:sel?'rgba(74,158,255,0.22)':'rgba(0,0,0,0.15)',border:sel?'1px solid #4a9eff':'1px solid #2d5a2d',transition:'all 0.15s'}}>
            <span style={{display:'flex',gap:'7px',alignItems:'center',fontSize:'0.8rem'}}>
              <span style={{color:p.status==='A'?'#4aff4a':'#ff9944',fontSize:'0.68rem',fontWeight:'700'}}>{p.status}</span>
              <span style={{color:'#5a8a6a',fontSize:'0.72rem',minWidth:'22px'}}>{p.pos}</span>
              <span style={{color:'#b0d8b0'}}>{p.name}</span>
            </span>
            {sel&&<span style={{color:'#4a9eff',fontSize:'0.82rem'}}>✓</span>}
          </div>
        );
      })}
    </div>
  );
  return(
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'16px',color:'#a0d2a0'}}>Select two teams, pick players to swap on each side, then analyze the score impact instantly.</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'16px'}}>
          {[{id:'A',label:'Team A — gives away',val:teamA,setVal:(v)=>{setTeamA(v);setGiveAway([]);},list:giveAway,setList:setGiveAway,other:teamB},
            {id:'B',label:'Team B — gives away',val:teamB,setVal:(v)=>{setTeamB(v);setGetBack([]);},list:getBack,setList:setGetBack,other:teamA}
          ].map(({id,label,val,setVal,list,setList,other})=>(
            <div key={id}>
              <div style={{fontFamily:'Orbitron',color:'#4a9eff',fontSize:'0.85rem',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'1px'}}>{label}</div>
              <select value={val} onChange={e=>setVal(e.target.value)} style={{width:'100%',marginBottom:'10px',padding:'10px',borderRadius:'6px',background:'rgba(10,22,40,0.8)',color:'#fff',border:'2px solid #2d5a2d',fontFamily:'Roboto Condensed',fontSize:'1rem'}}>
                <option value="">-- Select Team --</option>
                {[...TEAM_NAMES].sort().filter(t=>t!==other).map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              {val&&<PList team={val} list={list} setList={setList}/>}
            </div>
          ))}
        </div>
        {(giveAway.length>0||getBack.length>0)&&(
          <div style={{background:'rgba(0,0,0,0.25)',borderRadius:'8px',padding:'10px 14px',marginBottom:'14px',border:'1px solid #2d5a2d',fontSize:'0.85rem',color:'#a0d2a0'}}>
            <strong style={{color:'#ffd700'}}>Trade: </strong>
            {giveAway.length>0&&<span>{teamA} sends {giveAway.map(p=>`${p.name}(${p.pos})`).join(', ')} </span>}
            {getBack.length>0&&<span>| {teamB} sends {getBack.map(p=>`${p.name}(${p.pos})`).join(', ')}</span>}
          </div>
        )}
        <button className="btn-primary" onClick={analyzeTrade} style={{width:'100%',fontSize:'1.1rem',padding:'13px',marginBottom:'18px'}}>
          🔄 Analyze Trade Impact
        </button>
        {result&&(
          <div>
            <h4 style={{fontFamily:'Orbitron',color:'#ffd700',marginBottom:'14px',fontSize:'1.05rem'}}>📈 TRADE IMPACT</h4>
            {[{team:teamA,before:result.beforeA,after:result.afterA},{team:teamB,before:result.beforeB,after:result.afterB}].map(({team,before,after})=>(
              <div key={team} style={{marginBottom:'14px',background:'rgba(0,0,0,0.2)',borderRadius:'10px',padding:'13px',border:'1px solid #2d5a2d'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>

                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                  <DeltaBadge before={before.overallScore} after={after.overallScore} label="Overall"/>
                  <DeltaBadge before={before.offenseScore} after={after.offenseScore} label="Offense"/>
                  <DeltaBadge before={before.defenseScore} after={after.defenseScore} label="Defense"/>
                </div>
              </div>
            ))}
            <div style={{fontSize:'0.78rem',color:'#608060',fontStyle:'italic',textAlign:'center',marginTop:'6px'}}>Based on your current weights & depth settings.</div>
          </div>
        )}
    </div>
  );
}
