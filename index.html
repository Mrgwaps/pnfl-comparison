<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

// ── Haptic feedback helper ──
const haptic = (style = 'light') => {
  if (navigator.vibrate) {
    const patterns = { light: [10], medium: [20], heavy: [30], double: [15, 50, 15] };
    navigator.vibrate(patterns[style] || patterns.light);
  }
};

// ── Persistent storage (localStorage, synchronous, survives page close) ──
const storage = {
  get: (key) => {
    try { const v = localStorage.getItem('pnfl_' + key); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  set: (key, val) => {
    try { localStorage.setItem('pnfl_' + key, JSON.stringify(val)); } catch {}
  },
  clear: () => {
    try { Object.keys(localStorage).filter(k => k.startsWith('pnfl_')).forEach(k => localStorage.removeItem(k)); }
    catch {}
  }
};

// Calculate how "maxed out" a player attribute is vs position maxes
// Returns a 0-100 pct score for each attribute
function attrPctOfMax(attrs, position) {
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  return ATTRIBUTES.map((_, i) => {
    // Use potential max as the ceiling (100%), actual max as the baseline reference
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    const val = attrs[i];
    return Math.min(100, Math.max(0, Math.round(((val - floor) / Math.max(1, ceiling - floor)) * 100)));
  });
}

// ── ROSTER PARSER ──
// Parse the raw text fetched from pnfl.biz/pnflstats/PNFL_roster.htm
function parsePNFLRosterText(rawText) {
  const result = { season: '', date: '', week: '', fetchedAt: new Date().toISOString(), teams: {} };

  // Detect if this is HTML or plain text
  const isHTML = rawText.includes('<table') || rawText.includes('<tr') || rawText.includes('<td');

  if (isHTML) {
    return parsePNFLRosterHTML(rawText, result);
  } else {
    return parsePNFLRosterPlainText(rawText, result);
  }
}

function parsePNFLRosterHTML(html, result) {
  // Parse HTML using a temporary DOM element
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract header info from full text
  const bodyText = doc.body ? doc.body.innerText || doc.body.textContent : html;
  const seasonMatch = bodyText.match(/(\d{4})\s*season/i);
  if (seasonMatch) result.season = seasonMatch[1];
  const weekMatch = bodyText.match(/Week\s*(\d+)/i);
  if (weekMatch) result.week = weekMatch[1];
  const dateMatch = bodyText.match(/([A-Za-z]+ \d+,\s*\d{4})/);
  if (dateMatch) result.date = dateMatch[1];

  const teamNameMap = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S']);

  // Find all tables in the document
  const tables = doc.querySelectorAll('table');
  let currentTeam = null;

  tables.forEach(table => {
    // Check if preceding heading/text identifies a team
    let el = table.previousElementSibling;
    while (el) {
      const txt = el.textContent.trim();
      const m = txt.match(/Team Roster:\s*(.+)/i) || txt.match(/^(.+?)\s+Team Roster/i);
      if (m) {
        const tName = m[1].trim();
        const mapped = teamNameMap[tName];
        currentTeam = (mapped !== undefined) ? mapped : tName;
        if (currentTeam && !result.teams[currentTeam]) result.teams[currentTeam] = {};
        break;
      }
      // Also check headings containing team names
      for (const [key] of Object.entries(teamNameMap)) {
        if (key && txt.includes(key)) {
          const mapped = teamNameMap[key];
          currentTeam = (mapped !== undefined) ? mapped : key;
          if (currentTeam && !result.teams[currentTeam]) result.teams[currentTeam] = {};
          break;
        }
      }
      if (currentTeam) break;
      el = el.previousElementSibling;
    }
    if (!currentTeam) return;

    // Each row in this table = one player (or potential row)
    const rows = table.querySelectorAll('tr');
    let lastPlayer = null;

    rows.forEach(row => {
      const cells = Array.from(row.querySelectorAll('td,th'));
      if (cells.length < 6) return;

      const cellTexts = cells.map(c => c.textContent.trim());

      // Detect player row: first cell is status A/O/I/IR
      const status = cellTexts[0];
      if (!['A','O','I','IR'].includes(status)) {
        // Might be a potential row — look for 8 numeric values
        if (lastPlayer && !lastPlayer.pattrs) {
          const nums = cellTexts.filter(t => /^\d{2,3}$/.test(t)).map(Number);
          if (nums.length >= 8) {
            lastPlayer.pattrs = nums.slice(0, 8);
          }
        }
        lastPlayer = null;
        return;
      }

      // Position is second cell e.g. "QB1", "HB2"
      const posRaw = cellTexts[1] || '';
      const pos = posRaw.replace(/\d+$/, '').toUpperCase();
      if (!VALID_POS.has(pos)) { lastPlayer = null; return; }

      // Extract 8 attribute numbers from the row — last 8 numeric cells
      const allNums = cellTexts.filter(t => /^\d{2,3}$/.test(t)).map(Number);
      if (allNums.length < 8) { lastPlayer = null; return; }
      const attrs = allNums.slice(-8);

      // Jersey number and name
      const num = parseInt(cellTexts[2]) || 0;
      // Name is typically 4th cell (index 3), clean it up
      const name = (cellTexts[3] || '').replace(/\s+/g,' ').trim();

      if (!result.teams[currentTeam][pos]) result.teams[currentTeam][pos] = [];
      const playerObj = { name, num, status, attrs, pattrs: null };
      result.teams[currentTeam][pos].push(playerObj);
      lastPlayer = playerObj;
    });
  });

  // Fallback: if HTML parsing got 0 teams, try plain text
  if (Object.keys(result.teams).length === 0) {
    return parsePNFLRosterPlainText(doc.body ? doc.body.innerText || doc.body.textContent : '', result);
  }
  return result;
}

function parsePNFLRosterPlainText(rawText, result) {
  const lines = rawText.split('\n');

  // Extract header info
  for (let i = 0; i < Math.min(20, lines.length); i++) {
    const line = lines[i].trim();
    const seasonMatch = line.match(/(\d{4})\s*season/i);
    if (seasonMatch) result.season = seasonMatch[1];
    const weekMatch = line.match(/Week\s*(\d+)/i);
    if (weekMatch) result.week = weekMatch[1];
    const dateMatch = line.match(/([A-Za-z]+ \d+,\s*\d{4})/);
    if (dateMatch) result.date = dateMatch[1];
  }

  const teamNameMap = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S','FB']);

  let currentTeam = null;
  let lastPlayer = null;
  let captureNext = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    const teamMatch = line.match(/Team Roster:\s*(.+)/i);
    if (teamMatch) {
      const tName = teamMatch[1].trim();
      const mapped = teamNameMap[tName];
      currentTeam = (mapped !== undefined) ? mapped : tName;
      if (currentTeam && !result.teams[currentTeam]) result.teams[currentTeam] = {};
      lastPlayer = null; captureNext = false;
      continue;
    }
    if (!currentTeam) continue;

    const playerMatch = line.match(/^\s*(A|O|I|IR)\s+(QB\d*|HB\d*|FB\d*|TE\d*|WR\d*|C\d*|G\d*|T\d*|K\d*|P\d*|DE\d*|DT\d*|LB\d*|CB\d*|S\d*)\s+(\d+)\s+(.+?)\s{2,}\S.*?\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s*$/);
    if (playerMatch) {
      const status = playerMatch[1];
      const posRaw = playerMatch[2];
      const pos = posRaw.replace(/\d+$/, '');
      if (!VALID_POS.has(pos)) { captureNext = false; continue; }
      const num = parseInt(playerMatch[3]);
      const name = playerMatch[4].trim().replace(/\s+/g,' ');
      const attrs = [playerMatch[5],playerMatch[6],playerMatch[7],playerMatch[8],
                     playerMatch[9],playerMatch[10],playerMatch[11],playerMatch[12]].map(Number);
      if (!result.teams[currentTeam][pos]) result.teams[currentTeam][pos] = [];
      const playerObj = { name, num, status, attrs, pattrs: null };
      result.teams[currentTeam][pos].push(playerObj);
      lastPlayer = playerObj;
      captureNext = true;
      continue;
    }

    if (captureNext) {
      captureNext = false;
      // Strip HTML tags, find 8 2-3 digit numbers
      const stripped = line.replace(/<[^>]*>/g,' ');
      const nums = (stripped.match(/\b\d{2,3}\b/g) || []).map(Number).filter(n => n >= 10 && n <= 999);
      if (nums.length >= 8 && lastPlayer) {
        lastPlayer.pattrs = nums.slice(0, 8);
      }
      lastPlayer = null;
      continue;
    }
  }
  return result;
}

// ── STANDINGS / POWER RANKINGS PARSER ──
// Parses raw text from pnfl.biz/pnflstats/PNFL_standings.htm
function parsePNFLStandingsText(rawText) {
  const lines = rawText.split('\n');
  const result = { season:'', week:'', date:'', fetchedAt: new Date().toISOString(), rankings:[] };

  // Map short codes used in opponents defeated to full team names
  const SHORT_TO_TEAM = {
    'BUF':'Buffalo','NE':'New England','MIA':'Miami','JAX':'Jacksonville',
    'PIT':'Pittsburgh','DEN':'Denver','LVR':'Las Vegas','LAC':'Los Angeles',
    'CIN':'Cincinnati','ATL':'Atlanta','WSH':'Washington','NYG':'New York',
    'PHI':'Philadelphia','SF':'San Francisco','CHI':'Chicago','MIN':'Minnesota',
    'SEA':'Seattle','GB':'Green Bay',
  };
  // Full name aliases for matching
  const NAME_MAP = {
    'Miami':'Miami','Pittsburgh':'Pittsburgh','New England':'New England',
    'Atlanta':'Atlanta','Washington':'Washington','Cincinnati':'Cincinnati',
    'Chicago':'Chicago','Green Bay':'Green Bay','Denver':'Denver',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New York':'New York',
    'Las Vegas':'Las Vegas','Los Angeles':'Los Angeles','Philadelphia':'Philadelphia',
  };

  // Extract header
  for (let i = 0; i < Math.min(25, lines.length); i++) {
    const line = lines[i].trim();
    const seasonMatch = line.match(/(\d{4})\s*season/i);
    if (seasonMatch) result.season = seasonMatch[1];
    const weekMatch = line.match(/Week\s*(\d+)/i);
    if (weekMatch) result.week = weekMatch[1];
    const dateMatch = line.match(/([A-Za-z]+ \d+,\s*\d{4})/);
    if (dateMatch) result.date = dateMatch[1];
  }

  // Parse ranking rows
  // Format:  " 1 Miami          3   3   9 BUF DEN NYG"
  // Or tied: "   Pittsburgh     3   3   9 JAX LVR CIN"  (no rank number = same rank as prev)
  let currentRank = 0;
  for (const line of lines) {
    // Try ranked line: leading spaces then optional number then team name then W OppW Pts then opponents
    const ranked = line.match(/^\s*(\d+)\s+([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s*((?:[A-Z]{2,3}\s*)*)/);
    const tied   = line.match(/^\s{3,}([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s*((?:[A-Z]{2,3}\s*)*)/);

    let rank, teamRaw, wins, oppWins, pts, oppsRaw;
    if (ranked) {
      rank = parseInt(ranked[1]);
      currentRank = rank;
      teamRaw = ranked[2].trim();
      wins = parseInt(ranked[3]);
      oppWins = parseInt(ranked[4]);
      pts = parseInt(ranked[5]);
      oppsRaw = ranked[6].trim();
    } else if (tied && currentRank > 0) {
      rank = currentRank;
      teamRaw = tied[1].trim();
      wins = parseInt(tied[2]);
      oppWins = parseInt(tied[3]);
      pts = parseInt(tied[4]);
      oppsRaw = tied[5].trim();
    } else {
      continue;
    }

    // Normalize team name
    const team = NAME_MAP[teamRaw] || teamRaw;
    if (!team || !TEAM_NAMES.includes(team)) continue;

    // Parse opponents defeated abbreviations
    const oppCodes = oppsRaw ? oppsRaw.split(/\s+/).filter(Boolean) : [];
    const oppsDefeated = oppCodes.map(c => SHORT_TO_TEAM[c] || c).filter(Boolean);

    // Losses = games played - wins (games played = wins for now; if we had ties/losses we'd need more)
    const gamesPlayed = wins; // only wins tracked in standings format shown

    result.rankings.push({ rank, team, wins, losses: 0, oppWins, pts, oppsDefeated, gamesPlayed });
  }

  // Deduplicate (same team appearing twice due to parsing)
  const seen = new Set();
  result.rankings = result.rankings.filter(r => {
    if (seen.has(r.team)) return false;
    seen.add(r.team);
    return true;
  });

  return result;
}

// ── SCORING ──
// Player score: weighted average of attributes, with each attribute normalized
// relative to the position's potential max (so a WR with 84 SP is near-maxed).
function calculatePlayerScore(attrs, position, weights) {
  const pw = weights[position] || weights.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  let ws = 0, wt = 0;
  ATTRIBUTES.forEach((attr, i) => {
    const w = pw[attr] || 1;
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    // Normalize: raw score scaled so potential max = 100
    const normalized = Math.min(100, (attrs[i] / Math.max(1, ceiling)) * 100);
    ws += normalized * w;
    wt += w;
  });
  return ws / wt;
}
function calculateSumScore(attrs) { return attrs.reduce((s,v) => s+v, 0); }

function calculatePositionScore(teamData, position, weights, depthCount, designation) {
  // Filter players by designation setting
  // 'AO' = Active + Open (default), 'A' = Active only, 'ALL' = all slots
  const desig = designation || 'AO';
  const allPlayers = (teamData[position] || []);
  const players = desig === 'ALL' ? allPlayers
    : desig === 'A'  ? allPlayers.filter(p => p.status === 'A')
    : allPlayers.filter(p => p.status === 'A' || p.status === 'O'); // AO default
  if (!players.length) return null;
  const scored = players
    .map(p => ({ ...p, ws: calculatePlayerScore(p.attrs, position, weights), ss: calculateSumScore(p.attrs) }))
    .sort((a,b) => b.ws - a.ws);
  const maxD = depthCount || DEFAULT_DEPTH[position] || 3;
  const top = scored.slice(0, Math.min(maxD, scored.length));
  if (!top.length) return null;
  const aw = top.reduce((s,p) => s+p.ws, 0) / top.length;
  const as = top.reduce((s,p) => s+p.ss, 0) / top.length;
  return (aw * 0.7) + (as * 0.03);
}

function calculateGroupScore(teamData, positions, weights, depth, designation) {
  let total = 0, count = 0;
  positions.forEach(pos => {
    const s = calculatePositionScore(teamData, pos, weights, depth[pos], designation);
    if (s !== null) { total += s; count++; }
  });
  return count > 0 ? total / count : 0;
}

function calculateUnitScore(teamData, unit, weights, depth, designation) {
  return calculateGroupScore(teamData, POSITION_GROUPS[unit], weights, depth, designation);
}

function calculateOverallScore(teamData, weights, depth, designation) {
  const o = calculateUnitScore(teamData, 'offense', weights, depth, designation);
  const d = calculateUnitScore(teamData, 'defense', weights, depth, designation);
  return (o * 0.55) + (d * 0.45);
}

// Compute full result object for one team
function computeTeamResult(team, teamData, weights, depth, designation) {
  const oS=calculateUnitScore(teamData,'offense',weights,depth,designation);
  const dS=calculateUnitScore(teamData,'defense',weights,depth,designation);
  const oT=calculateOverallScore(teamData,weights,depth,designation);
  const oP={}, dP={};
  POSITION_GROUPS.offense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)oP[p]=s; });
  POSITION_GROUPS.defense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)dP[p]=s; });
  oP['OL_TOTAL']=calculateGroupScore(teamData,OL_POSITIONS,weights,depth,designation);
  dP['DL_TOTAL']=calculateGroupScore(teamData,DL_POSITIONS,weights,depth,designation);
  return { offenseScore:oS, defenseScore:dS, overallScore:oT, offensePositions:oP, defensePositions:dP };
}

// ── Contract Data Parser (SheetJS) ──
// Parses PNFL Contracts.xlsx and returns a map keyed by player name
function parseContractXLSX(arrayBuffer) {
  // Read workbook — handles .xlsx and .xls formats
  const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, raw: false });
  const contracts = {};
  let totalPlayers = 0;

  const TEAM_NAME_MAP = {
    'JAX':'Jacksonville','BUF':'Buffalo','NE':'New England','MIA':'Miami',
    'DEN':'Denver','LVR':'Las Vegas','LV':'Las Vegas','CIN':'Cincinnati',
    'LAC':'Los Angeles','LAR':'Los Angeles','PIT':'Pittsburgh','ATL':'Atlanta',
    'WSH':'Washington','NYG':'New York','PHI':'Philadelphia','SF':'San Francisco',
    'ARI':'Chicago','MIN':'Minnesota','SEA':'Seattle','GB':'Green Bay',
    'Green Bay':'Green Bay','Packers':'Green Bay','Washington':'Washington',
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','Philadelphia':'Philadelphia','San Francisco':'San Francisco',
    'Chicago':'Chicago','Minnesota':'Minnesota','Seattle':'Seattle',
  };

  wb.SheetNames.forEach(sheetName => {
    const ws = wb.Sheets[sheetName];
    if (!ws) return;

    // Get raw row arrays to inspect structure
    const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!rawRows || rawRows.length < 3) return;

    // Find header row — look for row containing PID or First+Last columns
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(5, rawRows.length); i++) {
      const row = rawRows[i].map(c => String(c).trim().toLowerCase());
      if (row.includes('pid') || (row.includes('first') && row.includes('last')) || row.includes('draft slot')) {
        headerRowIdx = i;
        break;
      }
    }
    if (headerRowIdx === -1) return;

    const headers = rawRows[headerRowIdx].map(c => String(c).trim());

    // Map column indices from actual PNFL Contracts.xlsx structure:
    // PID | Draft Slot | First | Last | Team | Pos | Year | 2045 | 2046 | 2047...
    const col = {};
    const contractYearCols = [];
    headers.forEach((h, i) => {
      const lh = h.toLowerCase().replace(/\s+/g,'');
      if (lh === 'pid') col.pid = i;
      else if (lh === 'draftslot' || lh === 'draft') col.draftSlot = i;
      else if (lh === 'first' || lh === 'firstname') col.first = i;
      else if (lh === 'last' || lh === 'lastname') col.last = i;
      else if (lh === 'team') col.team = i;
      else if (lh === 'pos' || lh === 'position') col.pos = i;
      else if (lh === 'year' || lh === 'years' || lh === 'yr') col.year = i;
      // Contract year columns: 4-digit years like 2045, 2046...
      else if (/^20\d{2}$/.test(h.trim())) {
        contractYearCols.push({ year: parseInt(h.trim()), idx: i });
      }
    });

    const mappedTeam = TEAM_NAME_MAP[sheetName.trim()] || sheetName.trim();

    // Process data rows (skip header row and any summary/total rows)
    for (let ri = headerRowIdx + 1; ri < rawRows.length; ri++) {
      const row = rawRows[ri];
      if (!row || row.length < 3) continue;

      const firstName = col.first !== undefined ? String(row[col.first] || '').trim() : '';
      const lastName  = col.last  !== undefined ? String(row[col.last]  || '').trim() : '';
      if (!firstName && !lastName) continue;
      const fullName = [firstName, lastName].filter(Boolean).join(' ');
      if (!fullName || fullName.length < 2) continue;

      const pid       = col.pid       !== undefined ? String(row[col.pid]       || '').trim() : '';
      const draftSlot = col.draftSlot !== undefined ? String(row[col.draftSlot] || '').trim() : '';
      const teamRaw   = col.team      !== undefined ? String(row[col.team]      || '').trim() : '';
      const pos       = col.pos       !== undefined ? String(row[col.pos]       || '').trim().toUpperCase() : '';
      const yearsLeft = col.year      !== undefined ? String(row[col.year]      || '').trim() : '';

      // Parse draft slot format: "GB 1-2" = Green Bay round 1 pick 2, or "48-GB-3-9" style
      let draftRound = '', draftPick = '', draftTeam = '';
      const dsMatch1 = draftSlot.match(/^([A-Z]+)\s*(\d+)-(\d+)$/i);
      const dsMatch2 = draftSlot.match(/^(\d+)-([A-Z]+)-(\d+)-(\d+)$/i);
      if (dsMatch2) {
        draftTeam = dsMatch2[2].toUpperCase();
        draftRound = dsMatch2[3];
        draftPick = dsMatch2[4];
      } else if (dsMatch1) {
        draftTeam = dsMatch1[1].toUpperCase();
        draftRound = dsMatch1[2];
        draftPick = dsMatch1[3];
      } else if (draftSlot === 'X' || draftSlot === '') {
        draftRound = 'UDFA';
      }

      // Which years is player under contract (X = yes in that year column)
      const contractedYears = contractYearCols
        .filter(({idx}) => {
          const v = String(row[idx] || '').trim().toUpperCase();
          return v === 'X' || v === '1' || v === 'TRUE';
        })
        .map(({year}) => year);

      const contractStart = contractedYears.length ? Math.min(...contractedYears) : null;
      const contractEnd   = contractedYears.length ? Math.max(...contractedYears) : null;
      const contractLen   = contractedYears.length;

      const resolvedTeam = TEAM_NAME_MAP[teamRaw] || TEAM_NAME_MAP[mappedTeam] || mappedTeam;

      const contract = {
        playerName:       fullName,
        firstName,
        lastName,
        team:             resolvedTeam,
        position:         pos,
        playerId:         pid,
        draftSlot,
        draftRound,
        draftPick,
        draftTeam,
        yearsLeft:        yearsLeft || String(contractLen),
        contractLength:   contractLen,
        contractStart,
        contractEnd,
        contractYearList: contractedYears,
        sheetName,
      };

      // Primary index: normalized full name
      const key = fullName.toLowerCase().replace(/[^a-z0-9]/g,'');
      if (key.length > 1) {
        contracts[key] = contract;
        totalPlayers++;
      }

      // Last-name fallback index
      const lnKey = '_last_' + lastName.toLowerCase().replace(/[^a-z]/g,'');
      if (!contracts[lnKey]) contracts[lnKey] = [];
      contracts[lnKey].push(contract);

      // PID direct index
      if (pid) contracts['_pid_' + pid] = contract;
    }
  });

  return {
    contracts,
    teamCount: wb.SheetNames.length,
    playerCount: totalPlayers,
    fetchedAt: new Date().toISOString(),
    sheets: wb.SheetNames,
  };
}

// Lookup a contract by player name or PID (fuzzy)
function lookupContract(contractData, playerName, pid) {
  if (!contractData || !contractData.contracts) return null;
  const c = contractData.contracts;

  // Direct PID lookup
  if (pid && c['_pid_' + pid]) return c['_pid_' + pid];

  if (!playerName) return null;

  // Exact normalized full name
  const key = playerName.toLowerCase().replace(/[^a-z0-9]/g,'');
  if (c[key]) return c[key];

  // Last name fallback
  const parts = playerName.trim().split(/\s+/);
  const lastName = (parts[parts.length-1] || '').toLowerCase().replace(/[^a-z]/g,'');
  const lastMatches = c['_last_' + lastName];
  if (!lastMatches || !lastMatches.length) return null;
  if (lastMatches.length === 1) return lastMatches[0];

  // Multiple last-name matches — try first initial
  const firstInitial = (parts[0] || '').toLowerCase()[0];
  if (firstInitial) {
    const m = lastMatches.find(x => x.firstName && x.firstName.toLowerCase().startsWith(firstInitial));
    if (m) return m;
  }
  return lastMatches[0];
}

// Format a salary value for display
function fmtSalary(val) {
  if (!val && val !== 0) return null;
  const n = parseFloat(String(val).replace(/[$,]/g,''));
  if (isNaN(n)) return String(val) || null;
  if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n}`;
}

  const apply = () => { onDepthChange(local); saveDepth(local); };
  const reset = () => { const d=JSON.parse(JSON.stringify(DEFAULT_DEPTH)); setLocal(d); onDepthChange(d); saveDepth(d); };
  const offOther=['QB','HB','WR','TE','K','P'];
  const offOL=['C','G','T'];
  const defDL=['DE','DT'];
  const defOther=['LB','CB','S'];
  const depthCard = (pos, label) => (
    <div className="depth-item" key={pos}>
      <h4 style={{color:offOL.includes(pos)?'#4a9eff':defDL.includes(pos)?'#ff8888':'#ffd700'}}>{label||pos}</h4>

function WeightsPanel({ weights, onWeightsChange }) {
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(weights)));
  const handle=(pos,attr,val)=>{const n=Math.max(0,Math.min(10,parseInt(val)||0));setLocal(p=>({...p,[pos]:{...p[pos],[attr]:n}}));};
  const apply=()=>{onWeightsChange(local);saveWeights(local);};
  const reset=()=>{const d=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));setLocal(d);onWeightsChange(d);saveWeights(d);};
  const preset=(p)=>{
    const base=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));
    if(p==='balanced'){Object.keys(base).forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:2,HA:2,EN:2,IN:2,DI:2});}
    else if(p==='speed'){Object.keys(base).forEach(pos=>base[pos]={SP:4,AC:3,AG:2,ST:1,HA:2,EN:1,IN:1,DI:1});}
    else if(p==='trench'){['C','G','T'].forEach(pos=>base[pos]={SP:1,AC:1,AG:2,ST:4,HA:1,EN:4,IN:3,DI:3});['DE','DT'].forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:4,HA:2,EN:3,IN:1,DI:3});}
    setLocal(base);
  };
  return (
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'20px',color:'#a0d2a0'}}>Adjust weights (0-10) per attribute/position. Higher = more important.</div>
      <div className="position-weights">
        {Object.entries(local).map(([pos,attrs])=>(
          <div className="position-card" key={pos}>
            <h4>{POSITION_DISPLAY[pos]||pos}</h4>
            {ATTRIBUTES.map(attr=>(
              <div className="weight-row" key={attr}>
                <label>{attr}</label>
                <input type="number" min="0" max="10" value={attrs[attr]} onChange={e=>handle(pos,attr,e.target.value)}/>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="button-group">
        <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
        <button className="btn-secondary" onClick={reset}>↺ Reset</button>
        <button className="btn-secondary" onClick={()=>preset('balanced')}>⚖️ Balanced</button>
        <button className="btn-secondary" onClick={()=>preset('speed')}>⚡ Speed</button>
        <button className="btn-secondary" onClick={()=>preset('trench')}>🏋️ Trench</button>
      </div>
    </div>
  );
}

// ── Team Selector ──
function TeamSelector({ selectedTeams, onTeamsChange }) {
  const handle=(e,idx)=>{const t=[...selectedTeams];t[idx]=e.target.value;onTeamsChange(t);};
  const add=()=>{if(selectedTeams.length<4)onTeamsChange([...selectedTeams,'']);};
  const remove=(idx)=>onTeamsChange(selectedTeams.filter((_,i)=>i!==idx));
  return (
    <div className="control-group">
      <label>🏈 Select Teams (2-4)</label>
      {selectedTeams.map((team,idx)=>(
        <div key={idx} className="team-select-container">
          <div className="team-select-wrapper">
            <TeamLogo teamName={team} size="small"/>
            <select value={team} onChange={e=>handle(e,idx)}>
              <option value="">-- Select Team --</option>
              {[...TEAM_NAMES].sort().map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            {selectedTeams.length>2&&(
              <button type="button" onClick={()=>remove(idx)} className="btn-danger btn-small" style={{width:'35px',padding:'8px'}}>✕</button>
            )}
          </div>
        </div>
      ))}
      {selectedTeams.length<4&&(
        <button type="button" onClick={add} className="btn-secondary" style={{marginTop:'10px',width:'100%'}}>+ Add Team</button>
      )}
      <div className="helper-text">Compare 2–4 teams. ✓ marks position winner.</div>
    </div>
  );
}

    <tr key={`drill_${pos}`}>
      <td colSpan={teams.length+1} style={{padding:'0',background:'rgba(0,0,0,0.0)'}}>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${teams.length},1fr)`,gap:'0',margin:'0 0 4px 0',borderTop:'1px solid rgba(255,215,0,0.15)'}}>
          {teams.map((team,ti)=>{
            const td=data.rosterData&&data.rosterData[team]||{};
            const allPlayers=(td[pos]||[]);
            const scored=allPlayers.map(p=>({...p,ws:calculatePlayerScore(p.attrs,pos,wts)}))
              .sort((a,b)=>{
                const so={'A':0,'O':1,'I':2,'IR':3};
                const sd=(so[a.status]||0)-(so[b.status]||0);
                return sd!==0?sd:b.ws-a.ws;
              });
            const maxWs=scored.length?Math.max(...scored.map(p=>p.ws)):100;
            const minWs=scored.length?Math.min(...scored.map(p=>p.ws)):60;
            const range=Math.max(maxWs-minWs,1);
            return(
              <div key={team} style={{background:ti%2===0?'rgba(8,18,35,0.97)':'rgba(12,28,20,0.97)',padding:'10px 12px',borderRight:ti<teams.length-1?'1px solid rgba(45,90,45,0.3)':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',paddingBottom:'6px',borderBottom:'1px solid rgba(255,215,0,0.2)'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <span style={{fontFamily:'Orbitron',fontSize:'0.78rem',color:'#ffd700',fontWeight:'700'}}>{team}</span>
                  <span style={{marginLeft:'auto',fontSize:'0.68rem',color:'#608060',fontFamily:'Orbitron'}}>{scored.length} players</span>
                </div>
                {scored.length===0
                  ?<div style={{color:'#608060',fontStyle:'italic',fontSize:'0.8rem',padding:'8px 0'}}>No players</div>
                  :scored.map((p,i)=>{
                    const barPct=Math.round(((p.ws-minWs)/range)*100);
                    const isIR=p.status==='IR';
                    const isI=p.status==='I';
                    return(
                      <div key={i}
                        onClick={()=>{haptic('light');setLightbox({player:p,position:pos,teamName:team});}}
                        className="haptic-btn"                        style={{padding:'5px 0',borderBottom:'1px solid rgba(45,90,45,0.15)',opacity:isIR?0.55:isI?0.75:1,cursor:'pointer',transition:'background 0.1s',borderRadius:'4px'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(74,158,255,0.08)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                      >
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',marginBottom:'3px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'5px',minWidth:0,flex:1}}>
                            <span style={{
                              color:STATUS_COLOR[p.status]||'#aaa',
                              background:STATUS_BG[p.status]||'transparent',
                              fontSize:'0.58rem',fontWeight:'900',minWidth:'18px',textAlign:'center',
                              border:`1px solid ${STATUS_COLOR[p.status]||'#aaa'}44`,
                              borderRadius:'3px',padding:'1px 3px',letterSpacing:'0.3px',flexShrink:0
                            }}>{p.status}</span>
                            {p.num&&<span style={{color:'#4a6a6a',fontSize:'0.7rem',flexShrink:0}}>#{p.num}</span>}
                            <span style={{color:isIR?'#888':isI?'#aaa':'#d0ecd0',fontSize:'0.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                            <span style={{color:isIR?'#888':'#4a9eff',fontWeight:'700',fontFamily:'Orbitron',fontSize:'0.8rem'}} title="Click for player card">{p.ws.toFixed(1)}</span>
                            <span style={{color:'#3a6a8a',fontSize:'0.6rem'}}>ℹ</span>
                          </div>
                        </div>
                        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:'2px',height:'3px',overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${barPct}%`,background:isIR?'#555':isI?'#888':i===0?'#ffd700':'#4a9eff',borderRadius:'2px',transition:'width 0.4s ease'}}/>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
            );
          })}
        </div>
      </td>
    </tr>
    );
  };

  const renderScoreRow=(label,scores,isGroupTotal=false,isUnitTotal=false,indent=false,pos=null)=>{
    const nums=scores.map(s=>parseFloat(s));
    const validNums=nums.filter(s=>!isNaN(s));
    const max=validNums.length?Math.max(...validNums):-Infinity;
    const tie=nums.filter(s=>s===max&&!isNaN(s)).length>1;
    let rowStyle={};
    if(isUnitTotal) rowStyle={fontWeight:'bold',background:label.includes('OFFENSE')?'rgba(42,157,143,0.28)':'rgba(220,50,60,0.28)'};
    else if(isGroupTotal) rowStyle={fontWeight:'bold',background:'rgba(255,215,0,0.08)',borderTop:'2px solid rgba(255,215,0,0.3)'};
    const isClickable=pos&&!isGroupTotal&&!isUnitTotal;
    const isExpanded=expandedPos===pos;
    if(isClickable&&rowStyle.background===undefined) rowStyle.cursor='pointer';
    return (
      <tr key={label} style={rowStyle}
        onClick={isClickable?()=>togglePos(pos):undefined}
        onMouseEnter={isClickable?e=>{e.currentTarget.style.background='rgba(45,90,45,0.25)';}:undefined}
        onMouseLeave={isClickable?e=>{e.currentTarget.style.background=rowStyle.background||'';}:undefined}>
        <td style={{paddingLeft:indent?'28px':'15px',color:indent?'#c0d8c0':isGroupTotal?'#ffd700':'#fff',fontSize:indent?'0.88rem':'0.95rem'}}>
          {indent&&<span style={{color:'#4a7c4a',marginRight:'6px'}}>└</span>}
          {label}
          {isClickable&&<span style={{fontSize:'0.68rem',color:'#4a7c4a',marginLeft:'6px',fontStyle:'italic'}}>{isExpanded?'▲ hide':'▼ players'}</span>}
        </td>
        {teams.map((team,i)=>{
          const isWinner=nums[i]===max&&!isNaN(nums[i])&&!tie;
          return(
            <td key={`${team}-${label}`} className={isWinner?'score-cell':''} style={{fontSize:indent?'0.9rem':'0.95rem'}}>
              {scores[i]}{isWinner&&<span className="advantage">✓</span>}
            </td>
          );
        })}
      </tr>
    );
  };
  const renderGroupHeader=(label,color)=>(
    <tr key={`hdr_${label}`} style={{background:'rgba(0,0,0,0.4)'}}>
      <td colSpan={teams.length+1} style={{padding:'8px 15px 5px',fontFamily:'Orbitron,sans-serif',fontSize:'0.8rem',fontWeight:'700',color,letterSpacing:'2px',textTransform:'uppercase',borderBottom:`2px solid ${color}33`}}>
        {label}
      </td>
    </tr>
  );
  const thStyle={display:'flex',alignItems:'center',gap:'8px'};
  const offenseRows=[];
  ['QB','HB','FB','TE','WR'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderGroupHeader('── Offensive Line ──','#4a9eff'));
  OL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderScoreRow('OL Group Total',teams.map(t=>data.teams[t]?.offensePositions['OL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['K','P'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  const defenseRows=[];
  defenseRows.push(renderGroupHeader('── Defensive Line ──','#ff6b6b'));
  DL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  defenseRows.push(renderScoreRow('DL Group Total',teams.map(t=>data.teams[t]?.defensePositions['DL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['LB','CB','S'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  return (
    <div className="card full-width">
      {lightbox && (
        <PlayerLightbox
          player={lightbox.player}
          position={lightbox.position}
          teamName={lightbox.teamName}
          allTeamsRosterData={data.rosterData}
          contractData={contractData}
          onClose={()=>setLightbox(null)}
        />
      )}
      <h3 className="card-title">📊 Position Comparison <span style={{fontSize:'0.7rem',color:'#608060',fontWeight:'400',letterSpacing:'0',textTransform:'none'}}>· click any row for player breakdown · click player for card</span></h3>
      <h4 style={{margin:'20px 0 12px',color:'#4a9eff',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔵 OFFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{offenseRows}{renderScoreRow('🔵 OFFENSE TOTAL',teams.map(t=>data.teams[t]?.offenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <h4 style={{margin:'25px 0 12px',color:'#ff6b6b',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔴 DEFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{defenseRows}{renderScoreRow('🔴 DEFENSE TOTAL',teams.map(t=>data.teams[t]?.defenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <div style={{marginTop:'25px',padding:'20px',background:'rgba(0,0,0,0.3)',borderRadius:'12px',border:'2px solid #2d5a2d'}}>
        <h4 style={{marginBottom:'15px',fontFamily:'Orbitron',color:'#ffd700',fontSize:'1.3rem'}}>🏆 OVERALL TEAM RANKINGS</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'15px'}}>
          {teams.map(team=>{
            const isWinner=data.overall.winner===team;
            return(
              <div key={team} style={{padding:'18px',borderRadius:'12px',
                background:isWinner?'linear-gradient(135deg,#2d5a2d,#1a3a1a)':'rgba(0,0,0,0.3)',
                border:isWinner?'3px solid #ffd700':'2px solid #2d5a2d',
                color:isWinner?'#fff':'#a0d2a0',textAlign:'center',
                boxShadow:isWinner?'0 0 20px rgba(255,215,0,0.4)':'none',
                transform:isWinner?'scale(1.05)':'scale(1)',transition:'all 0.3s'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'10px'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <div style={{fontWeight:'bold',fontSize:'1.1rem',fontFamily:'Orbitron'}}>{isWinner&&'👑 '}{team}</div>
                </div>
                <div style={{fontSize:'2.2rem',fontWeight:'900',fontFamily:'Orbitron',color:isWinner?'#ffd700':'#4a9eff'}}>
                  {data.teams[team]?.overallScore?.toFixed(1)}
                </div>
                <div style={{fontSize:'0.9rem',opacity:isWinner?1:0.7,marginTop:'5px'}}>Overall Score</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Charts ──
const TEAM_CHART_COLORS = [
  {border:'#4a9eff', bg:'rgba(74,158,255,0.15)'},
  {border:'#ffd700', bg:'rgba(255,215,0,0.15)'},
  {border:'#ff6b6b', bg:'rgba(255,107,107,0.15)'},
  {border:'#69BE28', bg:'rgba(105,190,40,0.15)'},
];

function ChartsPanel({ teams, data }) {
  const radarRef=useRef(null); const radarChart=useRef(null);
  const barRef=useRef(null);   const barChart=useRef(null);
  const hbarRef=useRef(null);  const hbarChart=useRef(null);
  const [activeChart, setActiveChart]=useState('radar');

  const buildData=()=>{
    if(!data||teams.length<2) return null;
    // Position scores for bar charts — all positions
    const allPos=[...POSITION_GROUPS.offense,...POSITION_GROUPS.defense];
    const posLabels=allPos.map(p=>POSITION_DISPLAY[p]||p);
    // Attribute averages for radar
    const attrScores=teams.map(team=>{
      const td=data.rosterData[team]||{};
      return ATTRIBUTES.map((_,ai)=>{
        let total=0,count=0;
        Object.values(td).forEach(players=>players.forEach(p=>{total+=p.attrs[ai];count++;}));
        return count>0?total/count:70;
      });
    });
    // Unit scores
    const unitLabels=['Offense','OL Group','DL Group','Defense','LB','CB','S'];
    const unitScores=teams.map(team=>[
      data.teams[team]?.offenseScore||0,
      data.teams[team]?.offensePositions?.OL_TOTAL||0,
      data.teams[team]?.defensePositions?.DL_TOTAL||0,
      data.teams[team]?.defenseScore||0,
      data.teams[team]?.defensePositions?.LB||0,
      data.teams[team]?.defensePositions?.CB||0,
      data.teams[team]?.defensePositions?.S||0,
    ]);
    // Position group scores for grouped bar
    const posScores=teams.map(team=>allPos.map(pos=>{
      const v=data.teams[team]?.offensePositions?.[pos]??data.teams[team]?.defensePositions?.[pos]??null;
      return v!==null?parseFloat(v.toFixed(1)):0;
    }));
    return {posLabels,posScores,attrScores,unitLabels,unitScores};
  };

  useEffect(()=>{
    if(!data||teams.length<2) return;
    const d=buildData();
    if(!d) return;
    Chart.defaults.color='#a0d2a0';
    Chart.defaults.borderColor='#2d5a2d';

    // Destroy all first
    [radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});

    // ── Radar: attribute averages ──
    if(radarRef.current&&activeChart==='radar'){
      radarChart.current=new Chart(radarRef.current.getContext('2d'),{
        type:'radar',
        data:{labels:ATTRIBUTES,datasets:teams.map((team,i)=>({
          label:team,data:d.attrScores[i],
          borderColor:TEAM_CHART_COLORS[i].border,backgroundColor:TEAM_CHART_COLORS[i].bg,
          borderWidth:2,pointRadius:4,pointHoverRadius:6
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{r:{angleLines:{color:'rgba(45,90,45,0.5)'},grid:{color:'rgba(45,90,45,0.3)'},
            pointLabels:{font:{size:11,weight:'700',family:'Orbitron'},color:'#ffd700'},
            ticks:{stepSize:5,backdropColor:'transparent',color:'#a0d2a0'},min:60,max:100}},
          plugins:{legend:{position:'bottom',labels:{padding:20,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.r?.toFixed(1)}`}}}}
      });
    }

    // ── Grouped Bar: position scores ──
    if(barRef.current&&activeChart==='bar'){
      barChart.current=new Chart(barRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.posLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.posScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.7'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.2)'},ticks:{font:{family:'Orbitron',size:9},color:'#a0d2a0',maxRotation:45}},
            y:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100,title:{display:true,text:'Score',color:'#608060'}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(1)}`}}}}
      });
    }

    // ── Horizontal Bar: unit comparison ──
    if(hbarRef.current&&activeChart==='units'){
      hbarChart.current=new Chart(hbarRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.unitLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.unitScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.75'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100},
            y:{grid:{color:'rgba(45,90,45,0.1)'},ticks:{color:'#ffd700',font:{family:'Orbitron',size:10}}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x?.toFixed(1)}`}}}}
      });
    }

    return ()=>[radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});
  },[teams,data,activeChart]);

  if(!data||teams.length<2){
    return(
      <div className="card full-width">
        <h3 className="card-title">📈 Visual Analysis</h3>
        <div className="loading">Select 2+ teams and run comparison to see charts</div>
      </div>
    );
  }

  const tabBtn=(id,label)=>(
    <button className={activeChart===id?'active btn-primary':'btn-secondary'}
      onClick={()=>setActiveChart(id)} style={{padding:'8px 16px',fontSize:'0.9rem'}}>{label}</button>
  );

  return(
    <div className="card full-width">
      <h3 className="card-title">📈 Visual Analysis</h3>
      {/* Team logo header */}
      <div style={{display:'flex',justifyContent:'center',gap:'24px',marginBottom:'18px',flexWrap:'wrap',alignItems:'center',padding:'12px 16px',background:'rgba(0,0,0,0.2)',borderRadius:'10px',border:'1px solid #2d5a2d'}}>
        {teams.map((team,i)=>(
          <div key={team} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
            <div style={{
              padding:'4px',borderRadius:'10px',
              border:`2px solid ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}`,
              background:'rgba(0,0,0,0.3)',
              filter:`drop-shadow(0 0 8px ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}55)`
            }}>
              <TeamLogo teamName={team} size="medium"/>
            </div>
            <div style={{fontFamily:'Orbitron',fontWeight:'700',fontSize:'0.75rem',color:TEAM_CHART_COLORS[i]?.border||'#ffd700',letterSpacing:'0.5px',textAlign:'center'}}>{team}</div>
          </div>
        ))}
      </div>
      <div className="chart-toggle" style={{marginBottom:'20px'}}>
        {tabBtn('radar','🕷️ Attributes Radar')}
        {tabBtn('bar','📊 Position Scores')}
        {tabBtn('units','↔ Unit Comparison')}
      </div>
      {activeChart==='radar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Average attribute ratings across each team's full active roster. Higher = better.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={radarRef}></canvas></div>
        </div>
      )}
      {activeChart==='bar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Weighted position group scores for every position — side by side.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={barRef}></canvas></div>
        </div>
      )}
      {activeChart==='units'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Horizontal comparison of key unit scores — instantly see where each team dominates.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={hbarRef}></canvas></div>
        </div>
      )}
    </div>
  );
}

// ── Positional Attribute Rankings Reference Panel ──
function PosAttrRanges() {
  const ATTR_LABELS_FULL = { SP:'Speed', AC:'Accuracy', AG:'Agility', ST:'Strength', HA:'Hands', EN:'Endurance', IN:'Intelligence', DI:'Discipline' };
  const positions = Object.keys(POS_ACTUAL_MAX).sort();
  return (
    <div style={{padding:'20px'}}>
      <div style={{marginBottom:'16px',color:'#a0d2a0',fontFamily:'Roboto Condensed',fontSize:'0.9rem'}}>
        Minimum actual ratings and maximum potential ratings per position. Use this as a reference when evaluating player development ceilings.
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {positions.map(pos=>{
          const aMax = POS_ACTUAL_MAX[pos];
          const pMax = POS_POTENTIAL_MAX[pos];
          const aTotal = aMax.reduce((s,v)=>s+v,0);
          const pTotal = pMax.reduce((s,v)=>s+v,0);
          return (
            <div key={pos} style={{
              background:'rgba(10,22,40,0.7)',border:'1px solid #2d5a2d',
              borderRadius:'10px',overflow:'hidden'
            }}>
              {/* Position header */}
              <div style={{
                padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',
                background:'linear-gradient(90deg,rgba(13,40,24,0.9),rgba(10,22,40,0.9))',
                borderBottom:'1px solid #2d5a2d'
              }}>
                <span style={{fontFamily:'Orbitron',fontWeight:'900',fontSize:'1rem',color:'#ffd700',letterSpacing:'1px'}}>{POSITION_DISPLAY[pos]||pos}</span>
                <div style={{display:'flex',gap:'16px',fontSize:'0.72rem',fontFamily:'Roboto Condensed'}}>
                  <span style={{color:'#80b8ff'}}>Min Actual Total: <strong style={{color:'#a0d2ff'}}>{aTotal}</strong></span>
                  <span style={{color:'#ff9944'}}>Max Potential Total: <strong style={{color:'#ffb870'}}>{pTotal}</strong></span>
                </div>
              </div>
              {/* Attribute grid */}
              <div style={{padding:'10px 14px'}}>
                {/* Attribute name pills */}
                <div style={{display:'grid',gridTemplateColumns:'80px repeat(8,1fr)',gap:'4px',marginBottom:'6px'}}>
                  <div/>

// ── Player Lightbox ──
function PlayerLightbox({ player, position, teamName, allTeamsRosterData, contractData, onClose }) {
  if (!player || !position) return null;
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  // Player's own potential attrs (from roster fetch), or fall back to position max if not available
  const pattrs = (player.pattrs && player.pattrs.length === 8 && player.pattrs.every(v => v > 0))
    ? player.pattrs : pMax;
  const hasPattrs = !!(player.pattrs && player.pattrs.length === 8 && player.pattrs.every(v => v > 0));

  const actualTotal = player.attrs.reduce((s,v)=>s+v,0);
  const playerPotentialTotal = pattrs.reduce((s,v)=>s+v,0);
  const potentialTotal = pMax.reduce((s,v)=>s+v,0);
  // % of player's own potential (not position max)
  const pctOfPlayerPotential = Math.round((actualTotal / playerPotentialTotal) * 100);
  // Count how many attrs are at or above the player's potential ceiling
  const maxedCount = player.attrs.filter((v,i) => v >= pattrs[i]).length;
  const pctOfMax = pctOfPlayerPotential;

  // League ranking: compare player's score vs all same-position players across all teams
  const weights = loadWeights();
  const playerScore = calculatePlayerScore(player.attrs, position, weights);
  const allSamePos = [];
  Object.values(allTeamsRosterData || {}).forEach(teamData => {
    (teamData[position] || []).forEach(p => {
      allSamePos.push({ name: p.name, score: calculatePlayerScore(p.attrs, position, weights) });
    });
  });
  allSamePos.sort((a,b) => b.score - a.score);
  const leagueRank = allSamePos.findIndex(p => p.name === player.name) + 1;
  const leagueTotal = allSamePos.length;

  const barColor = pctOfMax >= 90 ? '#4aff4a' : pctOfMax >= 75 ? '#ffd700' : pctOfMax >= 55 ? '#4a9eff' : '#ff6b6b';

  // Contract data lookup — try by name and player num as PID
  const contract = lookupContract(contractData, player.name, player.num);
  const hasContract = !!contract;

  return (
    <div onClick={onClose} className="lightbox-outer" style={{
      position:'fixed',inset:0,zIndex:9999,
      background:'rgba(0,0,0,0.85)',
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'20px',backdropFilter:'blur(4px)'
    }}>
      <div onClick={e=>e.stopPropagation()} className="lightbox-inner" style={{
        background:'linear-gradient(135deg,rgba(10,22,40,0.99),rgba(13,40,24,0.99))',
        border:'2px solid #ffd700',borderRadius:'16px',
        maxWidth:'600px',width:'100%',maxHeight:'90vh',overflowY:'auto',
        boxShadow:'0 0 60px rgba(255,215,0,0.15)',
        position:'relative'
      }}>
        {/* Close */}
        <button onClick={onClose} style={{
          position:'absolute',top:'12px',right:'12px',
          background:'rgba(255,100,100,0.15)',border:'1px solid #ff4a4a44',
          borderRadius:'50%',width:'30px',height:'30px',color:'#ff6b6b',
          cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'
        }}>✕</button>

        {/* Header: logo + name */}
        <div style={{
          padding:'20px 24px 16px',
          borderBottom:'1px solid #2d5a2d',
          display:'flex',alignItems:'center',gap:'16px'
        }}>
          <div style={{filter:'drop-shadow(0 0 10px rgba(255,215,0,0.4))'}}>
            <TeamLogo teamName={teamName} size="medium"/>
          </div>
          <div>
            <div style={{fontFamily:'Orbitron',fontWeight:'900',fontSize:'1.2rem',color:'#fff',letterSpacing:'0.5px'}}>{player.name}</div>
            <div style={{display:'flex',gap:'10px',marginTop:'5px',alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontFamily:'Orbitron',fontSize:'0.75rem',color:'#ffd700',letterSpacing:'1px'}}>{POSITION_DISPLAY[position]||position}</span>
              {player.num && <span style={{color:'#608060',fontSize:'0.8rem',fontFamily:'Roboto Condensed'}}>#{player.num}</span>}
              <span style={{
                fontSize:'0.68rem',fontFamily:'Orbitron',fontWeight:'700',letterSpacing:'1px',
                padding:'2px 7px',borderRadius:'4px',
                color:player.status==='A'?'#4aff4a':player.status==='O'?'#ffd700':player.status==='I'?'#ff9944':'#ff4444',
                background:player.status==='A'?'rgba(74,255,74,0.1)':player.status==='O'?'rgba(255,215,0,0.1)':player.status==='I'?'rgba(255,153,68,0.08)':'rgba(255,68,68,0.08)',
                border:`1px solid ${player.status==='A'?'#4aff4a44':player.status==='O'?'#ffd70044':player.status==='I'?'#ff994444':'#ff444444'}`
              }}>{player.status}</span>

            <div style={{marginBottom:'14px',padding:'8px 12px',background:'rgba(0,0,0,0.15)',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.05)',fontSize:'0.72rem',color:'#404050',fontFamily:'Roboto Condensed',textAlign:'center'}}>

          <div style={{marginTop:'8px',fontSize:'0.65rem',color:'#3a5a3a',fontFamily:'Roboto Condensed',textAlign:'center'}}>

        </div>
      </div>

// ── Trade Analyzer ──
function TradeAnalyzer({ getTeamData, weights, depth, designation }) {
  const [teamA,setTeamA]=useState('');
  const [teamB,setTeamB]=useState('');
  const [giveAway,setGiveAway]=useState([]);
  const [getBack,setGetBack]=useState([]);
  const [result,setResult]=useState(null);

  const getPlayers=(team)=>{
    const td=getTeamData(team)||{};
    const out=[];
    Object.entries(td).forEach(([pos,players])=>(players||[]).forEach(p=>out.push({...p,pos,key:`${pos}_${p.name}`})));
    return out.sort((a,b)=>a.pos.localeCompare(b.pos)||a.name.localeCompare(b.name));
  };
  const togglePlayer=(list,setList,player)=>{
    const k=player.key;
    setList(prev=>prev.find(p=>p.key===k)?prev.filter(p=>p.key!==k):[...prev,player]);
  };
  const DeltaBadge=({before,after,label})=>{
    const diff=(after-before); const d=diff.toFixed(1);
    const up=diff>0.05; const down=diff<-0.05;
    return(
      <div style={{textAlign:'center',padding:'10px',background:'rgba(0,0,0,0.3)',borderRadius:'8px',border:'1px solid #2d5a2d'}}>
        <div style={{fontSize:'0.68rem',color:'#608060',textTransform:'uppercase',letterSpacing:'1px',fontFamily:'Orbitron',marginBottom:'3px'}}>{label}</div>

        </div>
      </div>
    );
  };
  const analyzeTrade=()=>{
    if(!teamA||!teamB){alert('Select both teams first');return;}
    if(giveAway.length===0&&getBack.length===0){alert('Select at least one player to trade');return;}
    const cloneRoster=(team)=>JSON.parse(JSON.stringify(getTeamData(team)||buildPlaceholderRoster(team)));
    const tdA=cloneRoster(teamA); const tdB=cloneRoster(teamB);
    const beforeA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const beforeB=computeTeamResult(teamB,tdB,weights,depth,designation);
    const move=(src,dest,players)=>players.forEach(p=>{
      const pos=p.pos;
      if(src[pos]) src[pos]=src[pos].filter(pl=>pl.name!==p.name);
      if(!dest[pos]) dest[pos]=[];
      dest[pos].push({name:p.name,num:p.num,status:p.status,attrs:p.attrs});
    });
    move(tdA,tdB,giveAway); move(tdB,tdA,getBack);
    const afterA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const afterB=computeTeamResult(teamB,tdB,weights,depth,designation);
    setResult({beforeA,afterA,beforeB,afterB});

            {sel&&<span style={{color:'#4a9eff',fontSize:'0.82rem'}}>✓</span>}
          </div>
        );
      })}
    </div>
  );
  return(
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'16px',color:'#a0d2a0'}}>Select two teams, pick players to swap on each side, then analyze the score impact instantly.</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'16px'}}>
          {[{id:'A',label:'Team A — gives away',val:teamA,setVal:(v)=>{setTeamA(v);setGiveAway([]);},list:giveAway,setList:setGiveAway,other:teamB},
            {id:'B',label:'Team B — gives away',val:teamB,setVal:(v)=>{setTeamB(v);setGetBack([]);},list:getBack,setList:setGetBack,other:teamA}
          ].map(({id,label,val,setVal,list,setList,other})=>(
            <div key={id}>
              <div style={{fontFamily:'Orbitron',color:'#4a9eff',fontSize:'0.85rem',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'1px'}}>{label}</div>

                <option value="">-- Select Team --</option>

        </div>
        {(giveAway.length>0||getBack.length>0)&&(
          <div style={{background:'rgba(0,0,0,0.25)',borderRadius:'8px',padding:'10px 14px',marginBottom:'14px',border:'1px solid #2d5a2d',fontSize:'0.85rem',color:'#a0d2a0'}}>
            <strong style={{color:'#ffd700'}}>Trade: </strong>
            {giveAway.length>0&&<span>{teamA} sends {giveAway.map(p=>`${p.name}(${p.pos})`).join(', ')} </span>}
            {getBack.length>0&&<span>| {teamB} sends {getBack.map(p=>`${p.name}(${p.pos})`).join(', ')}</span>}

        <button className="btn-primary" onClick={analyzeTrade} style={{width:'100%',fontSize:'1.1rem',padding:'13px',marginBottom:'18px'}}>

}

const LPR_TIER = (rank) => {
  if (rank === 1)        return { label:'👑 ELITE',       color:'#ffd700', bg:'rgba(255,215,0,0.10)',  glow:'rgba(255,215,0,0.25)' };
  if (rank <= 3)         return { label:'🔥 CONTENDER',   color:'#ff9944', bg:'rgba(255,153,68,0.08)', glow:'rgba(255,153,68,0.2)' };
  if (rank <= 6)         return { label:'⚡ CHALLENGER',  color:'#4a9eff', bg:'rgba(74,158,255,0.07)', glow:'rgba(74,158,255,0.15)' };
  if (rank <= 10)        return { label:'🏈 CONTENDING',  color:'#a0d2a0', bg:'rgba(74,200,100,0.06)', glow:'rgba(74,200,100,0.1)' };
  if (rank <= 14)        return { label:'📉 MID-PACK',    color:'#808090', bg:'rgba(80,80,100,0.07)',  glow:'none' };
  return                        { label:'🔧 REBUILDING',  color:'#606060', bg:'rgba(60,60,60,0.06)',   glow:'none' };
};

const LPR_BLURB = (r) => {
  const { rank, wins, pts, oppsDefeated } = r;
  const oppCount = oppsDefeated.length;
  if (wins === 0)   return `Still searching for their first win — early-season adversity builds character.`;
  if (rank === 1 && wins >= 3) return `Sitting at the top of the league with a dominant ${wins}-win record and ${pts} power points. Setting the standard.`;
  if (rank <= 3)    return `Among the league elite at ${wins}-${0} — ${oppCount} quality ${oppCount === 1 ? 'victory' : 'victories'} powering a ${pts}-pt ranking.`;
  if (rank <= 6)    return `A strong ${wins}-win campaign with ${pts} power points puts them firmly in playoff contention.`;
  if (rank <= 10)   return `Sitting at ${wins}-${0} with ${pts} pts — firmly in the mix but still room to climb.`;
  if (rank <= 14)   return `${wins > 0 ? `A ${wins}-win showing` : 'Still winless'} — needs consistency to move up the standings.`;
  return `${wins > 0 ? `${wins} win on the board` : 'No wins yet'} — a long road ahead for playoff positioning.`;
};
