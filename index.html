<script>
// ── Contract XLSX Web Worker (Blob URL) ──
// Parses the contract file off the main thread so UI stays responsive
const _workerCode = `
self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');

const TEAM_SHEET_MAP = {
  'JAX':'Jacksonville','JACK':'Jacksonville',
  'BUF':'Buffalo','BUFF':'Buffalo',
  'NE':'New England','NEP':'New England','NWE':'New England',
  'MIA':'Miami',
  'DEN':'Denver',
  'LVR':'Las Vegas','LV':'Las Vegas','LAS':'Las Vegas','OAK':'Las Vegas','LVG':'Las Vegas',
  'CIN':'Cincinnati','CINC':'Cincinnati',
  'LAC':'Los Angeles','LAR':'Los Angeles','LA':'Los Angeles','LAL':'Los Angeles','LOS':'Los Angeles',
  'PIT':'Pittsburgh','PITT':'Pittsburgh',
  'ATL':'Atlanta',
  'WSH':'Washington','WAS':'Washington','WASH':'Washington','DC':'Washington',
  'NYG':'New York','NYJ':'New York','NY':'New York',
  'PHI':'Philadelphia','PHIL':'Philadelphia',
  'SF':'San Francisco','SFO':'San Francisco',
  'ARI':'Chicago','CHI':'Chicago','CHIC':'Chicago','ARZ':'Chicago',
  'MIN':'Minnesota','MINN':'Minnesota',
  'SEA':'Seattle',
  'GB':'Green Bay','GNB':'Green Bay','GRN':'Green Bay',
};
const FULL_NAME_MAP = {
  'Jacksonville':1,'Buffalo':1,'New England':1,'Miami':1,'Denver':1,
  'Las Vegas':1,'Cincinnati':1,'Los Angeles':1,'Pittsburgh':1,'Atlanta':1,
  'Washington':1,'New York':1,'Philadelphia':1,'San Francisco':1,
  'Chicago':1,'Minnesota':1,'Seattle':1,'Green Bay':1,
};
function resolveSheetTeam(name) {
  const t = name.trim();
  if (TEAM_SHEET_MAP[t]) return TEAM_SHEET_MAP[t];
  if (TEAM_SHEET_MAP[t.toUpperCase()]) return TEAM_SHEET_MAP[t.toUpperCase()];
  if (FULL_NAME_MAP[t]) return t;
  return null;
}

self.onmessage = function(e) {
  try {
    const { arrayBuffer, id } = e.data;
    const wb = XLSX.read(arrayBuffer, { type: 'array', raw: false });
    const teamSheets = wb.SheetNames.filter(n => resolveSheetTeam(n) !== null);
    const contracts = {};
    let totalPlayers = 0;

    teamSheets.forEach(sheetName => {
      const ws = wb.Sheets[sheetName];
      if (!ws) return;
      const teamName = resolveSheetTeam(sheetName);
      const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!rawRows || rawRows.length < 3) return;

      let headerRowIdx = -1;
      for (let i = 0; i < Math.min(5, rawRows.length); i++) {
        const row = rawRows[i].map(c => String(c).trim().toLowerCase());
        if (row.includes('pid') && row.includes('first') && row.includes('last')) { headerRowIdx = i; break; }
      }
      if (headerRowIdx === -1) return;

      const headers = rawRows[headerRowIdx].map(c => String(c).trim());
      const col = {};
      const contractYearCols = [];
      const peekRows = rawRows.slice(headerRowIdx + 1, headerRowIdx + 6);

      headers.forEach((h, i) => {
        const lh = h.toLowerCase().replace(/\\s+/g,'');
        const hr = h.trim();
        if      (lh === 'pid')                         col.pid = i;
        else if (lh === 'draftslot' || lh === 'draft') col.draftSlot = i;
        else if (lh === 'first')                        col.first = i;
        else if (lh === 'last')                         col.last = i;
        else if (lh === 'team')                         col.team = i;
        else if (lh === 'pos' || lh === 'position')     col.pos = i;
        else if (lh === 'year' || lh === 'years')       col.year = i;
        else if (/^\\$?20\\d{2}\\$?$/.test(hr) || /^20\\d{2}$/.test(hr)) {
          const yr = parseInt(hr.replace(/[$]/g,''));
          if (isNaN(yr)) return;
          let hasDollarVal = false, hasXMark = false;
          for (const pr of peekRows) {
            if (!pr) continue;
            const v = String(pr[i] || '').trim().replace(/[$,]/g,'');
            if (v === 'X' || v === 'x' || v === '1') { hasXMark = true; break; }
            const n = parseFloat(v);
            if (!isNaN(n) && n > 1000) { hasDollarVal = true; break; }
          }
          if (hasDollarVal) { col['salary_' + yr] = i; contractYearCols.push({ year: yr, idx: i, isSalary: true }); }
          else              { contractYearCols.push({ year: yr, idx: i, isSalary: false }); }
        }
      });

      if (col.first === undefined || col.last === undefined) return;

      for (let ri = headerRowIdx + 1; ri < rawRows.length; ri++) {
        const row = rawRows[ri];
        if (!row || row.length < 3) continue;
        const firstName = String(row[col.first] || '').trim();
        const lastName  = String(row[col.last]  || '').trim();
        if (!firstName && !lastName) continue;
        const fullName = [firstName, lastName].filter(Boolean).join(' ');
        if (fullName.length < 2) continue;

        const pid       = col.pid       !== undefined ? String(row[col.pid]       || '').trim() : '';
        const draftSlot = col.draftSlot !== undefined ? String(row[col.draftSlot] || '').trim() : '';
        const pos       = col.pos       !== undefined ? String(row[col.pos]       || '').trim().toUpperCase() : '';
        const yearsLeft = col.year      !== undefined ? String(row[col.year]      || '').trim() : '';

        const salaries = {};
        Object.keys(col).filter(k => k.startsWith('salary_')).forEach(k => {
          const yr = parseInt(k.replace('salary_',''));
          const raw = String(row[col[k]] || '').trim().replace(/[$,]/g,'');
          const num = parseFloat(raw);
          if (!isNaN(num) && num > 0) salaries[yr] = num;
        });
        const salaryYears = Object.keys(salaries).map(Number).sort((a,b)=>a-b);
        const currentSalaryYear = salaryYears[0] || null;
        const nextSalaryYear    = salaryYears[1] || null;
        const currentSalary     = currentSalaryYear ? salaries[currentSalaryYear] : null;
        const nextSalary        = nextSalaryYear    ? salaries[nextSalaryYear]    : null;

        const ds = draftSlot.toUpperCase().trim();
        let draftRound = '', draftPick = '', draftTeam = '';
        const m2 = ds.match(/^(\\d+)-([A-Z]+)-(\\d+)-(\\d+)$/);
        const m1 = ds.match(/^([A-Z]+)\\s+(\\d+)-(\\d+)$/);
        const m3 = ds.match(/^([A-Z]+)\\s*(\\d+)-(\\d+)$/);
        if (m2) { draftTeam=m2[2]; draftRound=m2[3]; draftPick=m2[4]; }
        else if (m1) { draftTeam=m1[1]; draftRound=m1[2]; draftPick=m1[3]; }
        else if (m3) { draftTeam=m3[1]; draftRound=m3[2]; draftPick=m3[3]; }
        else if (ds==='X'||ds==='') draftRound='UDFA';
        else draftRound=ds;

        const contractedYears = contractYearCols
          .filter(({idx,isSalary}) => { if (isSalary) return false; const v=String(row[idx]||'').trim().toUpperCase(); return v==='X'||v==='1'; })
          .map(({year}) => year);
        const contractStart  = contractedYears.length ? Math.min(...contractedYears) : null;
        const contractEnd    = contractedYears.length ? Math.max(...contractedYears) : null;
        const contractLength = contractedYears.length;

        const contract = {
          playerName:fullName, firstName, lastName, team:teamName, position:pos,
          playerId:pid, draftSlot, draftRound, draftPick, draftTeam,
          yearsLeft: yearsLeft !== '' ? yearsLeft : String(contractLength),
          contractLength, contractStart, contractEnd, contractYearList:contractedYears,
          salaries, currentSalaryYear, nextSalaryYear, currentSalary, nextSalary, sheetName,
        };

        const key = fullName.toLowerCase().replace(/[^a-z0-9]/g,'');
        if (key.length > 1) { contracts[key] = contract; totalPlayers++; }
        const lnKey = '_last_' + lastName.toLowerCase().replace(/[^a-z]/g,'');
        if (!contracts[lnKey]) contracts[lnKey] = [];
        contracts[lnKey].push(contract);
        if (pid && pid !== 'X') contracts['_pid_' + pid] = contract;
      }
    });

    self.postMessage({ id, ok: true, contracts, teamCount: teamSheets.length, playerCount: totalPlayers });
  } catch(err) {
    self.postMessage({ id: e.data.id, ok: false, error: err.message });
  }
};
`;
let _contractWorker = null;
let _workerCallbacks = {};
let _workerCallId = 0;

function getContractWorker() {
  if (_contractWorker) return _contractWorker;
  try {
    const blob = new Blob([_workerCode], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    _contractWorker = new Worker(url);
    _contractWorker.onmessage = (e) => {
      const { id, ok, contracts, teamCount, playerCount, error } = e.data;
      const cb = _workerCallbacks[id];
      if (cb) { delete _workerCallbacks[id]; cb(ok, { contracts, teamCount, playerCount, error }); }
    };
    _contractWorker.onerror = (e) => {
      console.error('[ContractWorker] Error:', e.message);
      // Terminate and reset so next call falls back to main-thread parsing
      _contractWorker.terminate();
      _contractWorker = null;
    };
    return _contractWorker;
  } catch(e) {
    console.warn('[ContractWorker] Could not create worker:', e.message);
    return null;
  }
}

// Async wrapper: parse off main thread if possible, fall back to parseContractXLSX() sync
function parseContractAsync(arrayBuffer) {
  return new Promise((resolve, reject) => {
    const worker = getContractWorker();
    if (!worker) {
      // Fall back to main thread
      try { resolve(parseContractXLSX(arrayBuffer)); } catch(e) { reject(e); }
      return;
    }
    const id = ++_workerCallId;
    _workerCallbacks[id] = (ok, data) => {
      if (ok) {
        resolve({
          contracts:   data.contracts,
          teamCount:   data.teamCount,
          playerCount: data.playerCount,
          fetchedAt:   new Date().toISOString(),
          sheets:      [],
        });
      } else {
        // Worker failed — fall back to main thread
        console.warn('[ContractWorker] Falling back to main thread:', data.error);
        try { resolve(parseContractXLSX(arrayBuffer)); } catch(e) { reject(e); }
      }
    };
    worker.postMessage({ id, arrayBuffer }, [arrayBuffer]);
  });
}
</script>

<script>
// ── PNFL AI Analyst v5.4 ──
// Dual-mode: Ollama (local, no CORS) OR Cloudflare proxy → HuggingFace (cloud)
// Ollama runs locally on the user's machine — zero API keys, zero cost, no CORS.
// Ollama download: https://ollama.com  — then: ollama pull qwen2.5:1.5b

window.pnflAI = {
  _ready:      false,
  _loading:    false,
  _error:      null,
  _apiKey:     '',
  _proxyUrl:   '',
  _model:      'llama3.2:1b',
  _modelLabel: 'Llama 3.2 1B',
  _mode:       'ollama',  // 'ollama' | 'hf'
  _ollamaUrl:  'http://localhost:11434',

  isReady:    function() { return window.pnflAI._ready; },
  isLoading:  function() { return window.pnflAI._loading; },
  getError:   function() { return window.pnflAI._error; },
  getMode:    function() { return window.pnflAI._mode; },
  getModel:   function() { return window.pnflAI._modelLabel || window.pnflAI._model; },

  setProxyUrl: function(url) {
    const clean = (url || '').trim().replace(/\/+$/, '');
    window.pnflAI._proxyUrl = clean;
    if (clean) sessionStorage.setItem('pnfl_proxy_url', clean);
  },

  _diagnose: function(status, body) {
    const b = (body || '').toLowerCase();
    if (status === 410 || b.includes('no longer supported'))
      return 'WORKER_OUTDATED: Redeploy Cloudflare Worker with pnfl_ai_proxy_worker.js v3+.';
    if (status === 401 || (b.includes('invalid') && b.includes('token')))
      return 'INVALID_TOKEN: HF token invalid — copy full hf_... from huggingface.co/settings/tokens.';
    if (status === 403 || b.includes('authorization error') || b.includes('inference api'))
      return 'NO_PERMISSION: Token needs "Make calls to the serverless Inference API" scope at huggingface.co/settings/tokens.';
    if (status === 404)
      return 'NOT_FOUND: Model unavailable on free HF tier. Worker v3 tries 7 fallback models — redeploy it.';
    if (status === 503) return 'MODEL_LOADING';
    if (status === 429) return 'RATE_LIMIT';
    if (status === 502) return 'ALL_FAILED: All free HF models unavailable right now. Try again in a few minutes or switch to Ollama mode.';
    if (status === 0 || b.includes('failed to fetch') || b.includes('networkerror'))
      return 'NETWORK: Cannot reach the endpoint. Check your Worker URL or Ollama is running.';
    return 'HTTP_' + status + ': ' + (body || '').slice(0, 200);
  },

  // ── Ollama: ping localhost to check if running + model available ──
  _pingOllama: async function(ollamaUrl, model) {
    const url = (ollamaUrl || 'http://localhost:11434') + '/api/tags';
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
      if (!res.ok) return { ok: false, reason: 'Ollama responded with HTTP ' + res.status };
      const data = await res.json();
      const models = (data.models || []).map(m => m.name);
      const found  = models.some(m => m === model || m.startsWith(model.split(':')[0]));
      return { ok: true, models, found, exact: found ? model : (models[0] || '') };
    } catch(e) {
      const msg = (e.message || '').toLowerCase();
      // CORS or mixed-content block — Ollama IS running but browser is blocked
      if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('cors') || msg.includes('blocked')) {
        return {
          ok: false,
          corsBlocked: true,
          reason: 'CORS_BLOCKED: Ollama is running but your browser is blocking the connection from ' + location.origin + '.\n\nFix: set the OLLAMA_ORIGINS environment variable so Ollama allows this page.\n\nSee the setup instructions below.'
        };
      }
      // Timeout — likely not running
      if (msg.includes('timeout') || msg.includes('aborted')) {
        return { ok: false, reason: 'Ollama not responding (timeout). Make sure Ollama is running.' };
      }
      return { ok: false, reason: 'Cannot reach Ollama: ' + e.message };
    }
  },

  // ── Ollama: streaming chat completion ──
  // onToken(chunk) called for each streamed token — enables live typing display
    _askOllama: async function(systemPrompt, userMessage, maxTokens, onToken) {
    const ai = window.pnflAI;
    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 45000);
    try {
      const res = await fetch(ai._ollamaUrl + '/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          model:   ai._model,
          stream:  true,
          options: { num_predict: maxTokens || 180, temperature: 0.4, num_ctx: 2048, num_thread: 4 },
          messages:[
            { role:'system', content: systemPrompt },
            { role:'user',   content: userMessage  },
          ],
        }),
        signal: controller.signal,
      });
      if (!res.ok) { const t = await res.text(); throw new Error('Ollama ' + res.status + ': ' + t.slice(0,120)); }
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   full    = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value, { stream:true }).split('\n').filter(Boolean);
        for (const line of lines) {
          try {
            const obj = JSON.parse(line);
            const tok = obj?.message?.content || obj?.response || '';
            if (tok) { full += tok; if (onToken) onToken(full); }
            if (obj.done) break;
          } catch {}
        }
      }
      return full.trim() || '(no response)';
    } catch(e) {
      if (e.name === 'AbortError') throw new Error('Timed out (45s). Switch to a faster model: llama3.2:1b is the quickest.');
      throw e;
    } finally { clearTimeout(timeoutId); }
  },

  // ── HF proxy: chat completion ──
  _askHF: async function(systemPrompt, userMessage, maxTokens) {
    const ai    = window.pnflAI;
    const proxy = ai._proxyUrl || sessionStorage.getItem('pnfl_proxy_url') || '';
    if (!proxy) throw new Error('NO_PROXY: No Cloudflare Worker URL — open AI connect modal and enter your workers.dev URL.');
    const res = await fetch(proxy, {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + ai._apiKey, 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        model:       ai._model,
        messages:    [{ role:'system',content:systemPrompt },{ role:'user',content:userMessage }],
        max_tokens:  maxTokens || 300,
        temperature: 0.4,
        stream:      false,
      }),
      signal: AbortSignal.timeout(30000),
    });
    const txt = await res.text();
    const workingModel = res.headers.get('X-Working-Model') || '';
    if (workingModel && workingModel !== ai._model) {
      ai._model = workingModel;
      ai._modelLabel = workingModel.split('/').pop();
      sessionStorage.setItem('pnfl_ai_model', workingModel);
    }
    if (res.status !== 200) {
      const msg = ai._diagnose(res.status, txt);
      if (msg === 'MODEL_LOADING') return '⏳ Model loading — wait 20s and retry.';
      if (msg === 'RATE_LIMIT')    return '⏳ Rate limit — wait a moment and retry.';
      throw new Error(msg);
    }
    try {
      const d = JSON.parse(txt);
      if (d.choices?.[0]?.message?.content) return d.choices[0].message.content.trim();
      if (Array.isArray(d) && d[0]?.generated_text) return d[0].generated_text.trim();
      if (d.generated_text) return String(d.generated_text).trim();
      return JSON.stringify(d).slice(0,400);
    } catch { return txt.slice(0,400); }
  },

  // ── load: validate connection ──
  load: async function(apiKey, proxyUrl, mode, ollamaModel, ollamaUrl) {
    const ai = window.pnflAI;
    if (ai._loading) return;
    ai._loading = true;
    ai._error   = null;
    ai._ready   = false;

    const selectedMode = mode || 'ollama';
    ai._mode = selectedMode;
    sessionStorage.setItem('pnfl_ai_mode', selectedMode);

    if (selectedMode === 'ollama') {
      // ── Ollama mode ──
      const oUrl   = (ollamaUrl   || 'http://localhost:11434').trim().replace(/\/+$/,'');
      const oModel = (ollamaModel || 'llama3.2:1b').trim();
      ai._ollamaUrl = oUrl;
      sessionStorage.setItem('pnfl_ollama_url',   oUrl);
      sessionStorage.setItem('pnfl_ollama_model', oModel);

      const ping = await ai._pingOllama(oUrl, oModel);
      if (!ping.ok) {
        ai._error = ping.reason;
        ai._loading = false;
        throw new Error(ai._error);
      }

      // Use exact model name if found, otherwise use first available
      ai._model      = ping.exact || oModel;
      ai._modelLabel = ai._model.replace(':latest','');
      ai._ready      = true;
      ai._loading    = false;
      sessionStorage.setItem('pnfl_ai_model', ai._model);
      console.log('[PNFL AI] Ollama connected — model:', ai._model, '| available:', ping.models.join(', '));
      return;
    }

    // ── HF mode ──
    const key   = (apiKey   || '').trim();
    const proxy = (proxyUrl || sessionStorage.getItem('pnfl_proxy_url') || '').trim().replace(/\/+$/,'');

    if (!key || !key.startsWith('hf_') || key.length < 20) {
      ai._error = 'HuggingFace token must start with hf_ and be at least 20 characters.';
      ai._loading = false;
      throw new Error(ai._error);
    }

    ai._apiKey   = key;
    ai._proxyUrl = proxy;
    if (proxy) sessionStorage.setItem('pnfl_proxy_url', proxy);
    sessionStorage.setItem('pnfl_ai_key', key);

    if (!proxy) {
      ai._model = 'Qwen/Qwen2.5-7B-Instruct';
      ai._modelLabel = 'Qwen2.5 7B';
      ai._ready   = true;
      ai._loading = false;
      return;
    }

    let testStatus = 0, testBody = '', workingModel = '';
    try {
      const res = await fetch(proxy, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ model:'Qwen/Qwen2.5-7B-Instruct', messages:[{role:'user',content:'Hi'}], max_tokens:5 }),
        signal:  AbortSignal.timeout(20000),
      });
      testStatus   = res.status;
      testBody     = await res.text();
      workingModel = res.headers.get('X-Working-Model') || '';
    } catch(e) { testStatus = 0; testBody = e.message; }

    if (testStatus === 200 || testStatus === 503) {
      if (workingModel) { ai._model = workingModel; ai._modelLabel = workingModel.split('/').pop(); }
      sessionStorage.setItem('pnfl_ai_model', ai._model);
      ai._ready   = true;
      ai._loading = false;
      return;
    }

    ai._error   = ai._diagnose(testStatus, testBody);
    ai._loading = false;
    throw new Error(ai._error);
  },

  ask: async function(systemPrompt, userMessage, maxTokens, onToken) {
    const ai = window.pnflAI;
    if (!ai._ready) throw new Error('Not connected — configure AI in the header bar.');
    if (ai._mode === 'ollama') return ai._askOllama(systemPrompt, userMessage, maxTokens, onToken);
    return ai._askHF(systemPrompt, userMessage, maxTokens);
  },

  restore: function() {
    try {
      const mode       = sessionStorage.getItem('pnfl_ai_mode')        || 'ollama';
      const key        = sessionStorage.getItem('pnfl_ai_key')         || '';
      const proxy      = sessionStorage.getItem('pnfl_proxy_url')      || '';
      const model      = sessionStorage.getItem('pnfl_ai_model')       || '';
      const ollamaUrl  = sessionStorage.getItem('pnfl_ollama_url')     || 'http://localhost:11434';
      const ollamaModel= sessionStorage.getItem('pnfl_ollama_model')   || 'llama3.2:1b';

      window.pnflAI._mode      = mode;
      window.pnflAI._proxyUrl  = proxy;
      window.pnflAI._ollamaUrl = ollamaUrl;

      if (mode === 'ollama') {
        window.pnflAI._model      = model || ollamaModel;
        window.pnflAI._modelLabel = (model || ollamaModel).replace(':latest','');
        // Don't mark ready until ping succeeds — just restore config silently
        // User must click Connect to confirm Ollama is running
        console.log('[PNFL AI] restored (ollama) — model:', window.pnflAI._model);
        return false; // require explicit connect for Ollama
      }

      if (key && key.startsWith('hf_') && key.length >= 20) {
        window.pnflAI._apiKey     = key;
        window.pnflAI._ready      = true;
        window.pnflAI._model      = model || 'Qwen/Qwen2.5-7B-Instruct';
        window.pnflAI._modelLabel = (model || '').split('/').pop() || 'Qwen2.5 7B';

  if (!navigator.vibrate) return;

  navigator.vibrate(p[style] || p.light);

<script>

const { useState, useEffect, useRef, useCallback } = React;

// ── Haptic feedback helper ──
// haptic() defined in sound engine script above

// ── Persistent storage (localStorage with error handling) ──
const storage = {
  get: (key) => {
    try {
      const v = localStorage.getItem('pnfl_' + key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  set: (key, val) => {
    try {
      const str = JSON.stringify(val);
      localStorage.setItem('pnfl_' + key, str);
      return true;
    } catch(e) {
      // localStorage quota exceeded — try removing old items and retry
      try {
        localStorage.removeItem('pnfl_' + key);
        localStorage.setItem('pnfl_' + key, JSON.stringify(val));
        return true;
      } catch(e2) {
        console.warn('storage.set failed for', key, e2.message);
        return false;
      }
    }
  },
  clear: () => {
    try {
      Object.keys(localStorage).filter(k => k.startsWith('pnfl_')).forEach(k => localStorage.removeItem(k));
    } catch {}
  }
};

// In-memory session cache — always populated when data is set, survives the session
const sessionCache = {};
const storageWithSession = {
  get: (key) => sessionCache[key] !== undefined ? sessionCache[key] : storage.get(key),
  set: (key, val) => { sessionCache[key] = val; storage.set(key, val); },
  clear: () => { Object.keys(sessionCache).forEach(k => delete sessionCache[k]); storage.clear(); }
};

// Calculate how "maxed out" a player attribute is vs position maxes
// Returns a 0-100 pct score for each attribute
function attrPctOfMax(attrs, position) {
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  return ATTRIBUTES.map((_, i) => {
    // Use potential max as the ceiling (100%), actual max as the baseline reference
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    const val = attrs[i];
    return Math.min(100, Math.max(0, Math.round(((val - floor) / Math.max(1, ceiling - floor)) * 100)));
  });
}

// Parse the raw text fetched from pnfl.biz/pnflstats/PNFL_roster.htm
function parsePNFLRosterText(rawText) {
  const result = { season: '', date: '', week: '', fetchedAt: new Date().toISOString(), teams: {} };

  // Detect if this is HTML or plain text
  const isHTML = rawText.includes('<table') || rawText.includes('<tr') || rawText.includes('<td');

  if (isHTML) {
    return parsePNFLRosterHTML(rawText, result);
  } else {
    return parsePNFLRosterPlainText(rawText, result);
  }
}

function parsePNFLRosterHTML(html, result) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract header info
  const bodyText = doc.body ? doc.body.innerText || doc.body.textContent : html;
  const seasonMatch = bodyText.match(/(\d{4})\s*season/i);
  if (seasonMatch) result.season = seasonMatch[1];
  const weekMatch = bodyText.match(/Week\s*(\d+)/i);
  if (weekMatch) result.week = weekMatch[1];
  const dateMatch = bodyText.match(/([A-Za-z]+ \d+,\s*\d{4})/);
  if (dateMatch) result.date = dateMatch[1];

  const TEAM_NAME_MAP = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S']);

  let currentTeam = null;

  // Walk ALL elements to find team headers and table rows in document order
  const allElements = doc.body ? Array.from(doc.body.querySelectorAll('*')) : [];

  // Strategy: collect all <tr> rows in document order with their team context
  // Team headers appear as headings/text before each roster table

  // First pass: build a flat list of [teamName, rows[]] blocks
  const blocks = [];
  let pendingTeam = null;

  // Scan headings and text nodes for team names
  const headingEls = doc.body ? doc.body.querySelectorAll('h1,h2,h3,h4,h5,h6,p,div,td,th,caption') : [];
  headingEls.forEach(el => {
    const txt = el.textContent.trim();
    const m = txt.match(/Team Roster[:\s]+(.+?)(?:\s*$)/im);
    if (m) {
      const tName = m[1].trim().replace(/\s+/g,' ');
      const mapped = TEAM_NAME_MAP[tName];
      if (mapped !== undefined) pendingTeam = mapped;
      else {
        // Check if any known team name is in the text
        for (const [k,v] of Object.entries(TEAM_NAME_MAP)) {
          if (k && txt.includes(k)) { pendingTeam = v; break; }
        }
      }
    }
  });

  // Simpler approach: just scan all tables, detect team from preceding text in DOM
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    // Walk backward through siblings/ancestors to find team name
    let teamFound = null;
    let node = table;
    for (let attempts = 0; attempts < 20 && !teamFound; attempts++) {
      node = node.previousElementSibling || node.parentElement;
      if (!node) break;
      const txt = (node.textContent || '').trim();
      // Direct "Team Roster: Miami" pattern
      const m = txt.match(/Team Roster[:\s]+([A-Za-z ]+?)(?:\s{2,}|\n|$)/im);
      if (m) {
        const tName = m[1].trim();
        teamFound = TEAM_NAME_MAP[tName] !== undefined ? TEAM_NAME_MAP[tName] : null;
        if (teamFound === undefined) teamFound = null;
        break;
      }
      // Any known team name in short text
      if (txt.length < 60) {
        for (const [k,v] of Object.entries(TEAM_NAME_MAP)) {
          if (k && v && txt.includes(k)) { teamFound = v; break; }
        }
      }
    }
    if (teamFound === null) return; // null means Free Agent or unknown
    if (!teamFound) return;
    if (!result.teams[teamFound]) result.teams[teamFound] = {};
    currentTeam = teamFound;

    // Get all rows as arrays of cell text
    const allRows = Array.from(table.querySelectorAll('tr')).map(tr =>
      Array.from(tr.querySelectorAll('td,th')).map(c => c.textContent.trim())
    );

    // Process rows in pairs: player row + potential row
    let i = 0;
    while (i < allRows.length) {
      const row = allRows[i];
      if (!row || row.length < 6) { i++; continue; }

      const status = (row[0] || '').toUpperCase();
      if (!['A','O','I','IR'].includes(status)) { i++; continue; }

      const posRaw = (row[1] || '').replace(/\d+$/,'').toUpperCase();
      if (!VALID_POS.has(posRaw)) { i++; continue; }

      // Extract 8 attribute numbers from current row (actual stats)
      const rowNums = row.filter(t => /^\d{2,3}$/.test(t)).map(Number)
        .filter(n => n >= 50 && n <= 99);
      if (rowNums.length < 8) { i++; continue; }
      const attrs = rowNums.slice(-8);

      const num = parseInt(row[2]) || 0;
      const name = (row[3] || '').replace(/\s+/g,' ').trim();
      if (!name) { i++; continue; }

      // Look ahead: next row is the potential/projected row if it has no status prefix
      let pattrs = null;
      const nextRow = allRows[i + 1];
      if (nextRow) {
        const nextStatus = (nextRow[0] || '').toUpperCase();
        if (!['A','O','I','IR'].includes(nextStatus)) {
          // This is the projected row — extract 8 numbers
          const nextNums = nextRow
            .join(' ')
            .match(/\b\d{2,3}\b/g);
          if (nextNums) {
            const valid = nextNums.map(Number).filter(n => n >= 50 && n <= 99);
            if (valid.length >= 8) {
              pattrs = valid.slice(0, 8);
              i++; // consume the potential row
            }
          }
        }
      }

      if (!result.teams[currentTeam][posRaw]) result.teams[currentTeam][posRaw] = [];
      result.teams[currentTeam][posRaw].push({ name, num, status, attrs, pattrs });
      i++;
    }
  });

  // If table-based parsing got 0 teams, fall back to plain text
  if (Object.keys(result.teams).length === 0) {
    return parsePNFLRosterPlainText(doc.body ? doc.body.innerText || doc.body.textContent : '', result);
  }
  return result;
}

function parsePNFLRosterPlainText(rawText, result) {
  const lines = rawText.split('\n');

  // Extract header info
  for (let i = 0; i < Math.min(20, lines.length); i++) {
    const line = lines[i].trim();
    const seasonMatch = line.match(/(\d{4})\s*season/i);
    if (seasonMatch) result.season = seasonMatch[1];
    const weekMatch = line.match(/Week\s*(\d+)/i);
    if (weekMatch) result.week = weekMatch[1];
    const dateMatch = line.match(/([A-Za-z]+ \d+,\s*\d{4})/);
    if (dateMatch) result.date = dateMatch[1];
  }

  const teamNameMap = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S','FB']);

  let currentTeam = null;
  let lastPlayer = null;
  let captureNext = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    const teamMatch = line.match(/Team Roster:\s*(.+)/i);
    if (teamMatch) {
      const tName = teamMatch[1].trim();
      const mapped = teamNameMap[tName];
      currentTeam = (mapped !== undefined) ? mapped : tName;
      if (currentTeam && !result.teams[currentTeam]) result.teams[currentTeam] = {};
      lastPlayer = null; captureNext = false;
      continue;
    }
    if (!currentTeam) continue;

    const playerMatch = line.match(/^\s*(A|O|I|IR)\s+(QB\d*|HB\d*|FB\d*|TE\d*|WR\d*|C\d*|G\d*|T\d*|K\d*|P\d*|DE\d*|DT\d*|LB\d*|CB\d*|S\d*)\s+(\d+)\s+(.+?)\s{2,}\S.*?\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s*$/);
    if (playerMatch) {
      const status = playerMatch[1];
      const posRaw = playerMatch[2];
      const pos = posRaw.replace(/\d+$/, '');
      if (!VALID_POS.has(pos)) { captureNext = false; continue; }
      const num = parseInt(playerMatch[3]);
      const name = playerMatch[4].trim().replace(/\s+/g,' ');
      const attrs = [playerMatch[5],playerMatch[6],playerMatch[7],playerMatch[8],
                     playerMatch[9],playerMatch[10],playerMatch[11],playerMatch[12]].map(Number);
      if (!result.teams[currentTeam][pos]) result.teams[currentTeam][pos] = [];
      const playerObj = { name, num, status, attrs, pattrs: null };
      result.teams[currentTeam][pos].push(playerObj);
      lastPlayer = playerObj;
      captureNext = true;
      continue;
    }

    if (captureNext) {
      captureNext = false;
      // Strip HTML tags, find 8 2-3 digit numbers
      const stripped = line.replace(/<[^>]*>/g,' ');
      const nums = (stripped.match(/\b\d{2,3}\b/g) || []).map(Number).filter(n => n >= 50 && n <= 99);
      if (nums.length >= 8 && lastPlayer) {
        lastPlayer.pattrs = nums.slice(0, 8);
      }
      lastPlayer = null;
      continue;
    }
  }
  return result;
}

function parsePNFLStandingsText(rawText) {

// ── SCORING ──
// Player score: weighted average of attributes, with each attribute normalized
// relative to the position's potential max (so a WR with 84 SP is near-maxed).
function calculatePlayerScore(attrs, position, weights) {
  const pw = weights[position] || weights.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  let ws = 0, wt = 0;
  ATTRIBUTES.forEach((attr, i) => {
    const w = pw[attr] || 1;
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    // Normalize: raw score scaled so potential max = 100
    const normalized = Math.min(100, (attrs[i] / Math.max(1, ceiling)) * 100);
    ws += normalized * w;
    wt += w;
  });
  return ws / wt;
}
function calculateSumScore(attrs) { return attrs.reduce((s,v) => s+v, 0); }

function calculatePositionScore(teamData, position, weights, depthCount, designation) {
  // Filter players by designation setting
  // 'AO' = Active + Open (default), 'A' = Active only, 'ALL' = all slots
  const desig = designation || 'AO';
  const allPlayers = (teamData[position] || []);
  const players = desig === 'ALL' ? allPlayers
    : desig === 'A'  ? allPlayers.filter(p => p.status === 'A')
    : allPlayers.filter(p => p.status === 'A' || p.status === 'O'); // AO default
  if (!players.length) return null;
  const scored = players
    .map(p => ({ ...p, ws: calculatePlayerScore(p.attrs, position, weights), ss: calculateSumScore(p.attrs) }))
    .sort((a,b) => b.ws - a.ws);
  const maxD = depthCount || DEFAULT_DEPTH[position] || 3;
  const top = scored.slice(0, Math.min(maxD, scored.length));
  if (!top.length) return null;
  const aw = top.reduce((s,p) => s+p.ws, 0) / top.length;
  const as = top.reduce((s,p) => s+p.ss, 0) / top.length;
  return (aw * 0.7) + (as * 0.03);
}

function calculateGroupScore(teamData, positions, weights, depth, designation) {
  let total = 0, count = 0;
  positions.forEach(pos => {
    const s = calculatePositionScore(teamData, pos, weights, depth[pos], designation);
    if (s !== null) { total += s; count++; }
  });
  return count > 0 ? total / count : 0;
}

function calculateUnitScore(teamData, unit, weights, depth, designation) {
  return calculateGroupScore(teamData, POSITION_GROUPS[unit], weights, depth, designation);
}

function calculateOverallScore(teamData, weights, depth, designation) {
  const o = calculateUnitScore(teamData, 'offense', weights, depth, designation);
  const d = calculateUnitScore(teamData, 'defense', weights, depth, designation);
  return (o * 0.55) + (d * 0.45);
}

// Compute full result object for one team
function computeTeamResult(team, teamData, weights, depth, designation) {
  const oS=calculateUnitScore(teamData,'offense',weights,depth,designation);
  const dS=calculateUnitScore(teamData,'defense',weights,depth,designation);
  const oT=calculateOverallScore(teamData,weights,depth,designation);
  const oP={}, dP={};
  POSITION_GROUPS.offense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)oP[p]=s; });
  POSITION_GROUPS.defense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)dP[p]=s; });
  oP['OL_TOTAL']=calculateGroupScore(teamData,OL_POSITIONS,weights,depth,designation);
  dP['DL_TOTAL']=calculateGroupScore(teamData,DL_POSITIONS,weights,depth,designation);
  return { offenseScore:oS, defenseScore:dS, overallScore:oT, offensePositions:oP, defensePositions:dP };
}

// ── Contract Data Parser (SheetJS) ──
// Parses PNFL Contracts.xlsx and returns a map keyed by player name
// ── Season Stats Parser ──
function parseSeasonStats(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const text = doc.body ? doc.body.innerText || doc.body.textContent : html;

  const result = { fetchedAt: new Date().toISOString(), teams: {} };

  // Extract season/week
  const wm = text.match(/Week\s*(\d+)/i);
  if (wm) result.week = wm[1];
  const sm = text.match(/(\d{4})\s*season/i);
  if (sm) result.season = sm[1];

  const TEAM_NAMES_LIST = [
    'Jacksonville','Buffalo','New England','Miami','Denver','Las Vegas',
    'Cincinnati','Los Angeles','Pittsburgh','Atlanta','New York','Philadelphia',
    'Washington','Green Bay','Chicago','Seattle','Minnesota','San Francisco'
  ];

  // Parse tables for team stats
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    const rows = Array.from(table.querySelectorAll('tr'));
    rows.forEach(row => {
      const cells = Array.from(row.querySelectorAll('td,th')).map(c => c.textContent.trim());
      if (cells.length < 3) return;
      // Look for team name in first cell
      const teamName = TEAM_NAMES_LIST.find(t => cells[0].includes(t));
      if (!teamName) return;
      if (!result.teams[teamName]) result.teams[teamName] = {};
      // Store raw stats as key-value pairs from header + row
      cells.forEach((v, i) => {
        if (i === 0) return;
        const num = parseFloat(v.replace(/,/g,''));
        if (!isNaN(num)) result.teams[teamName]['col_' + i] = num;
      });
    });
  });

  // Also scan plain text for common stat patterns
  // "Miami  3-0  pts: 142  opp: 98"
  TEAM_NAMES_LIST.forEach(team => {
    const re = new RegExp(team + '[\\s\\S]{0,200}?(\\d+)-(\\d+)', 'i');
    const m = text.match(re);
    if (m) {
      if (!result.teams[team]) result.teams[team] = {};
      result.teams[team].wins   = parseInt(m[1]);
      result.teams[team].losses = parseInt(m[2]);
    }
  });

  return result;
}

// ── Game Stats Parser ──
function parseGameStats(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const text = doc.body ? doc.body.innerText || doc.body.textContent : html;
  const result = { fetchedAt: new Date().toISOString(), games: [], week: null, season: null };

  const wm = text.match(/Week\s*(\d+)/i);
  if (wm) result.week = parseInt(wm[1]);
  const sm = text.match(/(\d{4})\s*season/i);
  if (sm) result.season = sm[1];

  // Parse score lines: "TeamA XX - XX TeamB"
  const scorePattern = /([A-Za-z ]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z ]+)/g;
  let m;
  while ((m = scorePattern.exec(text)) !== null) {
    const team1 = m[1].trim(), score1 = parseInt(m[2]);
    const score2 = parseInt(m[3]), team2 = m[4].trim();
    if (score1 >= 0 && score2 >= 0 && team1.length > 2 && team2.length > 2) {
      result.games.push({ team1, score1, team2, score2, winner: score1 > score2 ? team1 : team2 });
    }
  }

  // Also extract from tables
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    const rows = Array.from(table.querySelectorAll('tr'));
    let headers = [];
    rows.forEach(row => {
      const cells = Array.from(row.querySelectorAll('td,th')).map(c => c.textContent.trim());
      if (cells.some(c => c.toLowerCase().includes('team') || c.toLowerCase().includes('score'))) {
        headers = cells;
      } else if (headers.length && cells.length >= 2) {
        const entry = {};
        cells.forEach((v, i) => { if (headers[i]) entry[headers[i].toLowerCase()] = v; });
        if (entry.team || entry.home || entry.away) result.games.push(entry);
      }
    });
  });

  return result;
}

    const col = {};
    const contractYearCols = [];
    // Scan ALL rows to detect if a year column contains dollar amounts (salary) or X marks (active)
    // We do a quick peek at the first data rows to classify each year column
    const peekRows = rawRows.slice(headerRowIdx + 1, headerRowIdx + 6);

    headers.forEach((h, i) => {
      const lh = h.toLowerCase().replace(/\s+/g,'');
      const hr = h.trim();
      if      (lh === 'pid')                         col.pid       = i;
      else if (lh === 'draftslot' || lh === 'draft') col.draftSlot = i;
      else if (lh === 'first')                        col.first     = i;
      else if (lh === 'last')                         col.last      = i;
      else if (lh === 'team')                         col.team      = i;
      else if (lh === 'pos' || lh === 'position')     col.pos       = i;
      else if (lh === 'year' || lh === 'years')       col.year      = i;
      else if (/^\$?20\d{2}\$?$/.test(hr) || /^20\d{2}$/.test(hr)) {
        const yr = parseInt(hr.replace(/[$]/g,''));
        if (isNaN(yr)) return;
        // Peek at first few data rows to detect salary vs X-mark column
        // Salary cols: values like 500000, "$500,000", "500000"
        // X-mark cols: values like "X", "x", "1", ""
        let hasDollarVal = false, hasXMark = false;
        for (const pr of peekRows) {
          if (!pr) continue;
          const v = String(pr[i] || '').trim().replace(/[$,]/g,'');
          if (v === 'X' || v === 'x' || v === '1') { hasXMark = true; break; }
          const n = parseFloat(v);
          if (!isNaN(n) && n > 1000) { hasDollarVal = true; break; }
        }
        if (hasDollarVal) {
          // Salary column
          col['salary_' + yr] = i;
          contractYearCols.push({ year: yr, idx: i, isSalary: true });
        } else {
          // Contract active year (X marks)
          contractYearCols.push({ year: yr, idx: i, isSalary: false });
        }
      }
    });

    // Must have at minimum first + last to build a player name
    if (col.first === undefined || col.last === undefined) return;

    for (let ri = headerRowIdx + 1; ri < rawRows.length; ri++) {
      const row = rawRows[ri];
      if (!row || row.length < 3) continue;

      const firstName = String(row[col.first] || '').trim();
      const lastName  = String(row[col.last]  || '').trim();
      if (!firstName && !lastName) continue;
      const fullName = [firstName, lastName].filter(Boolean).join(' ');
      if (fullName.length < 2) continue;

      const pid       = col.pid       !== undefined ? String(row[col.pid]       || '').trim() : '';
      const draftSlot = col.draftSlot !== undefined ? String(row[col.draftSlot] || '').trim() : '';
      const pos       = col.pos       !== undefined ? String(row[col.pos]       || '').trim().toUpperCase() : '';
      const yearsLeft = col.year      !== undefined ? String(row[col.year]      || '').trim() : '';

      // Parse salary columns — keyed by year e.g. col.salary_2048, col.salary_2049
      const salaries = {};
      Object.keys(col).filter(k => k.startsWith('salary_')).forEach(k => {
        const yr = parseInt(k.replace('salary_',''));
        const raw = String(row[col[k]] || '').trim().replace(/[$,]/g,'');
        const num = parseFloat(raw);
        if (!isNaN(num) && num > 0) salaries[yr] = num;
      });
      // Find current season salary and next season salary
      const salaryYears = Object.keys(salaries).map(Number).sort((a,b)=>a-b);
      const currentSalaryYear = salaryYears[0] || null;
      const nextSalaryYear    = salaryYears[1] || null;
      const currentSalary     = currentSalaryYear ? salaries[currentSalaryYear] : null;
      const nextSalary        = nextSalaryYear    ? salaries[nextSalaryYear]    : null;

      // Parse draft slot: "GB 1-2", "LAC 6-15", "48-BUF-1-1", "X" (UDFA)
      let draftRound = '', draftPick = '', draftTeam = '';
      const ds = draftSlot.toUpperCase().trim();
      const m1 = ds.match(/^([A-Z]+)\s+(\d+)-(\d+)$/);      // "GB 1-2"
      const m2 = ds.match(/^(\d+)-([A-Z]+)-(\d+)-(\d+)$/);  // "48-BUF-1-1"
      const m3 = ds.match(/^([A-Z]+)\s*(\d+)-(\d+)$/);       // "LAC6-15" compact
      if (m2) { draftTeam = m2[2]; draftRound = m2[3]; draftPick = m2[4]; }
      else if (m1) { draftTeam = m1[1]; draftRound = m1[2]; draftPick = m1[3]; }
      else if (m3) { draftTeam = m3[1]; draftRound = m3[2]; draftPick = m3[3]; }
      else if (ds === 'X' || ds === '') draftRound = 'UDFA';
      else draftRound = ds; // store raw

      // Determine contracted years (X in that year column)
      const contractedYears = contractYearCols
        .filter(({idx, isSalary}) => {
          if (isSalary) return false; // salary columns have $amounts, not X marks
          const v = String(row[idx] || '').trim().toUpperCase();
          return v === 'X' || v === '1';
        })
        .map(({year}) => year);

      const contractStart  = contractedYears.length ? Math.min(...contractedYears) : null;
      const contractEnd    = contractedYears.length ? Math.max(...contractedYears) : null;
      const contractLength = contractedYears.length;

      const contract = {
        playerName:       fullName,
        firstName,
        lastName,
        team:             teamName,
        position:         pos,
        playerId:         pid,
        draftSlot:        draftSlot,
        draftRound,
        draftPick,
        draftTeam,
        yearsLeft:        yearsLeft !== '' ? yearsLeft : String(contractLength),
        contractLength,
        contractStart,
        contractEnd,
        contractYearList: contractedYears,
        salaries,
        currentSalaryYear,
        nextSalaryYear,
        currentSalary,
        nextSalary,
        sheetName,
      };

      // Index: normalized full name
      const key = fullName.toLowerCase().replace(/[^a-z0-9]/g,'');
      if (key.length > 1) { contracts[key] = contract; totalPlayers++; }

      // Index: last name fallback
      const lnKey = '_last_' + lastName.toLowerCase().replace(/[^a-z]/g,'');
      if (!contracts[lnKey]) contracts[lnKey] = [];
      contracts[lnKey].push(contract);

      // Index: PID direct
      if (pid && pid !== 'X') contracts['_pid_' + pid] = contract;
    }
  });

  return {
    contracts,
    teamCount: teamSheets.length,
    playerCount: totalPlayers,
    fetchedAt: new Date().toISOString(),
    sheets: teamSheets,
  };
}

// Build an indexed Map from contractData for O(1) lookups
// Called once and cached on the contractData object
function buildContractIndex(contractData) {
  if (!contractData || !contractData.contracts) return;
  if (contractData._index) return; // already built
  const idx = new Map();
  const raw = contractData.contracts;
  Object.keys(raw).forEach(k => {
    const v = raw[k];
    if (Array.isArray(v)) {
      // last-name buckets — store as-is
      idx.set(k, v);
    } else if (v && v.playerName) {
      idx.set(k, v);
    }
  });
  contractData._index = idx;
}

// Lookup a contract by player name or PID (O(1) via Map index)
function lookupContract(contractData, playerName, pid) {
  if (!contractData) return null;
  if (!contractData.contracts) {
    console.warn('[lookupContract] no contracts key — keys:', Object.keys(contractData));
    return null;
  }
  // _index is a Map — wiped when serialized to JSON; rebuild if missing or not a Map
  if (!contractData._index || !(contractData._index instanceof Map)) {
    buildContractIndex(contractData);
  }
  const idx = contractData._index;

  // Direct PID lookup
  if (pid) { const v = idx.get('_pid_' + pid); if (v) return v; }
  if (!playerName) return null;

  // Exact normalized full name
  const key = playerName.toLowerCase().replace(/[^a-z0-9]/g,'');
  const exact = idx.get(key);
  if (exact) return exact;

  // Last name fallback
  const parts = playerName.trim().split(/\s+/);
  const lastName = (parts[parts.length-1] || '').toLowerCase().replace(/[^a-z]/g,'');
  const lastMatches = idx.get('_last_' + lastName);
  if (!lastMatches || !lastMatches.length) return null;
  if (lastMatches.length === 1) return lastMatches[0];
  const firstInitial = (parts[0] || '').toLowerCase()[0];
  if (firstInitial) {
    const m = lastMatches.find(x => x.firstName && x.firstName.toLowerCase().startsWith(firstInitial));
    if (m) return m;
  }
  return lastMatches[0];
}

// Format a salary value for display
function fmtSalary(val) {
  if (!val && val !== 0) return null;
  const n = parseFloat(String(val).replace(/[$,]/g,''));
  if (isNaN(n)) return String(val) || null;
  if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n}`;
}

<script>
// ══════════════════════════════════════════════════════════════════
// PNFL Data Engine v2 — parses all sources into indexed JSON
// window.pnflDB — fully structured, always current, fast lookups
// ══════════════════════════════════════════════════════════════════
window.pnflDB = {
  season:'2048', week:'3',
  standings:{},      // team -> {wins,losses,pf,pa,streak,div,conf}
  powerRank:[],       // [{rank,team,w,oppW,pts}]
  schedule:{},        // team -> {results:[{opp,score,oppScore,home}], next:''}
  teamStats:{},       // team -> {passYds,passRank,rushYds,rushRank,passDefRank,rushDefRank,sacks,ints,...}
  playerSeason:{},    // lastName -> {team,pass:{att,yds,td,int},rush:{att,yds,td},rec:{rec,yds,td},def:{tackles,sacks}}

  games:[],           // [{home,away,homeScore,awayScore,potw,potg}]
  _raw:{},
  _ready:false,

  // ── Main fetch: get all 4 sources concurrently ──
  fetch: async function(season, week) {
    const db = window.pnflDB;
    if(season) db.season = String(season);
    if(week)   db.week   = String(week);

    const px = url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
    // Build GameStats URL — week files use 2-digit year prefix (48W3, not 2048W3)
    const yearShort = (db.season||'2048').slice(-2);
    const gUrl = `https://pnfl.biz/GameStats/${db.season}/${yearShort}W${db.week}-PNFL_game%20stats.htm`;

    const urls = {
      standings:  'https://pnfl.biz/pnflstats/PNFL_standings.htm',
      season:     'https://pnfl.biz/pnflstats/PNFL_season.htm',
      teamStats:  'https://pnfl.biz/pnflstats/PNFL_team%20stats.htm',
      gameStats:  gUrl,
    };

    const results = await Promise.allSettled(
      Object.entries(urls).map(async ([k,u]) => {
        try {
          const r = await fetch(px(u), {signal:AbortSignal.timeout(15000)});
          if(!r.ok) throw new Error('HTTP '+r.status);
          const t = await r.text();
          db._raw[k] = t;
          return [k,t];
        } catch(e) { console.warn('[pnflDB]',k,'failed:',e.message); return [k,'']; }
      })
    );

    db._parseStandings(db._raw.standings||'');
    db._parseSeason(db._raw.season||'');
    db._parseGameStats(db._raw.gameStats||'');
    db._ready = true;
    console.log('[pnflDB] ready — standings:'+Object.keys(db.standings).length+' players:'+Object.keys(db.playerSeason).length+' gameStats:'+Object.keys(db.playerGame).length);
    // Persist to sessionStorage as compact JSON
    try { sessionStorage.setItem('pnfl_db', JSON.stringify({season:db.season,week:db.week,standings:db.standings,powerRank:db.powerRank,schedule:db.schedule,teamStats:db.teamStats,playerSeason:db.playerSeason,games:db.games})); } catch(e){}
  },

  // ── Load cached version from sessionStorage ──
  loadCache: function() {
    try {
      const raw = sessionStorage.getItem('pnfl_db');
      if(!raw) return false;
      const d = JSON.parse(raw);
      Object.assign(window.pnflDB, d);
      window.pnflDB._ready = !!(d.season && Object.keys(d.standings||{}).length > 0);
      if(window.pnflDB._ready) console.log('[pnflDB] loaded from cache — week '+d.week);
      return window.pnflDB._ready;
    } catch(e){ return false; }
  },

  _parseStandings: function(text) {
    const db = window.pnflDB;
    const lines = text.split('\n');
    let inRankings = false, inSchedule = false, inTiebreak = false;
    let currentWeekSched = false, nextWeekSched = false;
    const TEAMS = ['Jacksonville','Buffalo','New England','Miami','Denver','Las Vegas','Cincinnati','Los Angeles','Pittsburgh','Atlanta','New York','Philadelphia','Washington','Green Bay','Chicago','Seattle','Minnesota','San Francisco'];

    for(const line of lines) {
      const l = line.trim();

      // Season/week header
      const sm = l.match(/(\d{4})\s*season/i); if(sm) db.season = sm[1];
      const wm = l.match(/Week\s*(\d+)/i); if(wm) db.week = wm[1];

      // Standings table rows: "New England    3  0  0   86   32    W3  2-0-0  1-0-0"
      const standM = line.match(/^([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+\d+\s+(\d+)\s+(\d+)\s+(W|L)(\d+)/);
      if(standM) {
        const team = standM[1].trim();
        if(TEAMS.includes(team)) {
          db.standings[team] = {wins:+standM[2],losses:+standM[3],pf:+standM[4],pa:+standM[5],streak:standM[6]+standM[7],diff:(+standM[4])-(+standM[5])};
        }
      }

      // Power rankings
      if(l.includes('Power Rankings')) inRankings = true;
      if(inRankings && l.includes('Tie Break')) { inRankings = false; }
      if(inRankings) {
        const rm = line.match(/^\s*(\d+)\s+([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s+((?:[A-Z]{2,3}\s*)*)/);
        const tm = line.match(/^\s{3,}([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s+((?:[A-Z]{2,3}\s*)*)/);
        if(rm) {
          const entry = {rank:+rm[1],team:rm[2].trim(),w:+rm[3],oppW:+rm[4],pts:+rm[5],opps:rm[6].trim().split(/\s+/).filter(Boolean)};
          if(TEAMS.includes(entry.team)) db.powerRank.push(entry);
        } else if(tm && db.powerRank.length>0) {
          const prev = db.powerRank[db.powerRank.length-1];
          const team = tm[1].trim();
          if(TEAMS.includes(team)) db.powerRank.push({rank:prev.rank,team,w:+tm[2],oppW:+tm[3],pts:+tm[4],opps:tm[5].trim().split(/\s+/).filter(Boolean)});
        }
      }

      // Schedule: "Week 3   Miami 20 at Buffalo 3   Philadelphia 22 at New York 29"
      if(l.match(/^Week\s+\d+\s*$/)) {
        const wn = l.match(/^Week\s+(\d+)/);
        currentWeekSched = wn && +wn[1] === +db.week;
        nextWeekSched    = wn && +wn[1] === +db.week+1;
      }
      if(currentWeekSched || nextWeekSched) {
        // "Miami 20 at Buffalo 3" or "Miami at Las Vegas"
        const scoreM = l.match(/([A-Za-z ]+?)\s+(\d+)\s+at\s+([A-Za-z ]+?)\s+(\d+)\s*$/);
        const futureM = l.match(/([A-Za-z ]+?)\s+at\s+([A-Za-z ]+?)\s*$/);
        if(scoreM && currentWeekSched) {
          const away=scoreM[1].trim(), aScore=+scoreM[2], home=scoreM[3].trim(), hScore=+scoreM[4];
          if(!db.schedule[away]) db.schedule[away]={results:[],next:''};
          if(!db.schedule[home]) db.schedule[home]={results:[],next:''};
          db.schedule[away].results.push({opp:home,score:aScore,oppScore:hScore,home:false,win:aScore>hScore});
          db.schedule[home].results.push({opp:away,score:hScore,oppScore:aScore,home:true,win:hScore>aScore});
        }
        if(futureM && nextWeekSched) {
          const away=futureM[1].trim(), home=futureM[2].trim();
          if(TEAMS.includes(away)) { if(!db.schedule[away]) db.schedule[away]={results:[],next:''}; db.schedule[away].next=home+' (away)'; }
          if(TEAMS.includes(home)) { if(!db.schedule[home]) db.schedule[home]={results:[],next:''}; db.schedule[home].next=away+' (home)'; }
        }
      }

      // Tie-break data — parse W/L records
      if(l.includes('Tie Break Data')) inTiebreak = true;
      if(inTiebreak) {
        const wlM = line.match(/\[W\]\s*((?:[A-Z]{2,3}\s*)+)/);
        const llM = line.match(/\[L\]\s*((?:[a-z]{2,3}\s*)+)/);
        // Find which team this belongs to by looking at recent standings entry
        // Skip for now — covered by powerRank opps
      }
    }
  },

  _parseSeason: function(text) {
    const db = window.pnflDB;
    const lines = text.split('\n');
    let section = '', teamSection = '';

    // Team stat tables: parse rankings for each team
    const TEAM_SECTIONS = {
      'Team Passing\n':           {key:'passOff',  cols:['att','com','pct','yds','avg','lg','td','int','rtg']},
      'Team Passing - Opponents': {key:'passDef',  cols:['att','com','pct','yds','avg','lg','td','int','rtg']},
      'Team Rushing\n':           {key:'rushOff',  cols:['att','yds','avg','lg','td']},
      'Team Rushing - Opponents': {key:'rushDef',  cols:['att','yds','avg','lg','td']},
      'Team Sacks\n':             {key:'sacks',    cols:['sacks','safeties']},
      'Team Interceptions\n':     {key:'ints',     cols:['int','rtYds','avg','lg','td']},
      'Team Tackles\n':           {key:'tackles',  cols:['tackles']},
      'Team Scoring\n':           {key:'scoring',  cols:['td','xp','fg','sfty','pts']},
    };

    const TEAMS = ['Jacksonville','Buffalo','New England','Miami','Denver','Las Vegas','Cincinnati','Los Angeles','Pittsburgh','Atlanta','New York','Philadelphia','Washington','Green Bay','Chicago','Seattle','Minnesota','San Francisco'];
    let currentSection = null, rank = 0;

    for(let i=0; i<lines.length; i++) {
      const l = lines[i];

      // Detect section headers
      for(const [header, cfg] of Object.entries(TEAM_SECTIONS)) {
        if(l.includes(header.trim())) { currentSection = cfg; rank = 0; break; }
      }
      if(l.includes('Back to top')) { currentSection = null; }
      if(!currentSection) continue;

      // Parse ranked row: "1 New England    91  62  68.1  712  7.8  41  6  0  113.4  3-17"
      const m = l.match(/^\s*(\d+)\s+([A-Za-z ]+?)\s{2,}([\d,. /-]+)\s*$/);
      if(m) {
        rank = +m[1];
        const team = m[2].trim();
        if(!TEAMS.includes(team)) continue;
        if(!db.teamStats[team]) db.teamStats[team] = {};
        const nums = m[3].trim().split(/\s+/).filter(Boolean);
        const stat = {rank};
        currentSection.cols.forEach((c,i) => { if(nums[i]!==undefined) stat[c] = isNaN(+nums[i].replace(',','')) ? nums[i] : +nums[i].replace(',',''); });
        db.teamStats[team][currentSection.key] = stat;
      }
    }

    // Individual stats — parse passing/rushing/receiving leaders
    const IND_SECTIONS = {
      'Individual Passing':  {key:'pass',  cols:['att','com','pct','yds','avg','lg','td','int','rtg']},
      'Individual Rushing':  {key:'rush',  cols:['att','yds','avg','lg','td']},
      'Individual Receiving':{key:'rec',   cols:['rec','yds','avg','lg','td']},
      'Individual Tackles':  {key:'def',   cols:['tackles','sacks']},
      'Individual Sacks':    {key:'sacks', cols:['sacks']},
      'Individual Interceptions':{key:'ints',cols:['int','rtYds','avg','lg','td']},
    };
    let indSection = null;
    for(const line of lines) {
      for(const [hdr, cfg] of Object.entries(IND_SECTIONS)) {
        if(line.includes(hdr)) { indSection = cfg; break; }
      }
      if(line.includes('Back to top')) indSection = null;
      if(!indSection) continue;
      // "1 Baker Mayfield  MIA  95  60  63.2  789  8.3  63  2  0  96.3  6-31"
      const m = line.match(/^\s*\d+\s+([A-Za-z .'-]+?)\s{2,}([A-Z]{2,3})\s+([\d,. /-]+)\s*$/);
      if(!m) continue;
      const name = m[1].trim();
      const lastName = name.split(' ').pop();
      const team = m[2].trim();
      const nums = m[3].trim().split(/\s+/).filter(Boolean);
      const stat = {name, team};
      indSection.cols.forEach((c,i) => { if(nums[i]!==undefined) stat[c] = isNaN(+nums[i].replace(',','')) ? nums[i] : +nums[i].replace(',',''); });
      if(!db.playerSeason[lastName]) db.playerSeason[lastName] = {};
      db.playerSeason[lastName][indSection.key] = stat;
      db.playerSeason[lastName].name = name;
      db.playerSeason[lastName].team = team;
    }
  },

  _parseGameStats: function(text) {
    const db = window.pnflDB;
    const lines = text.split('\n');
    db.games = [];
    let currentGame = null;

    // Section parsers for individual game stats
    const parsePlayerBlock = (lines, startIdx, type) => {
      for(let i=startIdx; i<Math.min(startIdx+40,lines.length); i++) {
        const l = lines[i].trim();
        if(!l || l.match(/^(Passing|Rushing|Receiving|Defense|Intercepts|Punt|KO|Fumble|Safeties|Punts|Converts|Field|Back|---)/)) break;
        const parts = l.split(/\s+/);
        if(parts.length < 3 || !parts[0] || parts[0].length < 2) continue;
        const lastName = parts[0];
        if(!db.playerGame[lastName]) db.playerGame[lastName] = {};
        if(type==='pass' && parts.length>=7) db.playerGame[lastName].pass={att:+parts[1],com:+parts[2],yds:+parts[3],td:+parts[6]||0,int:+parts[7]||0};
        if(type==='rush' && parts.length>=5) db.playerGame[lastName].rush={car:+parts[1],yds:+parts[2],avg:+parts[3]||0,td:+parts[5]||0};
        if(type==='rec'  && parts.length>=5) db.playerGame[lastName].rec={rec:+parts[1],yds:+parts[2],avg:+parts[3]||0,td:+parts[5]||0};
        if(type==='def'  && parts.length>=3) db.playerGame[lastName].def={tackles:+parts[1],sacks:+parts[2]};
      }
    };

    for(let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      // Game header: "Miami at Buffalo\n  20    3"
      const gameM = l.match(/^([A-Za-z ]+?)\s+at\s+([A-Za-z ]+?)$/);
      if(gameM) {
        const scoreLine = lines[i+1] ? lines[i+1].trim() : '';
        const scores = scoreLine.match(/(\d+)\s+(\d+)/);
        const potgLine = lines.slice(i+2,i+5).join(' ');
        const potgM = potgLine.match(/Player of the game:\s+([A-Za-z .'-]+),\s+([A-Z]+),\s+([A-Za-z ]+)/);
        currentGame = {away:gameM[1].trim(), home:gameM[2].trim(), awayScore:scores?+scores[1]:0, homeScore:scores?+scores[2]:0, potg:potgM?{name:potgM[1],pos:potgM[2],team:potgM[3]}:null};
        db.games.push(currentGame);
      }
      // Stat block headers
      if(l==='Passing')   parsePlayerBlock(lines, i+1, 'pass');
      if(l==='Rushing')   parsePlayerBlock(lines, i+1, 'rush');
      if(l==='Receiving') parsePlayerBlock(lines, i+1, 'rec');
      if(l==='Defense')   parsePlayerBlock(lines, i+1, 'def');
    }

    // Player of the week
    const potwM = text.match(/Player of the week:\s+([A-Za-z .'-]+),\s+([A-Z]+),\s+([A-Za-z ]+)/);
    if(potwM) db.potw = {name:potwM[1],pos:potwM[2],team:potwM[3]};

  // ── Query helpers ──

    const st = db.standings[team] || {};
    const pr = db.powerRank.find(r=>r.team===team) || {};
    const ts = db.teamStats[team] || {};
    const sc = db.schedule[team] || {};
    return {team, season:db.season, week:db.week, ...st, powerRank:pr.rank||'?', powerPts:pr.pts||0, oppWins:pr.oppW||0, schedule:sc, teamStats:ts};

      'TEAM: '+teamName+' | Record: '+(ts.wins||0)+'-'+(ts.losses||0)+' | PF:'+(ts.pf||0)+' PA:'+(ts.pa||0)+' | Streak:'+ts.streak,
      'POWER RANK: #'+ts.powerRank+' | Power pts: '+ts.powerPts+' | Opp wins: '+ts.oppWins,
      ts.teamStats.passOff ? 'PASS OFF: '+ts.teamStats.passOff.yds+' yds (rank #'+ts.teamStats.passOff.rank+'/18) '+ts.teamStats.passOff.td+' TDs '+ts.teamStats.passOff.int+' INTs rating '+ts.teamStats.passOff.rtg : '',
      ts.teamStats.rushOff ? 'RUSH OFF: '+ts.teamStats.rushOff.yds+' yds (rank #'+ts.teamStats.rushOff.rank+'/18) '+ts.teamStats.rushOff.td+' TDs avg '+ts.teamStats.rushOff.avg : '',
      ts.teamStats.passDef ? 'PASS DEF: '+ts.teamStats.passDef.yds+' opp yds (rank #'+ts.teamStats.passDef.rank+'/18)' : '',
      ts.teamStats.rushDef ? 'RUSH DEF: '+ts.teamStats.rushDef.yds+' opp yds (rank #'+ts.teamStats.rushDef.rank+'/18)' : '',

      if(ps.season.rec)   lines.push('  Season receiving: '+ps.season.rec.rec+' rec, '+ps.season.rec.yds+' yds, '+ps.season.rec.td+' TD');

      if(ps.game.def)     lines.push('  Wk'+db.week+' defense: '+ps.game.def.tackles+' tackles, '+ps.game.def.sacks+' sacks');
    } else {
      lines.push('', 'PLAYER STATS: Not found in season/game stats for '+playerName);
    }
    return lines.filter(l=>l!==undefined && l!='').join('\n');
  },

  buildTeamPrompt: function(team) {
    const db = window.pnflDB;
    const ts = db.getTeamSummary(team);
    const st = db.teamStats[team] || {};
    const sc = db.schedule[team] || {};
    const pr = db.powerRank.find(r=>r.team===team) || {};

    // Find game this week
    const weekGame = db.games.find(g=>g.home===team||g.away===team);
    const gameLines = weekGame ? [
      'WEEK '+db.week+' GAME: '+(weekGame.away===team?team+' at '+weekGame.home:weekGame.home+' vs '+weekGame.away),
      'SCORE: '+weekGame.awayScore+' - '+weekGame.homeScore+(weekGame.away===team?(weekGame.awayScore>weekGame.homeScore?' (W)':(weekGame.awayScore<weekGame.homeScore?' (L)':' (T)')):(weekGame.homeScore>weekGame.awayScore?' (W)':(weekGame.homeScore<weekGame.awayScore?' (L)':' (T)'))),
      weekGame.potg ? 'PLAYER OF GAME: '+weekGame.potg.name+' ('+weekGame.potg.pos+')' : '',
    ] : ['NO GAME DATA FOUND FOR WEEK '+db.week];

    // Top players from game stats
    const teamPlayers = Object.entries(db.playerGame)
      .filter(([ln,gs]) => {
        const s = db.playerSeason[ln];
        return s && s.team && s.team.length<=3 && (
          s.team === team.substring(0,3).toUpperCase() ||
          Object.values({JAX:'Jacksonville',BUF:'Buffalo',NE:'New England',MIA:'Miami',DEN:'Denver',LVR:'Las Vegas',CIN:'Cincinnati',LAC:'Los Angeles',PIT:'Pittsburgh',ATL:'Atlanta',NYG:'New York',PHI:'Philadelphia',WSH:'Washington',GB:'Green Bay',CHI:'Chicago',SEA:'Seattle',MIN:'Minnesota',SF:'San Francisco'})[Object.keys({JAX:'Jacksonville',BUF:'Buffalo',NE:'New England',MIA:'Miami',DEN:'Denver',LVR:'Las Vegas',CIN:'Cincinnati',LAC:'Los Angeles',PIT:'Pittsburgh',ATL:'Atlanta',NYG:'New York',PHI:'Philadelphia',WSH:'Washington',GB:'Green Bay',CHI:'Chicago',SEA:'Seattle',MIN:'Minnesota',SF:'San Francisco'}).indexOf(s.team)] === team
        );
      })
      .map(([ln,gs]) => ({lastName:ln, ...gs, seasonTeam: db.playerSeason[ln]?.team}))
      .slice(0,6);

    return [
      '=== PNFL '+db.season+' SEASON WEEK '+db.week+' — SIMULATION ONLY ===',
      'NEVER use real NFL knowledge.',
      '',
      'TEAM: '+team+' | Record: '+(ts.wins||0)+'-'+(ts.losses||0)+' | PF:'+(ts.pf||0)+' PA:'+(ts.pa||0)+' | Streak:'+ts.streak+' | Diff:'+(ts.diff||0),
      'POWER RANK: #'+ts.powerRank+' of 18 | Opp wins: '+ts.oppWins+' | Power pts: '+ts.powerPts,
      'OPPONENTS BEATEN: '+(pr.opps||[]).join(', ')||'none',
      'NEXT GAME: '+(sc.next||'TBD'),
      '',
      'OFFENSIVE STATS:',
      st.passOff ? '  Passing: '+st.passOff.yds+' yds/season rank #'+st.passOff.rank+'/18 | '+st.passOff.td+' TDs '+st.passOff.int+' INTs | Rating: '+st.passOff.rtg+' | Pct: '+st.passOff.pct+'%' : '  Pass: no data',
      st.rushOff ? '  Rushing: '+st.rushOff.yds+' yds rank #'+st.rushOff.rank+'/18 | '+st.rushOff.td+' TDs | Avg: '+st.rushOff.avg+' ypc' : '  Rush: no data',
      '',
      'DEFENSIVE STATS:',
      st.passDef ? '  Pass defense: '+st.passDef.yds+' opp yds rank #'+st.passDef.rank+'/18 | '+st.passDef.td+' TDs allowed | Rating vs: '+st.passDef.rtg : '  Pass def: no data',
      st.rushDef ? '  Rush defense: '+st.rushDef.yds+' opp yds rank #'+st.rushDef.rank+'/18 | '+st.rushDef.td+' TDs allowed' : '  Rush def: no data',
      st.sacks   ? '  Sacks: '+st.sacks.sacks+' (rank #'+st.sacks.rank+'/18)' : '',
      st.ints    ? '  Interceptions: '+st.ints.int+' (rank #'+st.ints.rank+'/18)' : '',
      '',
      '=== WEEK '+db.week+' GAME ===',
      ...gameLines,
    ].filter(l=>l!=='').join('\n');
  }
};

<script>
// ── PNFL Voice Engine ──
// Uses Ollama speech synthesis (Qwen3-TTS via ollama pull qwen2.5:0.5b or speech model)
// Fallback: Web Speech API (built-in, zero install)
window.pnflVoice = {
  _enabled:   false,
  _speaking:  false,
  _queue:     [],
  _utterance: null,

  isEnabled:  function() { return window.pnflVoice._enabled; },
  isSpeaking: function() { return window.pnflVoice._speaking; },

  toggle: function() {
    const v = window.pnflVoice;
    v._enabled = !v._enabled;
    if (!v._enabled) v.stop();
    sessionStorage.setItem('pnfl_voice', v._enabled ? '1' : '0');
    console.log('[Voice] ' + (v._enabled ? 'enabled' : 'disabled'));
    return v._enabled;
  },

  init: function() {
    const v = window.pnflVoice;
    v._enabled = sessionStorage.getItem('pnfl_voice') === '1';
    // Pre-load voices
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  },

  stop: function() {
    const v = window.pnflVoice;
    v._queue = [];
    v._speaking = false;
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  },

  // Speak text with optional emotion hint
  // emotion: 'neutral' | 'upbeat' | 'concerned' | 'excited' | 'analytical'
  speak: function(text, emotion) {
    const v = window.pnflVoice;
    if (!v._enabled || !text) return;
    // Clean text — remove markdown, emojis, symbols
    const clean = text
      .replace(/[#*_`]/g, '')
      .replace(/\[.*?\]/g, '')
      .replace(/OFFENSIVE ANALYSIS:|DEFENSIVE ANALYSIS:|WEEKLY HIGHLIGHTS:|TOP PERFORMERS:|STRENGTHS:|AREAS TO IMPROVE:/gi, '')
      .replace(/===.*?===/g, '')
      .replace(/\n+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 800); // cap at ~800 chars
    if (!clean) return;
    v._queue.push({ text: clean, emotion: emotion || 'neutral' });
    if (!v._speaking) v._processQueue();
  },

  // Speak sections of a scouting report with appropriate tone per section
  speakReport: function(report) {
    const v = window.pnflVoice;
    if (!v._enabled) return;
    v.stop();
    const emotionMap = {
      'OFFENSIVE ANALYSIS': 'upbeat',
      'DEFENSIVE ANALYSIS': 'analytical',
      'WEEKLY HIGHLIGHTS':  'excited',
      'TOP PERFORMERS':     'upbeat',
      'STRENGTHS':          'upbeat',
      'AREAS TO IMPROVE':   'concerned',
      'RAW':                'neutral',
    };
    // Queue all sections — they play sequentially via the queue system
    Object.entries(report).forEach(([key, text]) => {
      if (!text) return;
      v.speak(text, emotionMap[key] || 'neutral');
    });
  },

  // Speak a player card analysis
  speakPlayer: function(playerName, teamName, analysisText) {
    const v = window.pnflVoice;
    if (!v._enabled || !analysisText) return;
    v.stop();
    // Queue intro then analysis — both go into the queue so they play sequentially
    v.speak(playerName + ' from ' + teamName + '.', 'neutral');
    v.speak(analysisText, 'analytical');
  },

  _processQueue: function() {
    const v = window.pnflVoice;
    if (!v._queue.length) { v._speaking = false; return; }
    const { text, emotion } = v._queue.shift();
    v._speaking = true;
    v._speakWebSpeech(text, emotion);
  },

  _speakWebSpeech: function(text, emotion) {
    const v = window.pnflVoice;
    if (!window.speechSynthesis) { v._processQueue(); return; }
    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    // Tune voice params by emotion
    const params = {
      neutral:    { rate: 1.0,  pitch: 1.0,  volume: 0.9 },
      upbeat:     { rate: 1.1,  pitch: 1.15, volume: 1.0 },
      concerned:  { rate: 0.9,  pitch: 0.88, volume: 0.85 },
      excited:    { rate: 1.2,  pitch: 1.2,  volume: 1.0 },
      analytical: { rate: 0.95, pitch: 0.95, volume: 0.9 },
    };
    const p = params[emotion] || params.neutral;
    u.rate   = p.rate;
    u.pitch  = p.pitch;
    u.volume = p.volume;
    u.lang   = 'en-US';

    // Prefer a deep male voice for authority
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => /google.*english|en-us/i.test(v.name) && !v.name.toLowerCase().includes('female'))
      || voices.find(v => v.lang === 'en-US')
      || voices[0];
    if (preferred) u.voice = preferred;

    u.onend   = () => { v._speaking = false; setTimeout(() => v._processQueue(), 150); };
    u.onerror = () => { v._speaking = false; v._processQueue(); };
    v._utterance = u;
    window.speechSynthesis.speak(u);
  }
};
window.pnflVoice.init();
</script>

// ── Panels: Depth & Weights ──
function DepthPanel({ depth, onDepthChange }) {
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(depth)));
  const handle = (pos, val) => { const n=Math.max(1,Math.min(10,parseInt(val)||1)); setLocal(p=>({...p,[pos]:n})); };
  const apply = () => { onDepthChange(local); saveDepth(local); };
  const reset = () => { const d=JSON.parse(JSON.stringify(DEFAULT_DEPTH)); setLocal(d); onDepthChange(d); saveDepth(d); };
  const offOther=['QB','HB','WR','TE','K','P'];
  const offOL=['C','G','T'];
  const defDL=['DE','DT'];
  const defOther=['LB','CB','S'];
  const depthCard = (pos, label) => (
    <div className="depth-item" key={pos}>
      <h4 style={{color:offOL.includes(pos)?'#4a9eff':defDL.includes(pos)?'#ff8888':'#ffd700'}}>{label||pos}</h4>
      <div className="depth-row"><label>Players:</label>
        <input type="number" min="1" max="10" value={local[pos]||1} onChange={e=>handle(pos,e.target.value)}/>
      </div>
      <div className="helper-text" style={{marginTop:'5px'}}>Default: {DEFAULT_DEPTH[pos]}</div>
    </div>
  );
  return (
    <div className="panel-content">
      <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',marginBottom:'15px',fontSize:'1.1rem'}}>🔵 SKILL POSITIONS</h4>
      <div className="depth-grid">{offOther.map(p=>depthCard(p))}</div>
      <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔵 OFFENSIVE LINE</h4>
      <div className="depth-grid">{offOL.map(p=>depthCard(p,p==='C'?'Center':p==='G'?'Guard':'Tackle'))}</div>
      <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔴 DEFENSIVE LINE</h4>
      <div className="depth-grid">{defDL.map(p=>depthCard(p,p==='DE'?'Def. End':'Def. Tackle'))}</div>
      <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔴 LINEBACKERS & SECONDARY</h4>
      <div className="depth-grid">{defOther.map(p=>depthCard(p))}</div>
      <div className="button-group">
        <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
        <button className="btn-secondary" onClick={reset}>↺ Reset Defaults</button>
      </div>
    </div>
  );
}
