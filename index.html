                <div style={{fontSize:'0.78rem',color:'#608060',fontFamily:'Roboto Condensed',marginTop:'2px'}}>{opt.desc}</div>
              </div>
              {opt.value==='AO' && <div style={{marginLeft:'auto',fontSize:'0.65rem',color:'#5a8a6a',fontFamily:'Orbitron',letterSpacing:'1px',border:'1px solid #2d5a2d',borderRadius:'3px',padding:'2px 6px'}}>DEFAULT</div>}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:'14px',padding:'10px 14px',background:'rgba(74,158,255,0.06)',border:'1px solid rgba(74,158,255,0.2)',borderRadius:'6px',fontSize:'0.78rem',color:'#4a9eff',fontFamily:'Roboto Condensed'}}>
        <strong>Note:</strong> I and IR players can be activated before game day — use <em>All Slots</em> to reflect true depth and talent potential.
      </div>
    </div>
  );
}

function WeightsPanel({ weights, onWeightsChange }) {
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(weights)));
  const handle=(pos,attr,val)=>{const n=Math.max(0,Math.min(10,parseInt(val)||0));setLocal(p=>({...p,[pos]:{...p[pos],[attr]:n}}));};
  const apply=()=>{onWeightsChange(local);saveWeights(local);};
  const reset=()=>{const d=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));setLocal(d);onWeightsChange(d);saveWeights(d);};
  const preset=(p)=>{
    const base=JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));
    if(p==='balanced'){Object.keys(base).forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:2,HA:2,EN:2,IN:2,DI:2});}
    else if(p==='speed'){Object.keys(base).forEach(pos=>base[pos]={SP:4,AC:3,AG:2,ST:1,HA:2,EN:1,IN:1,DI:1});}
    else if(p==='trench'){['C','G','T'].forEach(pos=>base[pos]={SP:1,AC:1,AG:2,ST:4,HA:1,EN:4,IN:3,DI:3});['DE','DT'].forEach(pos=>base[pos]={SP:2,AC:2,AG:2,ST:4,HA:2,EN:3,IN:1,DI:3});}
    setLocal(base);
  };
  return (
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'20px',color:'#a0d2a0'}}>Adjust weights (0-10) per attribute/position. Higher = more important.</div>
      <div className="position-weights">
        {Object.entries(local).map(([pos,attrs])=>(
          <div className="position-card" key={pos}>
            <h4>{POSITION_DISPLAY[pos]||pos}</h4>
            {ATTRIBUTES.map(attr=>(
              <div className="weight-row" key={attr}>
                <label>{attr}</label>
                <input type="number" min="0" max="10" value={attrs[attr]} onChange={e=>handle(pos,attr,e.target.value)}/>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="button-group">
        <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
        <button className="btn-secondary" onClick={reset}>↺ Reset</button>
        <button className="btn-secondary" onClick={()=>preset('balanced')}>⚖️ Balanced</button>
        <button className="btn-secondary" onClick={()=>preset('speed')}>⚡ Speed</button>
        <button className="btn-secondary" onClick={()=>preset('trench')}>🏋️ Trench</button>
      </div>
    </div>
  );
}

// ── Team Selector ──
function TeamSelector({ selectedTeams, onTeamsChange }) {
  const handle=(e,idx)=>{const t=[...selectedTeams];t[idx]=e.target.value;onTeamsChange(t);};
  const add=()=>{if(selectedTeams.length<4)onTeamsChange([...selectedTeams,'']);};
  const remove=(idx)=>onTeamsChange(selectedTeams.filter((_,i)=>i!==idx));
  return (
    <div className="control-group">
      <label>🏈 Select Teams (2-4)</label>
      {selectedTeams.map((team,idx)=>(
        <div key={idx} className="team-select-container">
          <div className="team-select-wrapper">
            <TeamLogo teamName={team} size="small"/>
            <select value={team} onChange={e=>handle(e,idx)}>
              <option value="">-- Select Team --</option>
              {[...TEAM_NAMES].sort().map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            {selectedTeams.length>2&&(
              <button type="button" onClick={()=>remove(idx)} className="btn-danger btn-small" style={{width:'35px',padding:'8px'}}>✕</button>
            )}
          </div>
        </div>
      ))}
      {selectedTeams.length<4&&(
        <button type="button" onClick={add} className="btn-secondary" style={{marginTop:'10px',width:'100%'}}>+ Add Team</button>
      )}
      <div className="helper-text">Compare 2–4 teams. ✓ marks position winner.</div>
    </div>
  );
}

// ── Comparison Table ──
function ComparisonTable({ teams, data, contractData }) {
  const [expandedPos, setExpandedPos] = useState(null);
  const [lightbox, setLightbox] = useState(null); // {player, position, teamName}
  if (!data||teams.length<2) return null;
  const togglePos=(pos)=>setExpandedPos(prev=>prev===pos?null:pos);

  // Player drill-down row
  const STATUS_COLOR={'A':'#4aff4a','O':'#ffd700','I':'#ff9944','IR':'#ff4444'};
  const STATUS_BG={'A':'rgba(74,255,74,0.1)','O':'rgba(255,215,0,0.1)','I':'rgba(255,153,68,0.08)','IR':'rgba(255,68,68,0.08)'};
  const renderDrillDown=(pos)=>{
    const wts=data.weights||DEFAULT_WEIGHTS;
    return(
    <tr key={`drill_${pos}`}>
      <td colSpan={teams.length+1} style={{padding:'0',background:'rgba(0,0,0,0.0)'}}>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${teams.length},1fr)`,gap:'0',margin:'0 0 4px 0',borderTop:'1px solid rgba(255,215,0,0.15)'}}>
          {teams.map((team,ti)=>{
            const td=data.rosterData&&data.rosterData[team]||{};
            const allPlayers=(td[pos]||[]);
            const scored=allPlayers.map(p=>({...p,ws:calculatePlayerScore(p.attrs,pos,wts)}))
              .sort((a,b)=>{
                const so={'A':0,'O':1,'I':2,'IR':3};
                const sd=(so[a.status]||0)-(so[b.status]||0);
                return sd!==0?sd:b.ws-a.ws;
              });
            const maxWs=scored.length?Math.max(...scored.map(p=>p.ws)):100;
            const minWs=scored.length?Math.min(...scored.map(p=>p.ws)):60;
            const range=Math.max(maxWs-minWs,1);
            return(
              <div key={team} style={{background:ti%2===0?'rgba(8,18,35,0.97)':'rgba(12,28,20,0.97)',padding:'10px 12px',borderRight:ti<teams.length-1?'1px solid rgba(45,90,45,0.3)':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',paddingBottom:'6px',borderBottom:'1px solid rgba(255,215,0,0.2)'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <span style={{fontFamily:'Orbitron',fontSize:'0.78rem',color:'#ffd700',fontWeight:'700'}}>{team}</span>
                  <span style={{marginLeft:'auto',fontSize:'0.68rem',color:'#608060',fontFamily:'Orbitron'}}>{scored.length} players</span>
                </div>
                {scored.length===0
                  ?<div style={{color:'#608060',fontStyle:'italic',fontSize:'0.8rem',padding:'8px 0'}}>No players</div>
                  :scored.map((p,i)=>{
                    const barPct=Math.round(((p.ws-minWs)/range)*100);
                    const isIR=p.status==='IR';
                    const isI=p.status==='I';
                    return(
                      <div key={i}
                        onClick={()=>{playSound('click');haptic('light');setLightbox({player:p,position:pos,teamName:team});}}
                        className="haptic-btn"                        style={{padding:'5px 0',borderBottom:'1px solid rgba(45,90,45,0.15)',opacity:isIR?0.55:isI?0.75:1,cursor:'pointer',transition:'background 0.1s',borderRadius:'4px'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(74,158,255,0.08)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                      >
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',marginBottom:'3px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'5px',minWidth:0,flex:1}}>
                            <span style={{
                              color:STATUS_COLOR[p.status]||'#aaa',
                              background:STATUS_BG[p.status]||'transparent',
                              fontSize:'0.58rem',fontWeight:'900',minWidth:'18px',textAlign:'center',
                              border:`1px solid ${STATUS_COLOR[p.status]||'#aaa'}44`,
                              borderRadius:'3px',padding:'1px 3px',letterSpacing:'0.3px',flexShrink:0
                            }}>{p.status}</span>
                            {p.num&&<span style={{color:'#4a6a6a',fontSize:'0.7rem',flexShrink:0}}>#{p.num}</span>}
                            <span style={{color:isIR?'#888':isI?'#aaa':'#d0ecd0',fontSize:'0.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                            <span style={{color:isIR?'#888':'#4a9eff',fontWeight:'700',fontFamily:'Orbitron',fontSize:'0.8rem'}} title="Click for player card">{p.ws.toFixed(1)}</span>
                            <span style={{color:'#3a6a8a',fontSize:'0.6rem'}}>ℹ</span>
                          </div>
                        </div>
                        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:'2px',height:'3px',overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${barPct}%`,background:isIR?'#555':isI?'#888':i===0?'#ffd700':'#4a9eff',borderRadius:'2px',transition:'width 0.4s ease'}}/>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
            );
          })}
        </div>
      </td>
    </tr>
    );
  };

  const renderScoreRow=(label,scores,isGroupTotal=false,isUnitTotal=false,indent=false,pos=null)=>{
    const nums=scores.map(s=>parseFloat(s));
    const validNums=nums.filter(s=>!isNaN(s));
    const max=validNums.length?Math.max(...validNums):-Infinity;
    const tie=nums.filter(s=>s===max&&!isNaN(s)).length>1;
    let rowStyle={};
    if(isUnitTotal) rowStyle={fontWeight:'bold',background:label.includes('OFFENSE')?'rgba(42,157,143,0.28)':'rgba(220,50,60,0.28)'};
    else if(isGroupTotal) rowStyle={fontWeight:'bold',background:'rgba(255,215,0,0.08)',borderTop:'2px solid rgba(255,215,0,0.3)'};
    const isClickable=pos&&!isGroupTotal&&!isUnitTotal;
    const isExpanded=expandedPos===pos;
    if(isClickable&&rowStyle.background===undefined) rowStyle.cursor='pointer';
    return (
      <tr key={label} style={rowStyle}
        onClick={isClickable?()=>togglePos(pos):undefined}
        onMouseEnter={isClickable?e=>{e.currentTarget.style.background='rgba(45,90,45,0.25)';}:undefined}
        onMouseLeave={isClickable?e=>{e.currentTarget.style.background=rowStyle.background||'';}:undefined}>
        <td style={{paddingLeft:indent?'28px':'15px',color:indent?'#c0d8c0':isGroupTotal?'#ffd700':'#fff',fontSize:indent?'0.88rem':'0.95rem'}}>
          {indent&&<span style={{color:'#4a7c4a',marginRight:'6px'}}>└</span>}
          {label}
          {isClickable&&<span style={{fontSize:'0.68rem',color:'#4a7c4a',marginLeft:'6px',fontStyle:'italic'}}>{isExpanded?'▲ hide':'▼ players'}</span>}
        </td>
        {teams.map((team,i)=>{
          const isWinner=nums[i]===max&&!isNaN(nums[i])&&!tie;
          return(
            <td key={`${team}-${label}`} className={isWinner?'score-cell':''} style={{fontSize:indent?'0.9rem':'0.95rem'}}>
              {scores[i]}{isWinner&&<span className="advantage">✓</span>}
            </td>
          );
        })}
      </tr>
    );
  };
  const renderGroupHeader=(label,color)=>(
    <tr key={`hdr_${label}`} style={{background:'rgba(0,0,0,0.4)'}}>
      <td colSpan={teams.length+1} style={{padding:'8px 15px 5px',fontFamily:'Orbitron,sans-serif',fontSize:'0.8rem',fontWeight:'700',color,letterSpacing:'2px',textTransform:'uppercase',borderBottom:`2px solid ${color}33`}}>
        {label}
      </td>
    </tr>
  );
  const thStyle={display:'flex',alignItems:'center',gap:'8px'};
  const offenseRows=[];
  ['QB','HB','FB','TE','WR'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderGroupHeader('── Offensive Line ──','#4a9eff'));
  OL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  offenseRows.push(renderScoreRow('OL Group Total',teams.map(t=>data.teams[t]?.offensePositions['OL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['K','P'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.offensePositions[pos]?.toFixed(1)??'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) offenseRows.push(renderDrillDown(pos));
  });
  const defenseRows=[];
  defenseRows.push(renderGroupHeader('── Defensive Line ──','#ff6b6b'));
  DL_POSITIONS.forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,true,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  defenseRows.push(renderScoreRow('DL Group Total',teams.map(t=>data.teams[t]?.defensePositions['DL_TOTAL']?.toFixed(1)??'N/A'),true));
  ['LB','CB','S'].forEach(pos=>{
    const scores=teams.map(t=>data.teams[t]?.defensePositions[pos]?.toFixed(1)??'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos],scores,false,false,false,pos));
    if(expandedPos===pos) defenseRows.push(renderDrillDown(pos));
  });
  return (
    <div className="card full-width">
      {lightbox && (
        <PlayerLightbox
          player={lightbox.player}
          position={lightbox.position}
          teamName={lightbox.teamName}
          allTeamsRosterData={data.rosterData}
          contractData={contractData}
          onClose={()=>setLightbox(null)}
        />
      )}
      <h3 className="card-title">📊 Position Comparison <span style={{fontSize:'0.7rem',color:'#608060',fontWeight:'400',letterSpacing:'0',textTransform:'none'}}>· click any row for player breakdown · click player for card</span></h3>
      <h4 style={{margin:'20px 0 12px',color:'#4a9eff',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔵 OFFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{offenseRows}{renderScoreRow('🔵 OFFENSE TOTAL',teams.map(t=>data.teams[t]?.offenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <h4 style={{margin:'25px 0 12px',color:'#ff6b6b',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔴 DEFENSE</h4>
      <table><thead><tr><th style={{width:'190px'}}>Position</th>{teams.map(t=><th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}</tr></thead>
        <tbody>{defenseRows}{renderScoreRow('🔴 DEFENSE TOTAL',teams.map(t=>data.teams[t]?.defenseScore?.toFixed(1)??'N/A'),false,true)}</tbody>
      </table>
      <div style={{marginTop:'25px',padding:'20px',background:'rgba(0,0,0,0.3)',borderRadius:'12px',border:'2px solid #2d5a2d'}}>
        <h4 style={{marginBottom:'15px',fontFamily:'Orbitron',color:'#ffd700',fontSize:'1.3rem'}}>🏆 OVERALL TEAM RANKINGS</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'15px'}}>
          {teams.map(team=>{
            const isWinner=data.overall.winner===team;
            return(
              <div key={team} style={{padding:'18px',borderRadius:'12px',
                background:isWinner?'linear-gradient(135deg,#2d5a2d,#1a3a1a)':'rgba(0,0,0,0.3)',
                border:isWinner?'3px solid #ffd700':'2px solid #2d5a2d',
                color:isWinner?'#fff':'#a0d2a0',textAlign:'center',
                boxShadow:isWinner?'0 0 20px rgba(255,215,0,0.4)':'none',
                transform:isWinner?'scale(1.05)':'scale(1)',transition:'all 0.3s'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'10px'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <div style={{fontWeight:'bold',fontSize:'1.1rem',fontFamily:'Orbitron'}}>{isWinner&&'👑 '}{team}</div>
                </div>
                <div style={{fontSize:'2.2rem',fontWeight:'900',fontFamily:'Orbitron',color:isWinner?'#ffd700':'#4a9eff'}}>
                  {data.teams[team]?.overallScore?.toFixed(1)}
                </div>
                <div style={{fontSize:'0.9rem',opacity:isWinner?1:0.7,marginTop:'5px'}}>Overall Score</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Charts ──
const TEAM_CHART_COLORS = [
  {border:'#4a9eff', bg:'rgba(74,158,255,0.15)'},
  {border:'#ffd700', bg:'rgba(255,215,0,0.15)'},
  {border:'#ff6b6b', bg:'rgba(255,107,107,0.15)'},
  {border:'#69BE28', bg:'rgba(105,190,40,0.15)'},
];

function ChartsPanel({ teams, data }) {
  const radarRef=useRef(null); const radarChart=useRef(null);
  const barRef=useRef(null);   const barChart=useRef(null);
  const hbarRef=useRef(null);  const hbarChart=useRef(null);
  const [activeChart, setActiveChart]=useState('radar');

  const buildData=()=>{
    if(!data||teams.length<2) return null;
    // Position scores for bar charts — all positions
    const allPos=[...POSITION_GROUPS.offense,...POSITION_GROUPS.defense];
    const posLabels=allPos.map(p=>POSITION_DISPLAY[p]||p);
    // Attribute averages for radar
    const attrScores=teams.map(team=>{
      const td=data.rosterData[team]||{};
      return ATTRIBUTES.map((_,ai)=>{
        let total=0,count=0;
        Object.values(td).forEach(players=>players.forEach(p=>{total+=p.attrs[ai];count++;}));
        return count>0?total/count:70;
      });
    });
    // Unit scores
    const unitLabels=['Offense','OL Group','DL Group','Defense','LB','CB','S'];
    const unitScores=teams.map(team=>[
      data.teams[team]?.offenseScore||0,
      data.teams[team]?.offensePositions?.OL_TOTAL||0,
      data.teams[team]?.defensePositions?.DL_TOTAL||0,
      data.teams[team]?.defenseScore||0,
      data.teams[team]?.defensePositions?.LB||0,
      data.teams[team]?.defensePositions?.CB||0,
      data.teams[team]?.defensePositions?.S||0,
    ]);
    // Position group scores for grouped bar
    const posScores=teams.map(team=>allPos.map(pos=>{
      const v=data.teams[team]?.offensePositions?.[pos]??data.teams[team]?.defensePositions?.[pos]??null;
      return v!==null?parseFloat(v.toFixed(1)):0;
    }));
    return {posLabels,posScores,attrScores,unitLabels,unitScores};
  };

  useEffect(()=>{
    if(!data||teams.length<2) return;
    const d=buildData();
    if(!d) return;
    Chart.defaults.color='#a0d2a0';
    Chart.defaults.borderColor='#2d5a2d';

    // Destroy all first
    [radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});

    // ── Radar: attribute averages ──
    if(radarRef.current&&activeChart==='radar'){
      radarChart.current=new Chart(radarRef.current.getContext('2d'),{
        type:'radar',
        data:{labels:ATTRIBUTES,datasets:teams.map((team,i)=>({
          label:team,data:d.attrScores[i],
          borderColor:TEAM_CHART_COLORS[i].border,backgroundColor:TEAM_CHART_COLORS[i].bg,
          borderWidth:2,pointRadius:4,pointHoverRadius:6
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{r:{angleLines:{color:'rgba(45,90,45,0.5)'},grid:{color:'rgba(45,90,45,0.3)'},
            pointLabels:{font:{size:11,weight:'700',family:'Orbitron'},color:'#ffd700'},
            ticks:{stepSize:5,backdropColor:'transparent',color:'#a0d2a0'},min:60,max:100}},
          plugins:{legend:{position:'bottom',labels:{padding:20,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.r?.toFixed(1)}`}}}}
      });
    }

    // ── Grouped Bar: position scores ──
    if(barRef.current&&activeChart==='bar'){
      barChart.current=new Chart(barRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.posLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.posScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.7'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.2)'},ticks:{font:{family:'Orbitron',size:9},color:'#a0d2a0',maxRotation:45}},
            y:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100,title:{display:true,text:'Score',color:'#608060'}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(1)}`}}}}
      });
    }

    // ── Horizontal Bar: unit comparison ──
    if(hbarRef.current&&activeChart==='units'){
      hbarChart.current=new Chart(hbarRef.current.getContext('2d'),{
        type:'bar',
        data:{labels:d.unitLabels,datasets:teams.map((team,i)=>({
          label:team,data:d.unitScores[i],
          backgroundColor:TEAM_CHART_COLORS[i].bg.replace('0.15','0.75'),
          borderColor:TEAM_CHART_COLORS[i].border,borderWidth:2,borderRadius:4
        }))},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
          scales:{
            x:{grid:{color:'rgba(45,90,45,0.3)'},ticks:{color:'#a0d2a0'},min:60,max:100},
            y:{grid:{color:'rgba(45,90,45,0.1)'},ticks:{color:'#ffd700',font:{family:'Orbitron',size:10}}}
          },
          plugins:{legend:{position:'top',labels:{padding:15,usePointStyle:true,font:{family:'Roboto Condensed'}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x?.toFixed(1)}`}}}}
      });
    }

    return ()=>[radarChart,barChart,hbarChart].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}});
  },[teams,data,activeChart]);

  if(!data||teams.length<2){
    return(
      <div className="card full-width">
        <h3 className="card-title">📈 Visual Analysis</h3>
        <div className="loading">Select 2+ teams and run comparison to see charts</div>
      </div>
    );
  }

  const tabBtn=(id,label)=>(
    <button className={activeChart===id?'active btn-primary':'btn-secondary'}
      onClick={()=>setActiveChart(id)} style={{padding:'8px 16px',fontSize:'0.9rem'}}>{label}</button>
  );

  return(
    <div className="card full-width">
      <h3 className="card-title">📈 Visual Analysis</h3>
      {/* Team logo header */}
      <div style={{display:'flex',justifyContent:'center',gap:'24px',marginBottom:'18px',flexWrap:'wrap',alignItems:'center',padding:'12px 16px',background:'rgba(0,0,0,0.2)',borderRadius:'10px',border:'1px solid #2d5a2d'}}>
        {teams.map((team,i)=>(
          <div key={team} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
            <div style={{
              padding:'4px',borderRadius:'10px',
              border:`2px solid ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}`,
              background:'rgba(0,0,0,0.3)',
              filter:`drop-shadow(0 0 8px ${TEAM_CHART_COLORS[i]?.border||'#ffd700'}55)`
            }}>
              <TeamLogo teamName={team} size="medium"/>
            </div>
            <div style={{fontFamily:'Orbitron',fontWeight:'700',fontSize:'0.75rem',color:TEAM_CHART_COLORS[i]?.border||'#ffd700',letterSpacing:'0.5px',textAlign:'center'}}>{team}</div>
          </div>
        ))}
      </div>
      <div className="chart-toggle" style={{marginBottom:'20px'}}>
        {tabBtn('radar','🕷️ Attributes Radar')}
        {tabBtn('bar','📊 Position Scores')}
        {tabBtn('units','↔ Unit Comparison')}
      </div>
      {activeChart==='radar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Average attribute ratings across each team's full active roster. Higher = better.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={radarRef}></canvas></div>
        </div>
      )}
      {activeChart==='bar'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Weighted position group scores for every position — side by side.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={barRef}></canvas></div>
        </div>
      )}
      {activeChart==='units'&&(
        <div>
          <div style={{fontSize:'0.85rem',color:'#608060',marginBottom:'10px',fontStyle:'italic'}}>Horizontal comparison of key unit scores — instantly see where each team dominates.</div>
          <div className="chart-container" style={{height:'380px'}}><canvas ref={hbarRef}></canvas></div>
        </div>
      )}
    </div>
  );
}

// ── Player Lightbox ──
function PlayerLightbox({ player, position, teamName, allTeamsRosterData, contractData, onClose }) {
  if (!player || !position) return null;
  const [aiQuery, setAiQuery] = useState('');
  const [aiResponse, setAiResponse] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiReady, setAiReady] = useState(() => !!(window.pnflAI && window.pnflAI.isReady && window.pnflAI.isReady()));
  const [showAIModal, setShowAIModal] = useState(false);

  const askAI = async () => {
    if (!aiQuery.trim() || !window.pnflAI?.isReady?.()) return;
    setAiLoading(true);
    setAiResponse('');
    try {
      const contract = lookupContract(contractData, player.name, player.num);
      const systemPrompt = `You are a PNFL fantasy football analyst. Answer questions about players concisely (2-3 sentences max). Use only the data provided.`;
      const userMsg = `Player: ${player.name} | Team: ${teamName} | Position: ${POSITION_DISPLAY[position]||position} | Status: ${player.status}
Attributes (SP/AC/AG/ST/HA/EN/IN/DI): ${player.attrs.join('/')} (actual) | ${pattrs.join('/')} (potential)
Attribute total: ${actualTotal}/${playerPotentialTotal} (${pctOfMax}% developed) | ${maxedCount}/8 attrs maxed
League rank at ${position}: #${leagueRank} of ${leagueTotal}
${contract ? `Contract: ${contract.contractLength} years (${contract.contractStart}-${contract.contractEnd}), Draft: ${contract.draftSlot||'N/A'}, Years left: ${contract.yearsLeft}` : 'No contract data'}

Question: ${aiQuery}`;
      const answer = await window.pnflAI.ask(systemPrompt, userMsg, 250);
      setAiResponse(answer);
    } catch(e) {
      setAiResponse('Error: ' + e.message);
    }
    setAiLoading(false);
  };

  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  // Validate pattrs: must have 8 values all in realistic attribute range (40-99)
  const pattrsValid = player.pattrs
    && player.pattrs.length === 8
    && player.pattrs.every(v => Number.isInteger(v) && v >= 40 && v <= 99);
  const pattrs = pattrsValid ? player.pattrs : pMax;
  const hasPattrs = !!pattrsValid;

  const actualTotal = player.attrs.reduce((s,v)=>s+v,0);
  const playerPotentialTotal = pattrs.reduce((s,v)=>s+v,0);
  const potentialTotal = pMax.reduce((s,v)=>s+v,0);
  // % of player's own potential (not position max)
  const pctOfPlayerPotential = Math.round((actualTotal / playerPotentialTotal) * 100);
  // Count how many attrs are at or above the player's potential ceiling
  const maxedCount = player.attrs.filter((v,i) => v >= pattrs[i]).length;
  const pctOfMax = pctOfPlayerPotential;

  // League ranking: compare player's score vs all same-position players across all teams
  const weights = loadWeights();
  const playerScore = calculatePlayerScore(player.attrs, position, weights);
  const allSamePos = [];
  Object.values(allTeamsRosterData || {}).forEach(teamData => {
    (teamData[position] || []).forEach(p => {
      allSamePos.push({ name: p.name, score: calculatePlayerScore(p.attrs, position, weights) });
    });
  });
  allSamePos.sort((a,b) => b.score - a.score);
  const leagueRank = allSamePos.findIndex(p => p.name === player.name) + 1;
  const leagueTotal = allSamePos.length;

  const barColor = pctOfMax >= 90 ? '#4aff4a' : pctOfMax >= 75 ? '#ffd700' : pctOfMax >= 55 ? '#4a9eff' : '#ff6b6b';

  // Contract data lookup — try by name and player num as PID
  const contract = lookupContract(contractData, player.name, player.num);
  const hasContract = !!contract;

  return (
    <div onClick={onClose} className="lightbox-outer" style={{
      position:'fixed',inset:0,zIndex:9999,
      background:'rgba(0,0,0,0.85)',
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'20px',backdropFilter:'blur(4px)'
    }}>
      <div onClick={e=>e.stopPropagation()} className="lightbox-inner" style={{
        background:'linear-gradient(135deg,rgba(10,22,40,0.99),rgba(13,40,24,0.99))',
        border:'2px solid #ffd700',borderRadius:'16px',
        maxWidth:'600px',width:'100%',maxHeight:'90vh',overflowY:'auto',
        boxShadow:'0 0 60px rgba(255,215,0,0.15)',
        position:'relative'
      }}>
        {/* Close */}
        <button onClick={onClose} style={{
          position:'absolute',top:'12px',right:'12px',
          background:'rgba(255,100,100,0.15)',border:'1px solid #ff4a4a44',
          borderRadius:'50%',width:'30px',height:'30px',color:'#ff6b6b',
          cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'
        }}>✕</button>

        {/* Header: logo + name */}
        <div style={{
          padding:'20px 24px 16px',
          borderBottom:'1px solid #2d5a2d',
          display:'flex',alignItems:'center',gap:'16px'
        }}>
          <div style={{filter:'drop-shadow(0 0 10px rgba(255,215,0,0.4))'}}>
            <TeamLogo teamName={teamName} size="medium"/>
          </div>
          <div>
            <div style={{fontFamily:'Orbitron',fontWeight:'900',fontSize:'1.2rem',color:'#fff',letterSpacing:'0.5px'}}>{player.name}</div>
            <div style={{display:'flex',gap:'10px',marginTop:'5px',alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontFamily:'Orbitron',fontSize:'0.75rem',color:'#ffd700',letterSpacing:'1px'}}>{POSITION_DISPLAY[position]||position}</span>
              {player.num && <span style={{color:'#608060',fontSize:'0.8rem',fontFamily:'Roboto Condensed'}}>#{player.num}</span>}
              <span style={{
                fontSize:'0.68rem',fontFamily:'Orbitron',fontWeight:'700',letterSpacing:'1px',
                padding:'2px 7px',borderRadius:'4px',
                color:player.status==='A'?'#4aff4a':player.status==='O'?'#ffd700':player.status==='I'?'#ff9944':'#ff4444',
                background:player.status==='A'?'rgba(74,255,74,0.1)':player.status==='O'?'rgba(255,215,0,0.1)':player.status==='I'?'rgba(255,153,68,0.08)':'rgba(255,68,68,0.08)',
                border:`1px solid ${player.status==='A'?'#4aff4a44':player.status==='O'?'#ffd70044':player.status==='I'?'#ff994444':'#ff444444'}`
              }}>{player.status}</span>
              <span style={{color:'#5a8a6a',fontSize:'0.75rem',fontFamily:'Roboto Condensed'}}>{teamName}</span>
            </div>
            {/* Salary row — shown if contract data has salary info */}
            {contract && (contract.currentSalary || contract.nextSalary) && (
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'6px',flexWrap:'wrap'}}>
                <img src={MONEY_ICON_URI} alt="$" style={{width:'18px',height:'18px',imageRendering:'crisp-edges'}}/>

                {contract.currentSalary && (

        </div>

        {/* Attribute table */}
        <div style={{padding:'16px 24px'}}>

          {!hasPattrs && (

            {ATTRIBUTES.map(attr=>(
              <div key={attr} style={{

                background:'linear-gradient(135deg,#1a4a8a,#0d2a5a)',
                border:'1px solid #2a5a9a',color:'#fff',letterSpacing:'0.5px',fontFamily:'Orbitron'

function ScoutingReport({ getTeamData, weights, depth, designation, contractData, standingsData, seasonData, gameStatsData, rosterMeta }) {
  const [team, setTeam] = useState('');
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const aiReady = !!(window.pnflAI?.isReady?.());

  const generateReport = async () => {
    if (!team || !aiReady) return;
    setLoading(true);
    setError('');
    setReport(null);

    try {
      const td = getTeamData(team) || {};
      const wts = weights || loadWeights();
      const standing = standingsData?.rankings?.find(r => r.team === team) || {};

      // Build rich context from all data sources
      const posScores = {};
      [...POSITION_GROUPS.offense, ...POSITION_GROUPS.defense].forEach(pos => {
        const score = calculatePositionScore(td, pos, wts, (depth||loadDepth())[pos]||3, designation||'AO');
        if (score !== null) posScores[pos] = score;
      });
      const sortedPos = Object.entries(posScores).sort((a,b)=>b[1]-a[1]);
      const topPos = sortedPos.slice(0,3).map(([p,s])=>`${POSITION_DISPLAY[p]||p} (${s.toFixed(1)})`).join(', ');
      const weakPos = sortedPos.slice(-3).reverse().map(([p,s])=>`${POSITION_DISPLAY[p]||p} (${s.toFixed(1)})`).join(', ');

      // Best contract value: high roster score, low salary, years remaining
      let sleeper = '', valueDeal = '';
      if (contractData) {
        let bestValue = null, bestValueScore = -Infinity;
        let bestSleeper = null, bestSleeperScore = -Infinity;
        Object.values(td).flat().forEach(p => {
          if (!p?.attrs) return;
          const contract = lookupContract(contractData, p.name, p.num);
          const pScore = calculatePlayerScore(p.attrs, Object.keys(td).find(pos => (td[pos]||[]).includes(p)) || 'QB', wts);
          // Value = score / salary ratio
          if (contract?.currentSalary && contract.currentSalary > 0) {
            const valueScore = pScore / (contract.currentSalary / 1000000);
            if (valueScore > bestValueScore) { bestValueScore = valueScore; bestValue = { ...p, contract, pScore }; }
          }
          // Sleeper = high potential gap, cheap
          const pPos = Object.keys(td).find(pos => (td[pos]||[]).includes(p)) || 'QB';
          const pMax = POS_POTENTIAL_MAX[pPos] || POS_POTENTIAL_MAX.LB;
          const potTotal = pMax.reduce((s,v)=>s+v,0);
          const actTotal = p.attrs.reduce((s,v)=>s+v,0);
          const gap = potTotal - actTotal;
          if (gap > 30 && (!contract?.currentSalary || contract.currentSalary < 2000000)) {
            if (gap > bestSleeperScore) { bestSleeperScore = gap; bestSleeper = { ...p, contract, gap }; }
          }
        });
        if (bestValue) valueDeal = `${bestValue.name} ($${(bestValue.contract.currentSalary/1000000).toFixed(1)}M/yr, score ${bestValue.pScore.toFixed(0)})`;
        if (bestSleeper) sleeper = `${bestSleeper.name} (${bestSleeper.gap} potential gap${bestSleeper.contract?.currentSalary ? ', $' + (bestSleeper.contract.currentSalary/1000000).toFixed(1)+'M' : ''})`;
      }

      // Recent game results from gameStatsData
      const recentGames = (gameStatsData?.games || [])
        .filter(g => g.team1 === team || g.team2 === team || String(g.team||'').includes(team))
        .slice(0,3)
        .map(g => g.team1 && g.score1 !== undefined ? `${g.team1} ${g.score1}-${g.score2} ${g.team2}` : JSON.stringify(g))
        .join('; ');

      const season = rosterMeta?.season || '2048';
      const week   = rosterMeta?.week   || '?';

      const systemPrompt = `You are an expert PNFL fantasy football scout writing a professional scouting report. Be analytical, specific, and concise. Use the provided data only. Format your response with exactly these 5 section headers on separate lines: STRENGTHS:, CONCERNS:, BEST CONTRACT:, SLEEPER:, DRAFT PRIORITY: Each section should be 1-2 sentences.`;

      const userMsg = `Generate a scouting report for the ${team} — Season ${season}, Week ${week}.

STANDINGS: Rank #${standing.rank||'?'}, Record ${standing.wins||0}W-${standing.losses||0}L, ${standing.pts||0} power points
STRONGEST POSITIONS: ${topPos}
WEAKEST POSITIONS: ${weakPos}
BEST CONTRACT VALUE: ${valueDeal || 'Not available'}
SLEEPER CANDIDATE: ${sleeper || 'None identified'}
RECENT GAMES: ${recentGames || 'No game data'}
OFFENSE TOTAL: ${(calculateUnitScore(td,'offense',wts,depth||loadDepth(),designation||'AO')||0).toFixed(1)}
DEFENSE TOTAL: ${(calculateUnitScore(td,'defense',wts,depth||loadDepth(),designation||'AO')||0).toFixed(1)}`;

      const response = await window.pnflAI.ask(systemPrompt, userMsg, 400);
      setReport(parseScoutingReport(response));
      playSound('compareDone');
      haptic('medium');
    } catch(e) {
      setError(e.message || String(e));
    }
    setLoading(false);
  };

  return (
    <div className="panel-content">
      <div style={{marginBottom:'14px',color:'#a0d2a0',fontSize:'0.82rem',fontFamily:'Roboto Condensed',lineHeight:1.5}}>
        AI-generated scouting report using roster scores, contract value, standings, and game stats for the current week.
        {!aiReady && <span style={{color:'#ff9944',display:'block',marginTop:'4px'}}>⚠️ Enable AI Analyst in the header bar first.</span>}
      </div>
      <div style={{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap'}}>
        <select value={team} onChange={e=>setTeam(e.target.value)}
          style={{flex:1,padding:'8px 12px',background:'rgba(10,22,40,0.9)',border:'1px solid #2d5a2d',borderRadius:'8px',color:'#a0d2a0',fontFamily:'Roboto Condensed',fontSize:'0.9rem',outline:'none',minWidth:'180px'}}>
          <option value="">Select a team…</option>
          {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <button onClick={generateReport} disabled={!team||loading||!aiReady} className="haptic-btn"
          style={{padding:'8px 20px',background: team&&aiReady?'linear-gradient(135deg,#1a3a6c,#0d2450)':'rgba(30,40,50,0.4)',border:`2px solid ${team&&aiReady?'#4a9eff':'#2a3a4a'}`,borderRadius:'8px',color:team&&aiReady?'#7ec8ff':'#3a5060',fontFamily:'Orbitron',fontSize:'0.78rem',fontWeight:'700',cursor:team&&aiReady?'pointer':'not-allowed',transition:'all 0.2s',opacity:team&&aiReady?1:0.5}}>
          {loading ? <span style={{display:'inline-block',animation:'spin2 1s linear infinite'}}>⟳</span> : '📋 Generate'}
        </button>
      </div>
      {error && <div style={{padding:'8px 12px',background:'rgba(255,60,60,0.08)',border:'1px solid rgba(255,80,80,0.25)',borderRadius:'7px',fontSize:'0.75rem',color:'#ff9090',fontFamily:'Roboto Condensed',marginBottom:'12px'}}>{error}</div>}
      {report && <ScoutingReportCard report={report} team={team} rosterMeta={rosterMeta}/>}
    </div>
  );
}

function parseScoutingReport(text) {
  const sections = { STRENGTHS:'', CONCERNS:'', 'BEST CONTRACT':'', SLEEPER:'', 'DRAFT PRIORITY':'' };
  const keys = Object.keys(sections);
  keys.forEach((key, i) => {
    const pattern = new RegExp(key + ':?\\s*([\\s\\S]*?)(?=' + (keys[i+1] ? keys[i+1] + ':' : '$') + ')', 'i');
    const m = text.match(pattern);
    if (m) sections[key] = m[1].trim();
  });
  // If structured parsing fails, return raw text
  if (!sections.STRENGTHS && !sections.CONCERNS) sections.RAW = text;
  return sections;
}

  const [teamB,setTeamB]=useState('');
  const [giveAway,setGiveAway]=useState([]);
  const [getBack,setGetBack]=useState([]);
  const [result,setResult]=useState(null);

  const getPlayers=(team)=>{
    const td=getTeamData(team)||{};
    const out=[];
    Object.entries(td).forEach(([pos,players])=>(players||[]).forEach(p=>out.push({...p,pos,key:`${pos}_${p.name}`})));
    return out.sort((a,b)=>a.pos.localeCompare(b.pos)||a.name.localeCompare(b.name));
  };
  const togglePlayer=(list,setList,player)=>{
    const k=player.key;
    setList(prev=>prev.find(p=>p.key===k)?prev.filter(p=>p.key!==k):[...prev,player]);
  };
  const DeltaBadge=({before,after,label})=>{
    const diff=(after-before); const d=diff.toFixed(1);
    const up=diff>0.05; const down=diff<-0.05;
    return(
      <div style={{textAlign:'center',padding:'10px',background:'rgba(0,0,0,0.3)',borderRadius:'8px',border:'1px solid #2d5a2d'}}>
        <div style={{fontSize:'0.68rem',color:'#608060',textTransform:'uppercase',letterSpacing:'1px',fontFamily:'Orbitron',marginBottom:'3px'}}>{label}</div>
        <div style={{fontSize:'1.1rem',fontWeight:'900',fontFamily:'Orbitron',color:'#fff'}}>{after.toFixed(1)}</div>
        <div style={{fontSize:'0.85rem',fontWeight:'700',color:up?'#4aff4a':down?'#ff4a4a':'#a0a0a0',marginTop:'2px'}}>
          {up?`▲ +${d}`:down?`▼ ${d}`:'—'}
        </div>
      </div>
    );
  };
  const analyzeTrade=()=>{
    if(!teamA||!teamB){alert('Select both teams first');return;}
    if(giveAway.length===0&&getBack.length===0){alert('Select at least one player to trade');return;}
    const cloneRoster=(team)=>JSON.parse(JSON.stringify(getTeamData(team)||buildPlaceholderRoster(team)));
    const tdA=cloneRoster(teamA); const tdB=cloneRoster(teamB);
    const beforeA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const beforeB=computeTeamResult(teamB,tdB,weights,depth,designation);
    const move=(src,dest,players)=>players.forEach(p=>{
      const pos=p.pos;
      if(src[pos]) src[pos]=src[pos].filter(pl=>pl.name!==p.name);
      if(!dest[pos]) dest[pos]=[];
      dest[pos].push({name:p.name,num:p.num,status:p.status,attrs:p.attrs});
    });
    move(tdA,tdB,giveAway); move(tdB,tdA,getBack);
    const afterA=computeTeamResult(teamA,tdA,weights,depth,designation);
    const afterB=computeTeamResult(teamB,tdB,weights,depth,designation);
    setResult({beforeA,afterA,beforeB,afterB});
  };
  const PList=({team,list,setList})=>(
    <div style={{maxHeight:'260px',overflowY:'auto',background:'rgba(0,0,0,0.2)',borderRadius:'8px',padding:'8px',border:'1px solid #2d5a2d'}}>
      <div style={{fontSize:'0.72rem',color:'#608060',marginBottom:'6px',fontStyle:'italic'}}>Click to add/remove from trade:</div>
      {getPlayers(team).map(p=>{
        const sel=!!list.find(x=>x.key===p.key);
        return(
          <div key={p.key} onClick={()=>togglePlayer(list,setList,p)}
            style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 8px',margin:'2px 0',borderRadius:'5px',cursor:'pointer',
              background:sel?'rgba(74,158,255,0.22)':'rgba(0,0,0,0.15)',border:sel?'1px solid #4a9eff':'1px solid #2d5a2d',transition:'all 0.15s'}}>
            <span style={{display:'flex',gap:'7px',alignItems:'center',fontSize:'0.8rem'}}>
              <span style={{color:p.status==='A'?'#4aff4a':'#ff9944',fontSize:'0.68rem',fontWeight:'700'}}>{p.status}</span>
              <span style={{color:'#5a8a6a',fontSize:'0.72rem',minWidth:'22px'}}>{p.pos}</span>
              <span style={{color:'#b0d8b0'}}>{p.name}</span>
            </span>
            {sel&&<span style={{color:'#4a9eff',fontSize:'0.82rem'}}>✓</span>}
          </div>
        );
      })}
    </div>
  );
  return(
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'16px',color:'#a0d2a0'}}>Select two teams, pick players to swap on each side, then analyze the score impact instantly.</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'16px'}}>
          {[{id:'A',label:'Team A — gives away',val:teamA,setVal:(v)=>{setTeamA(v);setGiveAway([]);},list:giveAway,setList:setGiveAway,other:teamB},
            {id:'B',label:'Team B — gives away',val:teamB,setVal:(v)=>{setTeamB(v);setGetBack([]);},list:getBack,setList:setGetBack,other:teamA}
          ].map(({id,label,val,setVal,list,setList,other})=>(
            <div key={id}>
              <div style={{fontFamily:'Orbitron',color:'#4a9eff',fontSize:'0.85rem',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'1px'}}>{label}</div>
              <select value={val} onChange={e=>setVal(e.target.value)} style={{width:'100%',marginBottom:'10px',padding:'10px',borderRadius:'6px',background:'rgba(10,22,40,0.8)',color:'#fff',border:'2px solid #2d5a2d',fontFamily:'Roboto Condensed',fontSize:'1rem'}}>
                <option value="">-- Select Team --</option>
                {[...TEAM_NAMES].sort().filter(t=>t!==other).map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              {val&&<PList team={val} list={list} setList={setList}/>}
            </div>
          ))}
        </div>
        {(giveAway.length>0||getBack.length>0)&&(
          <div style={{background:'rgba(0,0,0,0.25)',borderRadius:'8px',padding:'10px 14px',marginBottom:'14px',border:'1px solid #2d5a2d',fontSize:'0.85rem',color:'#a0d2a0'}}>
            <strong style={{color:'#ffd700'}}>Trade: </strong>
            {giveAway.length>0&&<span>{teamA} sends {giveAway.map(p=>`${p.name}(${p.pos})`).join(', ')} </span>}
            {getBack.length>0&&<span>| {teamB} sends {getBack.map(p=>`${p.name}(${p.pos})`).join(', ')}</span>}
          </div>
        )}
        <button className="btn-primary" onClick={analyzeTrade} style={{width:'100%',fontSize:'1.1rem',padding:'13px',marginBottom:'18px'}}>
          🔄 Analyze Trade Impact
        </button>
        {result&&(
          <div>
            <h4 style={{fontFamily:'Orbitron',color:'#ffd700',marginBottom:'14px',fontSize:'1.05rem'}}>📈 TRADE IMPACT</h4>
            {[{team:teamA,before:result.beforeA,after:result.afterA},{team:teamB,before:result.beforeB,after:result.afterB}].map(({team,before,after})=>(
              <div key={team} style={{marginBottom:'14px',background:'rgba(0,0,0,0.2)',borderRadius:'10px',padding:'13px',border:'1px solid #2d5a2d'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <span style={{fontFamily:'Orbitron',fontSize:'0.95rem',fontWeight:'700'}}>{team}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                  <DeltaBadge before={before.overallScore} after={after.overallScore} label="Overall"/>
                  <DeltaBadge before={before.offenseScore} after={after.offenseScore} label="Offense"/>
                  <DeltaBadge before={before.defenseScore} after={after.defenseScore} label="Defense"/>
                </div>
              </div>
            ))}
            <div style={{fontSize:'0.78rem',color:'#608060',fontStyle:'italic',textAlign:'center',marginTop:'6px'}}>Based on your current weights & depth settings.</div>
          </div>
        )}
    </div>
  );
}

const LPR_TIER = (rank) => {
  if (rank === 1)        return { label:'👑 ELITE',       color:'#ffd700', bg:'rgba(255,215,0,0.10)',  glow:'rgba(255,215,0,0.25)' };
  if (rank <= 3)         return { label:'🔥 CONTENDER',   color:'#ff9944', bg:'rgba(255,153,68,0.08)', glow:'rgba(255,153,68,0.2)' };
  if (rank <= 6)         return { label:'⚡ CHALLENGER',  color:'#4a9eff', bg:'rgba(74,158,255,0.07)', glow:'rgba(74,158,255,0.15)' };
  if (rank <= 10)        return { label:'🏈 CONTENDING',  color:'#a0d2a0', bg:'rgba(74,200,100,0.06)', glow:'rgba(74,200,100,0.1)' };
  if (rank <= 14)        return { label:'📉 MID-PACK',    color:'#808090', bg:'rgba(80,80,100,0.07)',  glow:'none' };
  return                        { label:'🔧 REBUILDING',  color:'#606060', bg:'rgba(60,60,60,0.06)',   glow:'none' };
};

const LPR_BLURB = (r) => {
  const { rank, wins, pts, oppsDefeated } = r;
  const oppCount = oppsDefeated.length;
  if (wins === 0)   return `Still searching for their first win — early-season adversity builds character.`;
  if (rank === 1 && wins >= 3) return `Sitting at the top of the league with a dominant ${wins}-win record and ${pts} power points. Setting the standard.`;
  if (rank <= 3)    return `Among the league elite at ${wins}-${0} — ${oppCount} quality ${oppCount === 1 ? 'victory' : 'victories'} powering a ${pts}-pt ranking.`;
  if (rank <= 6)    return `A strong ${wins}-win campaign with ${pts} power points puts them firmly in playoff contention.`;
  if (rank <= 10)   return `Sitting at ${wins}-${0} with ${pts} pts — firmly in the mix but still room to climb.`;
  if (rank <= 14)   return `${wins > 0 ? `A ${wins}-win showing` : 'Still winless'} — needs consistency to move up the standings.`;
  return `${wins > 0 ? `${wins} win on the board` : 'No wins yet'} — a long road ahead for playoff positioning.`;
};

function PowerRankings({ getTeamData, weights, depth, designation }) {
  const [rankings,setRankings]=useState(null);
  const [working,setWorking]=useState(false);
  const [sortKey,setSortKey]=useState('overall');

  const generate=()=>{
    setWorking(true);
    setTimeout(()=>{
      try {
        const res=TEAM_NAMES.map(team=>{
          const td=getTeamData(team)||buildPlaceholderRoster(team);
          const r=computeTeamResult(team,td,weights,depth,designation);
          return {team,...r};
        }).sort((a,b)=>b.overallScore-a.overallScore);
        setRankings(res);
      } catch(err) {
        alert('Rankings error: ' + err.message);
        console.error(err);
      }
      setWorking(false);
    },50);
  };

  const sorted=React.useMemo(()=>{
    if(!rankings) return null;
    return [...rankings].sort((a,b)=>{
      if(sortKey==='offense') return b.offenseScore-a.offenseScore;
      if(sortKey==='defense') return b.defenseScore-a.defenseScore;
      return b.overallScore-a.overallScore;
    });
  },[rankings,sortKey]);

  const tier=(rank)=>{
    if(rank<=3)  return {label:'ELITE',     color:'#ffd700', bg:'rgba(255,215,0,0.1)'};
    if(rank<=8)  return {label:'CONTENDER', color:'#4a9eff', bg:'rgba(74,158,255,0.07)'};
    if(rank<=13) return {label:'MID-TIER',  color:'#a0d2a0', bg:'rgba(45,90,45,0.07)'};
    return             {label:'REBUILDING', color:'#608060', bg:'rgba(0,0,0,0.08)'};
  };

  const maxOff=sorted?Math.max(...sorted.map(r=>r.offenseScore)):100;
  const maxDef=sorted?Math.max(...sorted.map(r=>r.defenseScore)):100;
  const maxOvr=sorted?Math.max(...sorted.map(r=>r.overallScore)):100;

  const SortBtn=({k,label,color})=>(
    <button className={sortKey===k?'btn-primary':'btn-secondary'} onClick={()=>setSortKey(k)}
      style={{padding:'6px 14px',fontSize:'0.8rem',borderColor:sortKey===k?color:'',color:sortKey===k?'':color}}>{label}</button>
  );
  const MiniBar=({val,max,color})=>(
    <div style={{background:'rgba(0,0,0,0.3)',borderRadius:'3px',height:'6px',width:'100%',overflow:'hidden',marginTop:'2px'}}>
      <div style={{height:'100%',width:`${Math.round((val/max)*100)}%`,background:color,borderRadius:'3px',transition:'width 0.6s ease'}}/>
    </div>
  );

  return(
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'16px',color:'#a0d2a0'}}>All 18 teams ranked by roster strength using your current weights &amp; depth. Scores normalized against position attribute ceilings. Sortable by column.</div>
      <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'18px',alignItems:'center'}}>
        <button className="btn-primary" onClick={generate} disabled={working} style={{fontSize:'1rem',padding:'11px 22px'}}>
          {working?'⏳ Calculating...':'📊 Generate Rankings'}
        </button>
        {rankings&&<>
          <span style={{color:'#608060',fontSize:'0.85rem',marginLeft:'8px'}}>Sort:</span>
          <SortBtn k="overall" label="⚡ Overall" color="#ffd700"/>
          <SortBtn k="offense" label="🔵 Offense" color="#4a9eff"/>
          <SortBtn k="defense" label="🔴 Defense" color="#ff6b6b"/>
        </>}
      </div>
      {sorted&&(
        <div style={{borderRadius:'10px',overflow:'hidden',border:'1px solid #2d5a2d'}}>
          <div style={{display:'grid',gridTemplateColumns:'42px 1fr 80px 78px 78px 100px',alignItems:'center',padding:'8px 12px',background:'rgba(0,0,0,0.5)',fontFamily:'Orbitron',fontSize:'0.68rem',color:'#608060',textTransform:'uppercase',letterSpacing:'1px',borderBottom:'2px solid #2d5a2d'}}>
            <div>#</div><div>Team</div>
            <div style={{textAlign:'center',color:sortKey==='overall'?'#ffd700':'#608060'}}>Overall</div>
            <div style={{textAlign:'center',color:sortKey==='offense'?'#4a9eff':'#608060'}}>Off</div>
            <div style={{textAlign:'center',color:sortKey==='defense'?'#ff6b6b':'#608060'}}>Def</div>
            <div style={{textAlign:'center'}}>Tier</div>
          </div>
          {sorted.map((r,i)=>{
            const rank=i+1; const t=tier(rank); const isTop=rank===1;
            return(
              <div key={r.team} style={{display:'grid',gridTemplateColumns:'42px 1fr 80px 78px 78px 100px',alignItems:'center',padding:'9px 12px',background:isTop?'rgba(255,215,0,0.06)':t.bg,borderBottom:'1px solid rgba(45,90,45,0.25)',transition:'background 0.15s',cursor:'default'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(45,90,45,0.22)'}
                onMouseLeave={e=>e.currentTarget.style.background=isTop?'rgba(255,215,0,0.06)':t.bg}>
                <div style={{fontFamily:'Orbitron',fontWeight:'900',
                  color:rank===1?'#ffd700':rank===2?'#c0c0c0':rank===3?'#cd7f32':rank<=8?'#4a9eff':'#608060',
                  fontSize:rank<=3?'1.3rem':'1rem',textAlign:'center',
                  textShadow:rank===1?'0 0 12px rgba(255,215,0,0.7)':rank===2?'0 0 8px rgba(192,192,192,0.5)':rank===3?'0 0 8px rgba(205,127,50,0.5)':'none',
                  filter:rank<=3?`drop-shadow(0 0 4px ${rank===1?'rgba(255,215,0,0.4)':rank===2?'rgba(192,192,192,0.3)':'rgba(205,127,50,0.3)'})`:'none'}}>
                  {rank===1?'👑':rank===2?'🥈':rank===3?'🥉':rank}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <TeamLogo teamName={r.team} size="small"/>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:'700',fontSize:'0.9rem',fontFamily:'Orbitron',color:rank<=3?'#ffd700':'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.team}</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 6px',marginTop:'4px',maxWidth:'140px'}}>
                      <MiniBar val={r.offenseScore} max={maxOff} color="#4a9eff"/>
                      <MiniBar val={r.defenseScore} max={maxDef} color="#ff6b6b"/>
                    </div>
                  </div>
                </div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',fontWeight:'900',color:sortKey==='overall'?'#ffd700':'#e0e0e0',fontSize:'1rem'}}>{r.overallScore.toFixed(1)}</div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',color:sortKey==='offense'?'#4a9eff':'#9090b0',fontSize:'0.88rem'}}>{r.offenseScore.toFixed(1)}</div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',color:sortKey==='defense'?'#ff6b6b':'#9090b0',fontSize:'0.88rem'}}>{r.defenseScore.toFixed(1)}</div>
                <div style={{textAlign:'center'}}>
                  <span style={{background:t.bg,color:t.color,border:`1px solid ${t.color}44`,borderRadius:'4px',padding:'2px 7px',fontSize:'0.62rem',fontFamily:'Orbitron',fontWeight:'700',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>{t.label}</span>
                </div>
              </div>
            );
          })}
          <div style={{padding:'9px 12px',background:'rgba(0,0,0,0.25)',fontSize:'0.72rem',color:'#608060',display:'flex',gap:'18px',flexWrap:'wrap'}}>
            <span>🟡 Elite: 1–3</span><span>🔵 Contender: 4–8</span><span>🟢 Mid-Tier: 9–13</span><span>⚫ Rebuilding: 14–18</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App() {
  const [teams,setTeams]=useState(['','']);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [weights,setWeights]=useState(loadWeights);
  const [depth,setDepth]=useState(loadDepth);
  const [rosterData,setRosterData]=useState(()=>loadRosterCache());
  const [standingsData,setStandingsData]=useState(()=>loadStandingsCache());
  const [contractData,setContractData]=useState(()=>loadContractCache());
  const [seasonData,setSeasonData]=useState(()=>loadSeasonCache());
  const [gameStatsData,setGameStatsData]=useState(()=>loadGameStatsCache());
  const [fetching,setFetching]=useState(false);
  const [fetchingContracts,setFetchingContracts]=useState(false);
  const [fetchError,setFetchError]=useState(null);
  const [designation,setDesignation]=useState('AO');
  const [activePanel,setActivePanel]=useState(null);

  // Clear all cached data
  const clearCache=()=>{
    if(!window.confirm('Clear all cached roster data and reset settings to defaults?')) return;
    storageWithSession.clear();
    setRosterData(null);
    setStandingsData(null);
    setContractData(null);
    setData(null);
    setWeights(JSON.parse(JSON.stringify(DEFAULT_WEIGHTS)));
    setDepth(JSON.parse(JSON.stringify(DEFAULT_DEPTH)));
    setTeams(['','']);
    alert('✓ Cache cleared. Fetch fresh rosters when ready.');
  };

  // Helper: fetch a URL through multiple CORS proxies, return raw text
  const fetchViaProxy = async (targetUrl, validator) => {
    const PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];
    let lastError = '';
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const res = await fetch(PROXIES[i](targetUrl), {signal: AbortSignal.timeout(20000)});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct = res.headers.get('content-type') || '';
        let text = ct.includes('application/json')
          ? (() => { return res.json().then(j => j.contents || j.body || ''); })()
          : res.text();
        text = await text;
        if (text && text.length > 200 && validator(text)) return { ok: true, text };
        throw new Error('Response did not pass validation');
      } catch(e) {
        lastError = e.message;
      }
    }
    return { ok: false, error: lastError };
  };

  // Fetch live roster + standings via CORS proxy (both fetched simultaneously)
  const fetchRosters=useCallback(async()=>{
    setFetching(true);
    setFetchError(null);

    // Build GameStats URL based on current week (updated each fetch)
    const currentWeek = rosterData?.week || standingsData?.week || '3';
    const currentSeason = rosterData?.season || standingsData?.season || '2048';
    const weekPadded = String(currentWeek).padStart(1,'0');
    const gameStatsUrl = `https://pnfl.biz/GameStats/${currentSeason}/${currentSeason}W${weekPadded}-PNFL_game%20stats.htm`;

    const [rosterResult, standingsResult, seasonResult, gameStatsResult] = await Promise.all([
      fetchViaProxy(
        'https://pnfl.biz/pnflstats/PNFL_roster.htm',
        t => t.includes('Team Roster') || t.includes('PNFL')
      ),
      fetchViaProxy(
        'https://pnfl.biz/pnflstats/PNFL_standings.htm',
        t => t.includes('Power Rankings') || t.includes('PNFL') || t.includes('Miami') || t.includes('Pittsburgh')
      ),
      fetchViaProxy(
        'https://pnfl.biz/pnflstats/PNFL_season.htm',
        t => t.includes('PNFL') || t.length > 500
      ),
      fetchViaProxy(
        gameStatsUrl,
        t => t.includes('PNFL') || t.includes('stat') || t.length > 500
      ),
    ]);

    let rosterOk = false, standingsOk = false;

    if (rosterResult.ok) {
      try {
        const parsed = parsePNFLRosterText(rosterResult.text);
        const teamCount = Object.keys(parsed.teams).length;
        if (teamCount === 0) throw new Error('No teams parsed');
        saveRosterCache(parsed);
        setRosterData(parsed);
        rosterOk = true;
        playSound('fetchDone');
      } catch(e) {
        console.warn('Roster parse failed:', e.message);
      }
    }

    if (standingsResult.ok) {
      try {
        const parsed = parsePNFLStandingsText(standingsResult.text);
        if (parsed.rankings.length > 0) {
          saveStandingsCache(parsed);
          setStandingsData(parsed);
          standingsOk = true;
        }
      } catch(e) {
        console.warn('Standings parse failed:', e.message);
      }
    }

    // Season stats
    if (seasonResult.ok) {
      try {
        const parsed = parseSeasonStats(seasonResult.text);
        saveSeasonCache(parsed);
        setSeasonData(parsed);
        console.log('[PNFL] Season stats loaded');
      } catch(e) { console.warn('Season parse failed:', e.message); }
    }

    // Game stats for current week
    if (gameStatsResult.ok) {
      try {
        const parsed = parseGameStats(gameStatsResult.text);
        saveGameStatsCache(parsed);
        setGameStatsData(parsed);
        console.log('[PNFL] GameStats loaded:', parsed.games.length, 'games');
      } catch(e) { console.warn('GameStats parse failed:', e.message); }
    }

    if (rosterOk || standingsOk) {
      const msgs = [];
      if (rosterOk) msgs.push(`✓ Rosters: ${Object.keys(loadRosterCache()?.teams||{}).length} teams`);
      if (standingsOk) msgs.push(`✓ Power Rankings: Week ${loadStandingsCache()?.week}`);
      if (!rosterOk) msgs.push(`⚠️ Rosters fetch failed`);
      if (!standingsOk) msgs.push(`⚠️ Standings fetch failed`);
      alert(msgs.join('\n'));
    } else {
      setFetchError(rosterResult.error || standingsResult.error || 'Unknown error');
      alert(`⚠️ All fetches failed. CORS proxies may be temporarily busy. Your built-in Week 1 data is still active.`);
    }

    setFetching(false);
  },[]);

  // Fetch and parse the contracts XLSX file
  const fetchContracts=useCallback(async()=>{
    setFetchingContracts(true);
    const CONTRACT_URL = 'https://pnfl.biz/pnflstats/Contracts.xlsx';
    const PROXIES = [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];
    let arrayBuffer = null;
    let lastError = '';

    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const res = await fetch(PROXIES[i](CONTRACT_URL), {signal: AbortSignal.timeout(30000)});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        if (buf.byteLength < 1000) throw new Error('Response too small to be a valid xlsx');
        arrayBuffer = buf;
        break;
      } catch(e) {
        lastError = e.message;
        console.warn(`Contract proxy ${i+1} failed:`, e.message);
      }
    }

    if (!arrayBuffer) {
      alert(`⚠️ Contract file fetch failed.\n${lastError}\n\nTry again in a moment.`);
      setFetchingContracts(false);
      return;
    }

    try {
      const parsed = await parseContractAsync(arrayBuffer);
      if (!parsed || parsed.playerCount === 0) throw new Error('No player contracts found in file');
      saveContractCache(parsed);
      playSound('contractOk');
      setContractData(parsed);
      alert(`✓ Contracts loaded!\n${parsed.playerCount} players across ${parsed.teamCount} teams.\nLast updated: ${new Date().toLocaleString()}`);
    } catch(e) {
      alert(`⚠️ Contract parse failed: ${e.message}`);
    }
    setFetchingContracts(false);
  },[]);
  const getTeamData=(team)=>{
    if(rosterData&&rosterData.teams&&rosterData.teams[team]) return rosterData.teams[team];
    if(HARDCODED_ROSTER_DATA&&HARDCODED_ROSTER_DATA.teams&&HARDCODED_ROSTER_DATA.teams[team]) return HARDCODED_ROSTER_DATA.teams[team];
    return null;
  };

  const compare=()=>{
    const valid=teams.filter(t=>t&&TEAM_NAMES.includes(t));
    if(valid.length<2){alert('Select at least 2 teams');return;}
    // Only warn if NO data at all (live or hardcoded)
    const missing=valid.filter(t=>!getTeamData(t));
    if(missing.length>0){
      const ok=window.confirm(`No roster data available for: ${missing.join(', ')}.\n\nProceed with placeholder data?`);
      if(!ok) return;
    }
    setLoading(true);
    setTimeout(()=>{
      try {
      const res={teams:{},rosterData:{},weights,designation,offense:{winner:null,scores:{}},defense:{winner:null,scores:{}},overall:{winner:null,scores:{}}};
      valid.forEach(team=>{
        const td=getTeamData(team)||buildPlaceholderRoster(team);
        res.rosterData[team]=td;
        const oS=calculateUnitScore(td,'offense',weights,depth,designation);
        const dS=calculateUnitScore(td,'defense',weights,depth,designation);
        const oT=calculateOverallScore(td,weights,depth,designation);
        const oP={},dP={};
        POSITION_GROUPS.offense.forEach(p=>{const s=calculatePositionScore(td,p,weights,depth[p],designation);if(s!==null)oP[p]=s;});
        POSITION_GROUPS.defense.forEach(p=>{const s=calculatePositionScore(td,p,weights,depth[p],designation);if(s!==null)dP[p]=s;});
        oP['OL_TOTAL']=calculateGroupScore(td,OL_POSITIONS,weights,depth,designation);
        dP['DL_TOTAL']=calculateGroupScore(td,DL_POSITIONS,weights,depth,designation);
        res.teams[team]={offenseScore:oS,defenseScore:dS,overallScore:oT,offensePositions:oP,defensePositions:dP};
        res.offense.scores[team]=oS;
        res.defense.scores[team]=dS;
        res.overall.scores[team]=oT;
      });
      if(Object.keys(res.offense.scores).length)
        res.offense.winner=Object.entries(res.offense.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      if(Object.keys(res.defense.scores).length)
        res.defense.winner=Object.entries(res.defense.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      if(Object.keys(res.overall.scores).length)
        res.overall.winner=Object.entries(res.overall.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      setData(res);
      playSound('compareDone');
      } catch(err) {
        alert('Comparison error: ' + err.message);
        console.error(err);
      }
      setLoading(false);
      setTimeout(()=>document.querySelector('.results-container')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
    },300);
  };

  const rosterMeta = rosterData
    ? { season:rosterData.season, week:rosterData.week, date:rosterData.date, fetchedAt:rosterData.fetchedAt, source:'live' }
    : { season:HARDCODED_ROSTER_DATA.season, week:HARDCODED_ROSTER_DATA.week, date:HARDCODED_ROSTER_DATA.date, fetchedAt:HARDCODED_ROSTER_DATA.fetchedAt, source:'hardcoded' };

  return (
    <div className="container">
      <header>
        {/* Looping video background */}
        <video id="header-video" autoPlay muted loop playsInline preload="auto"
          src="./header_bg.mp4"
          style={{pointerEvents:'none',borderRadius:'12px'}}
        />
        <div id="header-overlay"></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'18px',marginBottom:'8px'}}>
          <FootballIcon size={48} style={{filter:'drop-shadow(0 0 8px rgba(255,150,50,0.6))',transform:'rotate(-20deg)'}}/>
          <h1>PNFL Team Comparison</h1>
          <FootballIcon size={48} style={{filter:'drop-shadow(0 0 8px rgba(255,150,50,0.6))',transform:'rotate(20deg)'}}/>
        </div>
        <p className="subtitle">Compare 18 teams using configurable attribute weights and position depth. Offense and Defense ranked separately.</p>
        <div style={{marginTop:'10px',display:'flex',alignItems:'center',justifyContent:'center',gap:'14px',flexWrap:'wrap'}}>
          <span style={{color:'#ffd70099',fontSize:'0.72rem',letterSpacing:'2px',fontFamily:'Orbitron',padding:'3px 10px',border:'1px solid #ffd70044',borderRadius:'4px'}}>v{APP_VERSION}</span>
          <span style={{color:'#a0d2a0cc',fontSize:'0.78rem',letterSpacing:'2px',fontFamily:"'Roboto Condensed',sans-serif",fontStyle:'italic'}}>Created by S.Hamilton</span>
        </div>
      </header>

      <RosterBanner rosterMeta={rosterMeta} onFetch={fetchRosters} fetching={fetching} onClearCache={clearCache} onFetchContracts={fetchContracts} fetchingContracts={fetchingContracts} contractData={contractData}/>

      {/* ── 2×3 Panel Grid ── */}
      {(()=>{
        const PANELS=[
          { id:'weights',     icon:'⚙️',  label:'Attribute\nWeights',   color:'#4a9eff' },
          { id:'depth',       icon:'📊',  label:'Position\nDepth',      color:'#4a9eff' },
          { id:'designation', icon:'🏷️',  label:'Designation\nFilter',  color:'#4a9eff' },
          { id:'roster-pr',   icon:'🏆',  label:'Roster Power\nRankings',color:'#7ec8ff' },
          { id:'league-pr',   icon:'📡',  label:'League Power\nRankings',color:'#7ec8ff' },
          { id:'trade',       icon:'🔄',  label:'Trade\nAnalyzer',      color:'#ff9944' },
          { id:'scouting',    icon:'🔬',  label:'AI Scouting\nReport',  color:'#c090ff' },
        ];
        return (
          <div style={{marginBottom:'4px'}}>
            {/* Grid of 6 buttons — 2 rows × 3 cols */}
            <div className="panel-grid-6" style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',
              gap:'8px',
              marginBottom:'0',
              padding:'14px 0 0 0',
            }}>
              {PANELS.map(p=>{
                const active = activePanel===p.id;
                return (
                  <button key={p.id}
                    className="haptic-btn"
                    onClick={()=>{playSound('click');haptic('light');setActivePanel(active?null:p.id);}}
                    style={{
                      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                      gap:'5px',padding:'12px 8px',
                      background: active
                        ? (p.color==='#ff9944' ? 'rgba(255,153,68,0.15)' : 'rgba(74,158,255,0.15)')
                        : 'rgba(20,40,20,0.8)',
                      border:`2px solid ${active?p.color:'#2d5a2d'}`,
                      borderRadius:'10px',
                      color: active ? p.color : '#7a9a7a',
                      fontFamily:'Orbitron',
                      fontSize:'0.65rem',
                      fontWeight:'700',
                      letterSpacing:'0.3px',
                      cursor:'pointer',
                      transition:'all 0.2s',
                      boxShadow: active ? `0 0 14px ${p.color}33` : 'none',
                      textAlign:'center',
                      lineHeight:1.3,
                      whiteSpace:'pre-line',
                      minHeight:'64px',
                    }}
                    onMouseEnter={e=>{if(!active){e.currentTarget.style.borderColor=p.color+'99';e.currentTarget.style.color=p.color+'cc';}}}
                    onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor='#2d5a2d';e.currentTarget.style.color='#7a9a7a';}}}
                  >
                    <span style={{fontSize:'1.4rem',lineHeight:1}}>{p.icon}</span>
                    <span>{p.label}</span>
                    {active && <span style={{fontSize:'0.55rem',color:p.color,marginTop:'1px',letterSpacing:'1px'}}>▲ OPEN</span>}
                  </button>
                );
              })}
            </div>

            {/* Active panel content — expands below grid */}
            {activePanel && (
              <div style={{
                marginTop:'8px',
                border:'2px solid #2d5a2d',
                borderTop:`2px solid ${PANELS.find(p=>p.id===activePanel)?.color||'#2d5a2d'}`,
                borderRadius:'0 0 10px 10px',
                background:'rgba(10,22,40,0.95)',
                overflow:'hidden',
              }}>
                {activePanel==='weights'    && <WeightsPanel     weights={weights}         onWeightsChange={setWeights}/>}
                {activePanel==='depth'      && <DepthPanel       depth={depth}             onDepthChange={setDepth}/>}
                {activePanel==='designation'&& <DesignationPanel designation={designation} onDesignationChange={setDesignation}/>}
                {activePanel==='roster-pr'  && <PowerRankings    getTeamData={getTeamData} weights={weights} depth={depth} designation={designation}/>}
                {activePanel==='league-pr'  && <LeaguePowerRankings standingsData={standingsData}/>}
                {activePanel==='trade'      && <TradeAnalyzer    getTeamData={getTeamData} weights={weights} depth={depth} designation={designation}/>}
                {activePanel==='scouting'   && <ScoutingReport    getTeamData={getTeamData} weights={weights} depth={depth} designation={designation} contractData={contractData} standingsData={standingsData} seasonData={seasonData} gameStatsData={gameStatsData} rosterMeta={rosterMeta}/>}
              </div>
            )}
          </div>
        );
      })()}

      <div className="game-panel">
        <div className="controls">
          <TeamSelector selectedTeams={teams} onTeamsChange={setTeams}/>
          <DataHelpers contractData={contractData} onFetchContracts={fetchContracts} fetchingContracts={fetchingContracts} rosterMeta={rosterMeta}/>
          <div style={{display:'flex',flexDirection:'column',gap:'12px',minWidth:'220px'}}>
            <button onClick={()=>{playSound('click');haptic('medium');compare();}} disabled={loading} className="btn-primary haptic-btn" style={{fontSize:'1.2rem',padding:'16px'}}>
              {loading?'⏳ Analyzing...':'▶️ COMPARE TEAMS'}
            </button>
            <button type="button" className="btn-secondary" onClick={()=>{setTeams(['','']);setData(null);}}>↺ Reset All</button>
          </div>
        </div>
      </div>

      {loading&&(
        <div className="game-panel" style={{textAlign:'center',padding:'50px'}}>
          <div style={{marginBottom:'20px',display:'flex',justifyContent:'center'}}>
            <FootballIcon size={56} style={{animation:'spin 1.2s linear infinite',filter:'drop-shadow(0 0 12px rgba(255,150,50,0.7))'}}/>
          </div>
          <style>{`@keyframes spin{from{transform:rotate(-20deg)}50%{transform:rotate(20deg)}to{transform:rotate(-20deg)}}`}</style>
          <div style={{fontSize:'1.8rem',fontFamily:'Orbitron',color:'#ffd700',marginBottom:'10px'}}>Analyzing Rosters...</div>
          <div style={{fontSize:'1.1rem',color:'#a0d2a0'}}>Calculating weighted scores with depth configuration</div>
        </div>
      )}

      {data&&!loading&&(
        <div className="results-container">
          <ComparisonTable teams={teams.filter(t=>t)} data={data} contractData={contractData}/>
          <ChartsPanel teams={teams.filter(t=>t)} data={data}/>
          {data.overall.winner&&(
            <div className="winner-banner full-width">
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'20px',flexWrap:'wrap'}}>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(-15deg)',flexShrink:0}}/>
                <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
                  <div style={{filter:'drop-shadow(0 0 12px rgba(255,215,0,0.6))'}}>
                    <TeamLogo teamName={data.overall.winner} size="large"/>
                  </div>
                  <span>🏆 {data.overall.winner} Wins! 🏆</span>
                </div>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(15deg)',flexShrink:0}}/>
              </div>
              <div style={{fontSize:'1rem',fontWeight:'normal',marginTop:'12px',opacity:0.9,fontFamily:'Roboto Condensed'}}>
                Based on your configured weights & depth • Overall Score: {data.teams[data.overall.winner]?.overallScore?.toFixed(1)}
              </div>
            </div>
          )}
          <div className="card full-width">
            <h3 className="card-title">⚙️ Active Configuration</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
              <div>
                <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>ATTRIBUTE WEIGHTS (QB)</h4>
                <div className="attribute-grid">
                  {Object.entries(weights.QB).map(([attr,w])=>(
                    <div className="attr-card" key={attr}>
                      <div className="attr-name">{attr}</div>
                      <div className="attr-value">{w}x</div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>POSITION DEPTH</h4>
                <div className="attribute-grid">
                  {Object.entries(depth).map(([pos,d])=>(
                    <div className="attr-card" key={pos}>
                      <div className="attr-name">{pos}</div>
                      <div className="attr-value">{d}</div>
                      <div style={{fontSize:'0.7rem',color:'#80a080',marginTop:'2px'}}>players</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{marginTop:'15px',fontSize:'0.85rem',color:'#80a080',fontStyle:'italic'}}>
              {rosterMeta && rosterMeta.source === 'live'
                ? `Using live PNFL roster data — Season ${rosterMeta.season}, Week ${rosterMeta.week}`
                : `Using built-in PNFL 2048 Season 1 Week 1 roster data — click Fetch Rosters to load a newer snapshot`}
              {' · '}<span style={{color:'#4a9eff'}}>Designation: {DESIGNATION_OPTIONS.find(o=>o.value===data.designation)?.label || 'Active + Open'}</span>
            </div>
          </div>
        </div>
      )}

      <div className="footer-note">
        <strong style={{color:'#608060'}}>PNFL Team Comparison Tool v{APP_VERSION}</strong> • Live data from pnfl.biz •
        <a href="https://pnfl.biz/pnflstats/PNFL_roster.htm#A0" target="_blank" rel="noopener noreferrer" style={{marginLeft:'8px'}}>Source Rosters →</a>
        <span style={{marginLeft:'8px',opacity:0.5}}>| Created by S.Hamilton</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
// Hide the pre-render loader once React mounts
document.getElementById('preloader')?.remove();

</script>
</body>
</html>
