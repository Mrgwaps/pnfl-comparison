<script>
// ── Contract XLSX Web Worker (Blob URL) ──
// Parses the contract file off the main thread so UI stays responsive
const _workerCode = `
self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');

const TEAM_SHEET_MAP = {
  'JAX':'Jacksonville','BUF':'Buffalo','NE':'New England','MIA':'Miami',
  'DEN':'Denver','LVR':'Las Vegas','LV':'Las Vegas','CIN':'Cincinnati',
  'LAC':'Los Angeles','PIT':'Pittsburgh','ATL':'Atlanta',
  'WSH':'Washington','WAS':'Washington','NYG':'New York','NY':'New York',
  'PHI':'Philadelphia','SF':'San Francisco','ARI':'Chicago','CHI':'Chicago',
  'MIN':'Minnesota','SEA':'Seattle','GB':'Green Bay',
};
const FULL_NAME_MAP = {
  'Jacksonville':1,'Buffalo':1,'New England':1,'Miami':1,'Denver':1,
  'Las Vegas':1,'Cincinnati':1,'Los Angeles':1,'Pittsburgh':1,'Atlanta':1,
  'Washington':1,'New York':1,'Philadelphia':1,'San Francisco':1,
  'Chicago':1,'Minnesota':1,'Seattle':1,'Green Bay':1,
};
function resolveSheetTeam(name) {
  const t = name.trim();
  if (TEAM_SHEET_MAP[t]) return TEAM_SHEET_MAP[t];
  if (TEAM_SHEET_MAP[t.toUpperCase()]) return TEAM_SHEET_MAP[t.toUpperCase()];
  if (FULL_NAME_MAP[t]) return t;
  return null;
}

self.onmessage = function(e) {
  try {
    const { arrayBuffer, id } = e.data;
    const wb = XLSX.read(arrayBuffer, { type: 'array', raw: false });
    const teamSheets = wb.SheetNames.filter(n => resolveSheetTeam(n) !== null);
    const contracts = {};
    let totalPlayers = 0;

    teamSheets.forEach(sheetName => {
      const ws = wb.Sheets[sheetName];
      if (!ws) return;
      const teamName = resolveSheetTeam(sheetName);
      const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!rawRows || rawRows.length < 3) return;

      let headerRowIdx = -1;
      for (let i = 0; i < Math.min(5, rawRows.length); i++) {
        const row = rawRows[i].map(c => String(c).trim().toLowerCase());
        if (row.includes('pid') && row.includes('first') && row.includes('last')) { headerRowIdx = i; break; }
      }
      if (headerRowIdx === -1) return;

      const headers = rawRows[headerRowIdx].map(c => String(c).trim());
      const col = {};
      const contractYearCols = [];
      const peekRows = rawRows.slice(headerRowIdx + 1, headerRowIdx + 6);

      headers.forEach((h, i) => {
        const lh = h.toLowerCase().replace(/\\s+/g,'');
        const hr = h.trim();
        if      (lh === 'pid')                         col.pid = i;
        else if (lh === 'draftslot' || lh === 'draft') col.draftSlot = i;
        else if (lh === 'first')                        col.first = i;
        else if (lh === 'last')                         col.last = i;
        else if (lh === 'team')                         col.team = i;
        else if (lh === 'pos' || lh === 'position')     col.pos = i;
        else if (lh === 'year' || lh === 'years')       col.year = i;
        else if (/^\\$?20\\d{2}\\$?$/.test(hr) || /^20\\d{2}$/.test(hr)) {
          const yr = parseInt(hr.replace(/[$]/g,''));
          if (isNaN(yr)) return;
          let hasDollarVal = false, hasXMark = false;
          for (const pr of peekRows) {
            if (!pr) continue;
            const v = String(pr[i] || '').trim().replace(/[$,]/g,'');
            if (v === 'X' || v === 'x' || v === '1') { hasXMark = true; break; }
            const n = parseFloat(v);
            if (!isNaN(n) && n > 1000) { hasDollarVal = true; break; }
          }
          if (hasDollarVal) { col['salary_' + yr] = i; contractYearCols.push({ year: yr, idx: i, isSalary: true }); }
          else              { contractYearCols.push({ year: yr, idx: i, isSalary: false }); }
        }
      });

      if (col.first === undefined || col.last === undefined) return;

      for (let ri = headerRowIdx + 1; ri < rawRows.length; ri++) {
        const row = rawRows[ri];
        if (!row || row.length < 3) continue;
        const firstName = String(row[col.first] || '').trim();
        const lastName  = String(row[col.last]  || '').trim();
        if (!firstName && !lastName) continue;
        const fullName = [firstName, lastName].filter(Boolean).join(' ');
        if (fullName.length < 2) continue;

        const pid       = col.pid       !== undefined ? String(row[col.pid]       || '').trim() : '';
        const draftSlot = col.draftSlot !== undefined ? String(row[col.draftSlot] || '').trim() : '';
        const pos       = col.pos       !== undefined ? String(row[col.pos]       || '').trim().toUpperCase() : '';
        const yearsLeft = col.year      !== undefined ? String(row[col.year]      || '').trim() : '';

        const salaries = {};
        Object.keys(col).filter(k => k.startsWith('salary_')).forEach(k => {
          const yr = parseInt(k.replace('salary_',''));
          const raw = String(row[col[k]] || '').trim().replace(/[$,]/g,'');
          const num = parseFloat(raw);
          if (!isNaN(num) && num > 0) salaries[yr] = num;
        });
        const salaryYears = Object.keys(salaries).map(Number).sort((a,b)=>a-b);
        const currentSalaryYear = salaryYears[0] || null;
        const nextSalaryYear    = salaryYears[1] || null;
        const currentSalary     = currentSalaryYear ? salaries[currentSalaryYear] : null;
        const nextSalary        = nextSalaryYear    ? salaries[nextSalaryYear]    : null;

        const ds = draftSlot.toUpperCase().trim();
        let draftRound = '', draftPick = '', draftTeam = '';
        const m2 = ds.match(/^(\\d+)-([A-Z]+)-(\\d+)-(\\d+)$/);
        const m1 = ds.match(/^([A-Z]+)\\s+(\\d+)-(\\d+)$/);
        const m3 = ds.match(/^([A-Z]+)\\s*(\\d+)-(\\d+)$/);
        if (m2) { draftTeam=m2[2]; draftRound=m2[3]; draftPick=m2[4]; }
        else if (m1) { draftTeam=m1[1]; draftRound=m1[2]; draftPick=m1[3]; }
        else if (m3) { draftTeam=m3[1]; draftRound=m3[2]; draftPick=m3[3]; }
        else if (ds==='X'||ds==='') draftRound='UDFA';
        else draftRound=ds;

        const contractedYears = contractYearCols
          .filter(({idx,isSalary}) => { if (isSalary) return false; const v=String(row[idx]||'').trim().toUpperCase(); return v==='X'||v==='1'; })
          .map(({year}) => year);
        const contractStart  = contractedYears.length ? Math.min(...contractedYears) : null;
        const contractEnd    = contractedYears.length ? Math.max(...contractedYears) : null;
        const contractLength = contractedYears.length;

        const contract = {
          playerName:fullName, firstName, lastName, team:teamName, position:pos,
          playerId:pid, draftSlot, draftRound, draftPick, draftTeam,
          yearsLeft: yearsLeft !== '' ? yearsLeft : String(contractLength),
          contractLength, contractStart, contractEnd, contractYearList:contractedYears,
          salaries, currentSalaryYear, nextSalaryYear, currentSalary, nextSalary, sheetName,
        };

        const key = fullName.toLowerCase().replace(/[^a-z0-9]/g,'');
        if (key.length > 1) { contracts[key] = contract; totalPlayers++; }
        const lnKey = '_last_' + lastName.toLowerCase().replace(/[^a-z]/g,'');
        if (!contracts[lnKey]) contracts[lnKey] = [];
        contracts[lnKey].push(contract);
        if (pid && pid !== 'X') contracts['_pid_' + pid] = contract;
      }
    });

    self.postMessage({ id, ok: true, contracts, teamCount: teamSheets.length, playerCount: totalPlayers });
  } catch(err) {
    self.postMessage({ id: e.data.id, ok: false, error: err.message });
  }
};
`;
let _contractWorker = null;
let _workerCallbacks = {};
let _workerCallId = 0;

function getContractWorker() {
  if (_contractWorker) return _contractWorker;
  try {
    const blob = new Blob([_workerCode], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    _contractWorker = new Worker(url);
    _contractWorker.onmessage = (e) => {
      const { id, ok, contracts, teamCount, playerCount, error } = e.data;
      const cb = _workerCallbacks[id];
      if (cb) { delete _workerCallbacks[id]; cb(ok, { contracts, teamCount, playerCount, error }); }
    };
    _contractWorker.onerror = (e) => {
      console.error('[ContractWorker] Error:', e.message);
      // Terminate and reset so next call falls back to main-thread parsing
      _contractWorker.terminate();
      _contractWorker = null;
    };
    return _contractWorker;
  } catch(e) {
    console.warn('[ContractWorker] Could not create worker:', e.message);
    return null;
  }
}

// Async wrapper: parse off main thread if possible, fall back to parseContractXLSX() sync
function parseContractAsync(arrayBuffer) {
  return new Promise((resolve, reject) => {
    const worker = getContractWorker();
    if (!worker) {
      // Fall back to main thread
      try { resolve(parseContractXLSX(arrayBuffer)); } catch(e) { reject(e); }
      return;
    }
    const id = ++_workerCallId;
    _workerCallbacks[id] = (ok, data) => {
      if (ok) {
        resolve({
          contracts:   data.contracts,
          teamCount:   data.teamCount,
          playerCount: data.playerCount,
          fetchedAt:   new Date().toISOString(),
          sheets:      [],
        });
      } else {
        // Worker failed — fall back to main thread
        console.warn('[ContractWorker] Falling back to main thread:', data.error);
        try { resolve(parseContractXLSX(arrayBuffer)); } catch(e) { reject(e); }
      }
    };
    worker.postMessage({ id, arrayBuffer }, [arrayBuffer]);
  });
}
</script>

<script>
// ── PNFL AI Analyst v5.3 ──
// All state on window.pnflAI — never in module-level vars.
// Worker v3 auto-discovers a working free HF model via X-Working-Model header.

window.pnflAI = {
  _ready:      false,
  _loading:    false,
  _error:      null,
  _apiKey:     '',
  _proxyUrl:   '',
  _model:      'Qwen/Qwen2.5-7B-Instruct',  // worker will override if unavailable
  _modelLabel: '',

  isReady:    function() { return window.pnflAI._ready; },
  isLoading:  function() { return window.pnflAI._loading; },
  getError:   function() { return window.pnflAI._error; },
  getModel:   function() { return window.pnflAI._modelLabel || window.pnflAI._model; },

  setProxyUrl: function(url) {
    const clean = (url || '').trim().replace(/\/+$/, '');
    window.pnflAI._proxyUrl = clean;
    if (clean) sessionStorage.setItem('pnfl_proxy_url', clean);
  },

  _diagnose: function(status, body) {
    const b = (body || '').toLowerCase();
    if (status === 410 || b.includes('no longer supported'))
      return 'WORKER_OUTDATED: Redeploy your Cloudflare Worker with the latest pnfl_ai_proxy_worker.js (v3).';
    if (status === 401 || (b.includes('invalid') && b.includes('token')))
      return 'INVALID_TOKEN: HF token invalid. Copy the full hf_... token from huggingface.co/settings/tokens.';
    if (status === 403 || b.includes('authorization error') || b.includes('inference api'))
      return 'NO_PERMISSION: Token needs Inference API scope. huggingface.co/settings/tokens → Edit → "Make calls to the serverless Inference API".';
    if (status === 404)
      return 'NOT_FOUND_404: Model not available on free tier. The worker v3 will auto-try fallback models — redeploy pnfl_ai_proxy_worker.js v3.';
    if (status === 503) return 'MODEL_LOADING';
    if (status === 429) return 'RATE_LIMIT';
    if (status === 502) return 'ALL_FAILED: All free HF models unavailable. Try again in a few minutes.';
    if (status === 0 || b.includes('failed to fetch'))
      return 'NETWORK: Cannot reach proxy. Check your Cloudflare Worker URL is correct and deployed.';
    return 'HTTP_' + status + ': ' + (body || '').slice(0, 200);
  },

  load: async function(apiKey, proxyUrl) {
    const ai = window.pnflAI;
    if (ai._loading) return;
    ai._loading = true;
    ai._error   = null;
    ai._ready   = false;

    const key   = (apiKey   || '').trim();
    const proxy = (proxyUrl || sessionStorage.getItem('pnfl_proxy_url') || '').trim().replace(/\/+$/, '');

    if (!key) {
      ai._error = 'No API key provided.';
      ai._loading = false;
      throw new Error(ai._error);
    }
    if (!key.startsWith('hf_') || key.length < 20) {
      ai._error = 'HuggingFace tokens start with hf_ and are at least 20 characters.';
      ai._loading = false;
      throw new Error(ai._error);
    }

    ai._proxyUrl = proxy;
    if (proxy) sessionStorage.setItem('pnfl_proxy_url', proxy);

    console.log('[PNFL AI] load() key:', key.slice(0,8)+'...', '| proxy:', proxy.slice(0,50) || '(none)');

    if (!proxy) {
      // Accept optimistically — ask() will surface the no-proxy error
      ai._apiKey  = key;
      ai._ready   = true;
      sessionStorage.setItem('pnfl_ai_key', key);
      ai._loading = false;
      return;
    }

    // Validate: small test call — worker v3 will try multiple models automatically
    let testStatus = 0, testBody = '', workingModel = '';
    try {
      const res = await fetch(proxy, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          model:    ai._model,
          messages: [{ role: 'user', content: 'Reply with one word: ready' }],
          max_tokens: 5,
          stream:   false,
        }),
        signal: AbortSignal.timeout(20000),
      });
      testStatus    = res.status;
      testBody      = await res.text();
      workingModel  = res.headers.get('X-Working-Model') || '';
      console.log('[PNFL AI] test →', testStatus, workingModel || '', testBody.slice(0,100));
    } catch(e) {
      testStatus = 0;
      testBody   = e.message || 'Network error';
      console.warn('[PNFL AI] test threw:', e.message);
    }

    if (testStatus === 200 || testStatus === 503) {
      ai._apiKey  = key;
      ai._ready   = true;
      if (workingModel) {
        ai._model      = workingModel;
        ai._modelLabel = workingModel.split('/').pop();
      }
      sessionStorage.setItem('pnfl_ai_key',   key);
      sessionStorage.setItem('pnfl_ai_model', ai._model);
      ai._loading = false;
      return;
    }

    ai._error   = ai._diagnose(testStatus, testBody);
    ai._loading = false;
    throw new Error(ai._error);
  },

  ask: async function(systemPrompt, userMessage, maxTokens) {
    const ai    = window.pnflAI;
    const proxy = ai._proxyUrl || sessionStorage.getItem('pnfl_proxy_url') || '';

    if (!ai._apiKey) throw new Error('Not connected — open the AI slider and enter your HF token.');
    if (!proxy) throw new Error('NO_PROXY: No Cloudflare Worker URL saved. Open the AI connect modal and enter your workers.dev URL.');

    let status = 0, txt = '', workingModel = '';
    try {
      const res = await fetch(proxy, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + ai._apiKey, 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          model:       ai._model,
          messages:    [
            { role: 'system', content: systemPrompt },
            { role: 'user',   content: userMessage  },
          ],
          max_tokens:  maxTokens || 300,
          temperature: 0.4,
          stream:      false,
        }),
        signal: AbortSignal.timeout(30000),
      });
      status       = res.status;
      txt          = await res.text();
      workingModel = res.headers.get('X-Working-Model') || '';
      if (workingModel && workingModel !== ai._model) {
        ai._model      = workingModel;
        ai._modelLabel = workingModel.split('/').pop();
        sessionStorage.setItem('pnfl_ai_model', workingModel);
      }
      console.log('[PNFL AI] ask →', status, workingModel || ai._model, txt.slice(0,80));
    } catch(e) {
      throw new Error(ai._diagnose(0, e.message));
    }

    if (status !== 200) {
      const msg = ai._diagnose(status, txt);
      if (msg === 'MODEL_LOADING') return '⏳ Model is loading on HF servers — wait 20 seconds and try again.';
      if (msg === 'RATE_LIMIT')    return '⏳ Rate limit hit — wait a moment and try again.';
      throw new Error(msg);
    }

    try {
      const d = JSON.parse(txt);
      if (d.choices?.[0]?.message?.content) return d.choices[0].message.content.trim();
      if (Array.isArray(d) && d[0]?.generated_text) return d[0].generated_text.trim();
      if (d.generated_text) return String(d.generated_text).trim();
      return JSON.stringify(d).slice(0, 400);
    } catch { return txt.slice(0, 400); }
  },

  restore: function() {
    try {
      const key   = sessionStorage.getItem('pnfl_ai_key');
      const proxy = sessionStorage.getItem('pnfl_proxy_url') || '';
      const model = sessionStorage.getItem('pnfl_ai_model') || '';
      if (key && key.startsWith('hf_') && key.length >= 20) {
        window.pnflAI._apiKey   = key;
        window.pnflAI._proxyUrl = proxy;
        window.pnflAI._ready    = true;
        if (model) {
          window.pnflAI._model      = model;
          window.pnflAI._modelLabel = model.split('/').pop();
        }
        console.log('[PNFL AI] restored | proxy:', proxy.slice(0,40) || '(none)', '| model:', window.pnflAI._model);
        return true;
      }
    } catch(e) { console.warn('[PNFL AI] restore err:', e); }
    return false;
  },
};
window.pnflAI.restore();
</script>

<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

// ── Haptic feedback helper ──
// haptic() defined in sound engine script above

// ── Persistent storage (localStorage with error handling) ──
const storage = {
  get: (key) => {
    try {
      const v = localStorage.getItem('pnfl_' + key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  set: (key, val) => {
    try {
      const str = JSON.stringify(val);
      localStorage.setItem('pnfl_' + key, str);
      return true;
    } catch(e) {
      // localStorage quota exceeded — try removing old items and retry
      try {
        localStorage.removeItem('pnfl_' + key);
        localStorage.setItem('pnfl_' + key, JSON.stringify(val));
        return true;
      } catch(e2) {
        console.warn('storage.set failed for', key, e2.message);
        return false;
      }
    }
  },
  clear: () => {
    try {
      Object.keys(localStorage).filter(k => k.startsWith('pnfl_')).forEach(k => localStorage.removeItem(k));
    } catch {}
  }
};

// In-memory session cache — always populated when data is set, survives the session
const sessionCache = {};
const storageWithSession = {
  get: (key) => sessionCache[key] !== undefined ? sessionCache[key] : storage.get(key),
  set: (key, val) => { sessionCache[key] = val; storage.set(key, val); },
  clear: () => { Object.keys(sessionCache).forEach(k => delete sessionCache[k]); storage.clear(); }
};

// ── Constants ──
const DEFAULT_WEIGHTS = {
  QB: { SP:1, AC:1, AG:1, ST:2, HA:1, EN:2, IN:3, DI:2 },
  HB: { SP:3, AC:2, AG:2, ST:2, HA:2, EN:2, IN:1, DI:1 },
  FB: { SP:1, AC:1, AG:1, ST:3, HA:2, EN:3, IN:2, DI:2 },

// Calculate how "maxed out" a player attribute is vs position maxes
// Returns a 0-100 pct score for each attribute
function attrPctOfMax(attrs, position) {
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  return ATTRIBUTES.map((_, i) => {
    // Use potential max as the ceiling (100%), actual max as the baseline reference
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    const val = attrs[i];
    return Math.min(100, Math.max(0, Math.round(((val - floor) / Math.max(1, ceiling - floor)) * 100)));
  });
}

// ── ROSTER PARSER ──
// Parse the raw text fetched from pnfl.biz/pnflstats/PNFL_roster.htm
function parsePNFLRosterText(rawText) {
  const result = { season: '', date: '', week: '', fetchedAt: new Date().toISOString(), teams: {} };

  // Detect if this is HTML or plain text
  const isHTML = rawText.includes('<table') || rawText.includes('<tr') || rawText.includes('<td');

  if (isHTML) {
    return parsePNFLRosterHTML(rawText, result);
  } else {
    return parsePNFLRosterPlainText(rawText, result);
  }
}

function parsePNFLRosterHTML(html, result) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract header info
  const bodyText = doc.body ? doc.body.innerText || doc.body.textContent : html;
  const seasonMatch = bodyText.match(/(\d{4})\s*season/i);
  if (seasonMatch) result.season = seasonMatch[1];
  const weekMatch = bodyText.match(/Week\s*(\d+)/i);
  if (weekMatch) result.week = weekMatch[1];
  const dateMatch = bodyText.match(/([A-Za-z]+ \d+,\s*\d{4})/);
  if (dateMatch) result.date = dateMatch[1];

  const TEAM_NAME_MAP = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S']);

  let currentTeam = null;

  // Walk ALL elements to find team headers and table rows in document order
  const allElements = doc.body ? Array.from(doc.body.querySelectorAll('*')) : [];

  // Strategy: collect all <tr> rows in document order with their team context
  // Team headers appear as headings/text before each roster table

  // First pass: build a flat list of [teamName, rows[]] blocks
  const blocks = [];
  let pendingTeam = null;

  // Scan headings and text nodes for team names
  const headingEls = doc.body ? doc.body.querySelectorAll('h1,h2,h3,h4,h5,h6,p,div,td,th,caption') : [];
  headingEls.forEach(el => {
    const txt = el.textContent.trim();
    const m = txt.match(/Team Roster[:\s]+(.+?)(?:\s*$)/im);
    if (m) {
      const tName = m[1].trim().replace(/\s+/g,' ');
      const mapped = TEAM_NAME_MAP[tName];
      if (mapped !== undefined) pendingTeam = mapped;
      else {
        // Check if any known team name is in the text
        for (const [k,v] of Object.entries(TEAM_NAME_MAP)) {
          if (k && txt.includes(k)) { pendingTeam = v; break; }
        }
      }
    }
  });

  // Simpler approach: just scan all tables, detect team from preceding text in DOM
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    // Walk backward through siblings/ancestors to find team name
    let teamFound = null;
    let node = table;
    for (let attempts = 0; attempts < 20 && !teamFound; attempts++) {
      node = node.previousElementSibling || node.parentElement;
      if (!node) break;
      const txt = (node.textContent || '').trim();
      // Direct "Team Roster: Miami" pattern
      const m = txt.match(/Team Roster[:\s]+([A-Za-z ]+?)(?:\s{2,}|\n|$)/im);
      if (m) {
        const tName = m[1].trim();
        teamFound = TEAM_NAME_MAP[tName] !== undefined ? TEAM_NAME_MAP[tName] : null;
        if (teamFound === undefined) teamFound = null;
        break;
      }
      // Any known team name in short text
      if (txt.length < 60) {
        for (const [k,v] of Object.entries(TEAM_NAME_MAP)) {
          if (k && v && txt.includes(k)) { teamFound = v; break; }
        }
      }
    }
    if (teamFound === null) return; // null means Free Agent or unknown
    if (!teamFound) return;
    if (!result.teams[teamFound]) result.teams[teamFound] = {};
    currentTeam = teamFound;

    // Get all rows as arrays of cell text
    const allRows = Array.from(table.querySelectorAll('tr')).map(tr =>
      Array.from(tr.querySelectorAll('td,th')).map(c => c.textContent.trim())
    );

    // Process rows in pairs: player row + potential row
    let i = 0;
    while (i < allRows.length) {
      const row = allRows[i];
      if (!row || row.length < 6) { i++; continue; }

      const status = (row[0] || '').toUpperCase();
      if (!['A','O','I','IR'].includes(status)) { i++; continue; }

      const posRaw = (row[1] || '').replace(/\d+$/,'').toUpperCase();
      if (!VALID_POS.has(posRaw)) { i++; continue; }

      // Extract 8 attribute numbers from current row (actual stats)
      const rowNums = row.filter(t => /^\d{2,3}$/.test(t)).map(Number)
        .filter(n => n >= 50 && n <= 99);
      if (rowNums.length < 8) { i++; continue; }
      const attrs = rowNums.slice(-8);

      const num = parseInt(row[2]) || 0;
      const name = (row[3] || '').replace(/\s+/g,' ').trim();
      if (!name) { i++; continue; }

      // Look ahead: next row is the potential/projected row if it has no status prefix
      let pattrs = null;
      const nextRow = allRows[i + 1];
      if (nextRow) {
        const nextStatus = (nextRow[0] || '').toUpperCase();
        if (!['A','O','I','IR'].includes(nextStatus)) {
          // This is the projected row — extract 8 numbers
          const nextNums = nextRow
            .join(' ')
            .match(/\b\d{2,3}\b/g);
          if (nextNums) {
            const valid = nextNums.map(Number).filter(n => n >= 50 && n <= 99);
            if (valid.length >= 8) {
              pattrs = valid.slice(0, 8);
              i++; // consume the potential row
            }
          }
        }
      }

      if (!result.teams[currentTeam][posRaw]) result.teams[currentTeam][posRaw] = [];
      result.teams[currentTeam][posRaw].push({ name, num, status, attrs, pattrs });
      i++;
    }
  });

  // If table-based parsing got 0 teams, fall back to plain text
  if (Object.keys(result.teams).length === 0) {
    return parsePNFLRosterPlainText(doc.body ? doc.body.innerText || doc.body.textContent : '', result);
  }
  return result;
}

function parsePNFLRosterPlainText(rawText, result) {
  const lines = rawText.split('\n');

  // Extract header info
  for (let i = 0; i < Math.min(20, lines.length); i++) {
    const line = lines[i].trim();
    const seasonMatch = line.match(/(\d{4})\s*season/i);
    if (seasonMatch) result.season = seasonMatch[1];
    const weekMatch = line.match(/Week\s*(\d+)/i);
    if (weekMatch) result.week = weekMatch[1];
    const dateMatch = line.match(/([A-Za-z]+ \d+,\s*\d{4})/);
    if (dateMatch) result.date = dateMatch[1];
  }

  const teamNameMap = {
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New England':'New England',
    'Miami':'Miami','Denver':'Denver','Las Vegas':'Las Vegas',
    'Cincinnati':'Cincinnati','Los Angeles':'Los Angeles','Pittsburgh':'Pittsburgh',
    'Atlanta':'Atlanta','New York':'New York','Philadelphia':'Philadelphia',
    'Washington':'Washington','Green Bay':'Green Bay','Chicago':'Chicago',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Free Agent':null
  };
  const VALID_POS = new Set(['QB','HB','FB','TE','WR','C','G','T','K','P','DE','DT','LB','CB','S','FB']);

  let currentTeam = null;
  let lastPlayer = null;
  let captureNext = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    const teamMatch = line.match(/Team Roster:\s*(.+)/i);
    if (teamMatch) {
      const tName = teamMatch[1].trim();
      const mapped = teamNameMap[tName];
      currentTeam = (mapped !== undefined) ? mapped : tName;
      if (currentTeam && !result.teams[currentTeam]) result.teams[currentTeam] = {};
      lastPlayer = null; captureNext = false;
      continue;
    }
    if (!currentTeam) continue;

    const playerMatch = line.match(/^\s*(A|O|I|IR)\s+(QB\d*|HB\d*|FB\d*|TE\d*|WR\d*|C\d*|G\d*|T\d*|K\d*|P\d*|DE\d*|DT\d*|LB\d*|CB\d*|S\d*)\s+(\d+)\s+(.+?)\s{2,}\S.*?\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s*$/);
    if (playerMatch) {
      const status = playerMatch[1];
      const posRaw = playerMatch[2];
      const pos = posRaw.replace(/\d+$/, '');
      if (!VALID_POS.has(pos)) { captureNext = false; continue; }
      const num = parseInt(playerMatch[3]);
      const name = playerMatch[4].trim().replace(/\s+/g,' ');
      const attrs = [playerMatch[5],playerMatch[6],playerMatch[7],playerMatch[8],
                     playerMatch[9],playerMatch[10],playerMatch[11],playerMatch[12]].map(Number);
      if (!result.teams[currentTeam][pos]) result.teams[currentTeam][pos] = [];
      const playerObj = { name, num, status, attrs, pattrs: null };
      result.teams[currentTeam][pos].push(playerObj);
      lastPlayer = playerObj;
      captureNext = true;
      continue;
    }

    if (captureNext) {
      captureNext = false;
      // Strip HTML tags, find 8 2-3 digit numbers
      const stripped = line.replace(/<[^>]*>/g,' ');
      const nums = (stripped.match(/\b\d{2,3}\b/g) || []).map(Number).filter(n => n >= 50 && n <= 99);
      if (nums.length >= 8 && lastPlayer) {
        lastPlayer.pattrs = nums.slice(0, 8);
      }
      lastPlayer = null;
      continue;
    }
  }
  return result;
}

function parsePNFLStandingsText(rawText) {

  // Full name aliases for matching
  const NAME_MAP = {
    'Miami':'Miami','Pittsburgh':'Pittsburgh','New England':'New England',
    'Atlanta':'Atlanta','Washington':'Washington','Cincinnati':'Cincinnati',
    'Chicago':'Chicago','Green Bay':'Green Bay','Denver':'Denver',
    'Seattle':'Seattle','Minnesota':'Minnesota','San Francisco':'San Francisco',
    'Jacksonville':'Jacksonville','Buffalo':'Buffalo','New York':'New York',
    'Las Vegas':'Las Vegas','Los Angeles':'Los Angeles','Philadelphia':'Philadelphia',
  };

  // Extract header
  for (let i = 0; i < Math.min(25, lines.length); i++) {
    const line = lines[i].trim();
    const seasonMatch = line.match(/(\d{4})\s*season/i);
    if (seasonMatch) result.season = seasonMatch[1];
    const weekMatch = line.match(/Week\s*(\d+)/i);
    if (weekMatch) result.week = weekMatch[1];
    const dateMatch = line.match(/([A-Za-z]+ \d+,\s*\d{4})/);
    if (dateMatch) result.date = dateMatch[1];
  }

  // Parse ranking rows
  // Format:  " 1 Miami          3   3   9 BUF DEN NYG"
  // Or tied: "   Pittsburgh     3   3   9 JAX LVR CIN"  (no rank number = same rank as prev)
  let currentRank = 0;
  for (const line of lines) {
    // Try ranked line: leading spaces then optional number then team name then W OppW Pts then opponents
    const ranked = line.match(/^\s*(\d+)\s+([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s*((?:[A-Z]{2,3}\s*)*)/);
    const tied   = line.match(/^\s{3,}([A-Za-z ]+?)\s{2,}(\d+)\s+(\d+)\s+(\d+)\s*((?:[A-Z]{2,3}\s*)*)/);

    let rank, teamRaw, wins, oppWins, pts, oppsRaw;
    if (ranked) {
      rank = parseInt(ranked[1]);
      currentRank = rank;
      teamRaw = ranked[2].trim();
      wins = parseInt(ranked[3]);
      oppWins = parseInt(ranked[4]);
      pts = parseInt(ranked[5]);
      oppsRaw = ranked[6].trim();
    } else if (tied && currentRank > 0) {
      rank = currentRank;
      teamRaw = tied[1].trim();
      wins = parseInt(tied[2]);
      oppWins = parseInt(tied[3]);
      pts = parseInt(tied[4]);
      oppsRaw = tied[5].trim();
    } else {
      continue;
    }

    // Normalize team name
    const team = NAME_MAP[teamRaw] || teamRaw;
    if (!team || !TEAM_NAMES.includes(team)) continue;

    // Parse opponents defeated abbreviations
    const oppCodes = oppsRaw ? oppsRaw.split(/\s+/).filter(Boolean) : [];
    const oppsDefeated = oppCodes.map(c => SHORT_TO_TEAM[c] || c).filter(Boolean);

    // Losses = games played - wins (games played = wins for now; if we had ties/losses we'd need more)
    const gamesPlayed = wins; // only wins tracked in standings format shown

    result.rankings.push({ rank, team, wins, losses: 0, oppWins, pts, oppsDefeated, gamesPlayed });
  }

  // Deduplicate (same team appearing twice due to parsing)
  const seen = new Set();
  result.rankings = result.rankings.filter(r => {
    if (seen.has(r.team)) return false;
    seen.add(r.team);
    return true;
  });

  return result;
}

// ── SCORING ──
// Player score: weighted average of attributes, with each attribute normalized
// relative to the position's potential max (so a WR with 84 SP is near-maxed).
function calculatePlayerScore(attrs, position, weights) {
  const pw = weights[position] || weights.LB;
  const pMax = POS_POTENTIAL_MAX[position] || POS_POTENTIAL_MAX.LB;
  const aMax = POS_ACTUAL_MAX[position] || POS_ACTUAL_MAX.LB;
  let ws = 0, wt = 0;
  ATTRIBUTES.forEach((attr, i) => {
    const w = pw[attr] || 1;
    const ceiling = pMax[i];
    const floor = Math.max(1, aMax[i]);
    // Normalize: raw score scaled so potential max = 100
    const normalized = Math.min(100, (attrs[i] / Math.max(1, ceiling)) * 100);
    ws += normalized * w;
    wt += w;
  });
  return ws / wt;
}
function calculateSumScore(attrs) { return attrs.reduce((s,v) => s+v, 0); }

function calculatePositionScore(teamData, position, weights, depthCount, designation) {
  // Filter players by designation setting
  // 'AO' = Active + Open (default), 'A' = Active only, 'ALL' = all slots
  const desig = designation || 'AO';
  const allPlayers = (teamData[position] || []);
  const players = desig === 'ALL' ? allPlayers
    : desig === 'A'  ? allPlayers.filter(p => p.status === 'A')
    : allPlayers.filter(p => p.status === 'A' || p.status === 'O'); // AO default
  if (!players.length) return null;
  const scored = players
    .map(p => ({ ...p, ws: calculatePlayerScore(p.attrs, position, weights), ss: calculateSumScore(p.attrs) }))
    .sort((a,b) => b.ws - a.ws);
  const maxD = depthCount || DEFAULT_DEPTH[position] || 3;
  const top = scored.slice(0, Math.min(maxD, scored.length));
  if (!top.length) return null;
  const aw = top.reduce((s,p) => s+p.ws, 0) / top.length;
  const as = top.reduce((s,p) => s+p.ss, 0) / top.length;
  return (aw * 0.7) + (as * 0.03);
}

function calculateGroupScore(teamData, positions, weights, depth, designation) {
  let total = 0, count = 0;
  positions.forEach(pos => {
    const s = calculatePositionScore(teamData, pos, weights, depth[pos], designation);
    if (s !== null) { total += s; count++; }
  });
  return count > 0 ? total / count : 0;
}

function calculateUnitScore(teamData, unit, weights, depth, designation) {
  return calculateGroupScore(teamData, POSITION_GROUPS[unit], weights, depth, designation);
}

function calculateOverallScore(teamData, weights, depth, designation) {
  const o = calculateUnitScore(teamData, 'offense', weights, depth, designation);
  const d = calculateUnitScore(teamData, 'defense', weights, depth, designation);
  return (o * 0.55) + (d * 0.45);
}

// Compute full result object for one team
function computeTeamResult(team, teamData, weights, depth, designation) {
  const oS=calculateUnitScore(teamData,'offense',weights,depth,designation);
  const dS=calculateUnitScore(teamData,'defense',weights,depth,designation);
  const oT=calculateOverallScore(teamData,weights,depth,designation);
  const oP={}, dP={};
  POSITION_GROUPS.offense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)oP[p]=s; });
  POSITION_GROUPS.defense.forEach(p=>{ const s=calculatePositionScore(teamData,p,weights,depth[p],designation); if(s!==null)dP[p]=s; });
  oP['OL_TOTAL']=calculateGroupScore(teamData,OL_POSITIONS,weights,depth,designation);
  dP['DL_TOTAL']=calculateGroupScore(teamData,DL_POSITIONS,weights,depth,designation);
  return { offenseScore:oS, defenseScore:dS, overallScore:oT, offensePositions:oP, defensePositions:dP };
}

// ── Contract Data Parser (SheetJS) ──
// Parses PNFL Contracts.xlsx and returns a map keyed by player name
// ── Season Stats Parser ──
function parseSeasonStats(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const text = doc.body ? doc.body.innerText || doc.body.textContent : html;

  const result = { fetchedAt: new Date().toISOString(), teams: {} };

  // Extract season/week
  const wm = text.match(/Week\s*(\d+)/i);
  if (wm) result.week = wm[1];
  const sm = text.match(/(\d{4})\s*season/i);
  if (sm) result.season = sm[1];

  const TEAM_NAMES_LIST = [
    'Jacksonville','Buffalo','New England','Miami','Denver','Las Vegas',
    'Cincinnati','Los Angeles','Pittsburgh','Atlanta','New York','Philadelphia',
    'Washington','Green Bay','Chicago','Seattle','Minnesota','San Francisco'
  ];

  // Parse tables for team stats
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    const rows = Array.from(table.querySelectorAll('tr'));
    rows.forEach(row => {
      const cells = Array.from(row.querySelectorAll('td,th')).map(c => c.textContent.trim());
      if (cells.length < 3) return;
      // Look for team name in first cell
      const teamName = TEAM_NAMES_LIST.find(t => cells[0].includes(t));
      if (!teamName) return;
      if (!result.teams[teamName]) result.teams[teamName] = {};
      // Store raw stats as key-value pairs from header + row
      cells.forEach((v, i) => {
        if (i === 0) return;
        const num = parseFloat(v.replace(/,/g,''));
        if (!isNaN(num)) result.teams[teamName]['col_' + i] = num;
      });
    });
  });

  // Also scan plain text for common stat patterns
  // "Miami  3-0  pts: 142  opp: 98"
  TEAM_NAMES_LIST.forEach(team => {
    const re = new RegExp(team + '[\\s\\S]{0,200}?(\\d+)-(\\d+)', 'i');
    const m = text.match(re);
    if (m) {
      if (!result.teams[team]) result.teams[team] = {};
      result.teams[team].wins   = parseInt(m[1]);
      result.teams[team].losses = parseInt(m[2]);
    }
  });

  return result;
}

// ── Game Stats Parser ──
function parseGameStats(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const text = doc.body ? doc.body.innerText || doc.body.textContent : html;
  const result = { fetchedAt: new Date().toISOString(), games: [], week: null, season: null };

  const wm = text.match(/Week\s*(\d+)/i);
  if (wm) result.week = parseInt(wm[1]);
  const sm = text.match(/(\d{4})\s*season/i);
  if (sm) result.season = sm[1];

  // Parse score lines: "TeamA XX - XX TeamB"
  const scorePattern = /([A-Za-z ]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z ]+)/g;
  let m;
  while ((m = scorePattern.exec(text)) !== null) {
    const team1 = m[1].trim(), score1 = parseInt(m[2]);
    const score2 = parseInt(m[3]), team2 = m[4].trim();
    if (score1 >= 0 && score2 >= 0 && team1.length > 2 && team2.length > 2) {
      result.games.push({ team1, score1, team2, score2, winner: score1 > score2 ? team1 : team2 });
    }
  }

  // Also extract from tables
  const tables = doc.querySelectorAll('table');
  tables.forEach(table => {
    const rows = Array.from(table.querySelectorAll('tr'));
    let headers = [];
    rows.forEach(row => {
      const cells = Array.from(row.querySelectorAll('td,th')).map(c => c.textContent.trim());
      if (cells.some(c => c.toLowerCase().includes('team') || c.toLowerCase().includes('score'))) {
        headers = cells;
      } else if (headers.length && cells.length >= 2) {
        const entry = {};
        cells.forEach((v, i) => { if (headers[i]) entry[headers[i].toLowerCase()] = v; });
        if (entry.team || entry.home || entry.away) result.games.push(entry);
      }
    });
  });

  return result;
}

    'Seattle':'Seattle','Green Bay':'Green Bay',
  };

  const resolveSheetTeam = (name) => {
    const trimmed = name.trim();
    // Exact abbrev match
    if (TEAM_SHEET_MAP[trimmed]) return TEAM_SHEET_MAP[trimmed];
    // Uppercase match
    if (TEAM_SHEET_MAP[trimmed.toUpperCase()]) return TEAM_SHEET_MAP[trimmed.toUpperCase()];
    // Full name match
    if (FULL_NAME_MAP[trimmed]) return FULL_NAME_MAP[trimmed];
    return null;
  };

  // Log all sheet names for debugging (visible in browser console)
  console.log('[PNFL Contracts] All sheets:', wb.SheetNames.join(', '));

  // Filter to only the 18 known PNFL teams
  const teamSheets = wb.SheetNames.filter(name => resolveSheetTeam(name) !== null);
  console.log('[PNFL Contracts] Team sheets found:', teamSheets.join(', '));

  teamSheets.forEach(sheetName => {
    const ws = wb.Sheets[sheetName];
    if (!ws) return;
    const teamName = resolveSheetTeam(sheetName);

    // Get raw rows — the file has row 1 as merged nav headers, row 2 as real column headers
    // Row 2: PID | Draft Slot | First | Last | Team | Pos | Year | 2045 | 2046 | 2047...
    const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!rawRows || rawRows.length < 3) return;

    // Find the real header row — contains PID and First and Last
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(5, rawRows.length); i++) {
      const row = rawRows[i].map(c => String(c).trim().toLowerCase());
      if (row.includes('pid') && row.includes('first') && row.includes('last')) {
        headerRowIdx = i;
        break;
      }
    }
    if (headerRowIdx === -1) return;

    const headers = rawRows[headerRowIdx].map(c => String(c).trim());

    // Map column indices
    const col = {};
    const contractYearCols = [];
    // Scan ALL rows to detect if a year column contains dollar amounts (salary) or X marks (active)
    // We do a quick peek at the first data rows to classify each year column
    const peekRows = rawRows.slice(headerRowIdx + 1, headerRowIdx + 6);

    headers.forEach((h, i) => {
      const lh = h.toLowerCase().replace(/\s+/g,'');
      const hr = h.trim();
      if      (lh === 'pid')                         col.pid       = i;
      else if (lh === 'draftslot' || lh === 'draft') col.draftSlot = i;
      else if (lh === 'first')                        col.first     = i;
      else if (lh === 'last')                         col.last      = i;
      else if (lh === 'team')                         col.team      = i;
      else if (lh === 'pos' || lh === 'position')     col.pos       = i;
      else if (lh === 'year' || lh === 'years')       col.year      = i;
      else if (/^\$?20\d{2}\$?$/.test(hr) || /^20\d{2}$/.test(hr)) {
        const yr = parseInt(hr.replace(/[$]/g,''));
        if (isNaN(yr)) return;
        // Peek at first few data rows to detect salary vs X-mark column
        // Salary cols: values like 500000, "$500,000", "500000"
        // X-mark cols: values like "X", "x", "1", ""
        let hasDollarVal = false, hasXMark = false;
        for (const pr of peekRows) {
          if (!pr) continue;
          const v = String(pr[i] || '').trim().replace(/[$,]/g,'');
          if (v === 'X' || v === 'x' || v === '1') { hasXMark = true; break; }
          const n = parseFloat(v);
          if (!isNaN(n) && n > 1000) { hasDollarVal = true; break; }
        }
        if (hasDollarVal) {
          // Salary column
          col['salary_' + yr] = i;
          contractYearCols.push({ year: yr, idx: i, isSalary: true });
        } else {
          // Contract active year (X marks)
          contractYearCols.push({ year: yr, idx: i, isSalary: false });
        }
      }
    });

    // Must have at minimum first + last to build a player name
    if (col.first === undefined || col.last === undefined) return;

    for (let ri = headerRowIdx + 1; ri < rawRows.length; ri++) {
      const row = rawRows[ri];
      if (!row || row.length < 3) continue;

      const firstName = String(row[col.first] || '').trim();
      const lastName  = String(row[col.last]  || '').trim();
      if (!firstName && !lastName) continue;
      const fullName = [firstName, lastName].filter(Boolean).join(' ');
      if (fullName.length < 2) continue;

      const pid       = col.pid       !== undefined ? String(row[col.pid]       || '').trim() : '';
      const draftSlot = col.draftSlot !== undefined ? String(row[col.draftSlot] || '').trim() : '';
      const pos       = col.pos       !== undefined ? String(row[col.pos]       || '').trim().toUpperCase() : '';
      const yearsLeft = col.year      !== undefined ? String(row[col.year]      || '').trim() : '';

      // Parse salary columns — keyed by year e.g. col.salary_2048, col.salary_2049
      const salaries = {};
      Object.keys(col).filter(k => k.startsWith('salary_')).forEach(k => {
        const yr = parseInt(k.replace('salary_',''));
        const raw = String(row[col[k]] || '').trim().replace(/[$,]/g,'');
        const num = parseFloat(raw);
        if (!isNaN(num) && num > 0) salaries[yr] = num;
      });
      // Find current season salary and next season salary
      const salaryYears = Object.keys(salaries).map(Number).sort((a,b)=>a-b);
      const currentSalaryYear = salaryYears[0] || null;
      const nextSalaryYear    = salaryYears[1] || null;
      const currentSalary     = currentSalaryYear ? salaries[currentSalaryYear] : null;
      const nextSalary        = nextSalaryYear    ? salaries[nextSalaryYear]    : null;

      // Parse draft slot: "GB 1-2", "LAC 6-15", "48-BUF-1-1", "X" (UDFA)
      let draftRound = '', draftPick = '', draftTeam = '';
      const ds = draftSlot.toUpperCase().trim();
      const m1 = ds.match(/^([A-Z]+)\s+(\d+)-(\d+)$/);      // "GB 1-2"
      const m2 = ds.match(/^(\d+)-([A-Z]+)-(\d+)-(\d+)$/);  // "48-BUF-1-1"
      const m3 = ds.match(/^([A-Z]+)\s*(\d+)-(\d+)$/);       // "LAC6-15" compact
      if (m2) { draftTeam = m2[2]; draftRound = m2[3]; draftPick = m2[4]; }
      else if (m1) { draftTeam = m1[1]; draftRound = m1[2]; draftPick = m1[3]; }
      else if (m3) { draftTeam = m3[1]; draftRound = m3[2]; draftPick = m3[3]; }
      else if (ds === 'X' || ds === '') draftRound = 'UDFA';
      else draftRound = ds; // store raw

      // Determine contracted years (X in that year column)
      const contractedYears = contractYearCols
        .filter(({idx, isSalary}) => {
          if (isSalary) return false; // salary columns have $amounts, not X marks
          const v = String(row[idx] || '').trim().toUpperCase();
          return v === 'X' || v === '1';
        })
        .map(({year}) => year);

      const contractStart  = contractedYears.length ? Math.min(...contractedYears) : null;
      const contractEnd    = contractedYears.length ? Math.max(...contractedYears) : null;
      const contractLength = contractedYears.length;

      const contract = {
        playerName:       fullName,
        firstName,
        lastName,
        team:             teamName,
        position:         pos,
        playerId:         pid,
        draftSlot:        draftSlot,
        draftRound,
        draftPick,
        draftTeam,
        yearsLeft:        yearsLeft !== '' ? yearsLeft : String(contractLength),
        contractLength,
        contractStart,
        contractEnd,
        contractYearList: contractedYears,
        salaries,
        currentSalaryYear,
        nextSalaryYear,
        currentSalary,
        nextSalary,
        sheetName,
      };

      // Index: normalized full name
      const key = fullName.toLowerCase().replace(/[^a-z0-9]/g,'');
      if (key.length > 1) { contracts[key] = contract; totalPlayers++; }

      // Index: last name fallback
      const lnKey = '_last_' + lastName.toLowerCase().replace(/[^a-z]/g,'');
      if (!contracts[lnKey]) contracts[lnKey] = [];
      contracts[lnKey].push(contract);

      // Index: PID direct
      if (pid && pid !== 'X') contracts['_pid_' + pid] = contract;
    }
  });

  return {
    contracts,
    teamCount: teamSheets.length,
    playerCount: totalPlayers,
    fetchedAt: new Date().toISOString(),
    sheets: teamSheets,
  };
}

// Build an indexed Map from contractData for O(1) lookups
// Called once and cached on the contractData object
function buildContractIndex(contractData) {
  if (!contractData || !contractData.contracts) return;
  if (contractData._index) return; // already built
  const idx = new Map();
  const raw = contractData.contracts;
  Object.keys(raw).forEach(k => {
    const v = raw[k];
    if (Array.isArray(v)) {
      // last-name buckets — store as-is
      idx.set(k, v);
    } else if (v && v.playerName) {
      idx.set(k, v);
    }
  });
  contractData._index = idx;
}

// Lookup a contract by player name or PID (O(1) via Map index)
function lookupContract(contractData, playerName, pid) {
  if (!contractData || !contractData.contracts) return null;
  buildContractIndex(contractData);
  const idx = contractData._index;

  // Direct PID lookup
  if (pid) { const v = idx.get('_pid_' + pid); if (v) return v; }
  if (!playerName) return null;

  // Exact normalized full name
  const key = playerName.toLowerCase().replace(/[^a-z0-9]/g,'');
  const exact = idx.get(key);
  if (exact) return exact;

  // Last name fallback
  const parts = playerName.trim().split(/\s+/);
  const lastName = (parts[parts.length-1] || '').toLowerCase().replace(/[^a-z]/g,'');
  const lastMatches = idx.get('_last_' + lastName);
  if (!lastMatches || !lastMatches.length) return null;
  if (lastMatches.length === 1) return lastMatches[0];
  const firstInitial = (parts[0] || '').toLowerCase()[0];
  if (firstInitial) {
    const m = lastMatches.find(x => x.firstName && x.firstName.toLowerCase().startsWith(firstInitial));
    if (m) return m;
  }
  return lastMatches[0];
}

// Format a salary value for display
function fmtSalary(val) {
  if (!val && val !== 0) return null;
  const n = parseFloat(String(val).replace(/[$,]/g,''));
  if (isNaN(n)) return String(val) || null;
  if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n}`;
}

function AIConnectModal({ onClose, onConnected }) {
  const [keyInput, setKeyInput] = useState('');
  const [status, setStatus] = useState('idle'); // idle | connecting | success | error
  const [errorMsg, setErrorMsg] = useState('');

  // Pre-fill if key already saved
  React.useEffect(() => {
    const saved = sessionStorage.getItem('pnfl_ai_key');
    if (saved) setKeyInput(saved);
    if (window.pnflAI?.isReady()) setStatus('success');
  }, []);

  const [proxyInput, setProxyInput] = useState(() => sessionStorage.getItem('pnfl_proxy_url') || '');

  const connect = async () => {
    const key = keyInput.trim();
    if (!key) return;
    if (!window.pnflAI || typeof window.pnflAI.load !== 'function') {
      setStatus('error');
      setErrorMsg('AI module failed to initialize — try refreshing the page.');
      return;
    }
    setStatus('connecting');
    setErrorMsg('');
    try {
      await window.pnflAI.load(key, proxyInput.trim());
      setStatus('success');
      haptic('heavy');
      playSound('aiConnect');
      setTimeout(() => { onConnected && onConnected(); onClose && onClose(); }, 800);
    } catch(e) {
      setStatus('error');
      setErrorMsg(e.message || String(e));
    }
  };

  const disconnect = () => {
    if (window.pnflAI) {
      window.pnflAI._ready    = false;
      window.pnflAI._apiKey   = '';
      window.pnflAI._proxyUrl = '';
    }
    sessionStorage.removeItem('pnfl_ai_key');
    sessionStorage.removeItem('pnfl_proxy_url');
    setStatus('idle');
    setKeyInput('');
    setProxyInput('');
    onConnected && onConnected();
  };

  return (
    <div onClick={onClose} style={{
      position:'fixed',inset:0,zIndex:9999,
      background:'rgba(0,0,0,0.75)',
      display:'flex',alignItems:'center',justifyContent:'center',

          <button onClick={onClose} style={{background:'none',border:'none',color:'#604080',fontSize:'1.4rem',cursor:'pointer',lineHeight:1,padding:'2px 6px'}}>✕</button>
        </div>

        {status === 'success' ? (
          /* Connected state */
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',background:'rgba(74,255,74,0.07)',border:'1px solid rgba(74,255,74,0.25)',borderRadius:'10px',marginBottom:'16px'}}>
              <div style={{width:'12px',height:'12px',borderRadius:'50%',background:'#4aff4a',boxShadow:'0 0 8px #4aff4a',flexShrink:0}}/>

                <div style={{fontFamily:'Orbitron',fontSize:'0.78rem',color:'#4aff4a',fontWeight:'700'}}>CONNECTED</div>

              </div>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button onClick={()=>{ onConnected && onConnected(); onClose && onClose(); }} className="haptic-btn"
                style={{flex:1,padding:'10px',background:'linear-gradient(135deg,rgba(160,100,255,0.2),rgba(100,60,180,0.3))',border:'2px solid #c090ff66',borderRadius:'8px',color:'#c090ff',fontFamily:'Orbitron',fontSize:'0.78rem',fontWeight:'700',cursor:'pointer'}}>

              {[
                ['1', 'Go to ', 'huggingface.co/settings/tokens', 'https://huggingface.co/settings/tokens'],
                ['2', 'Click "Create new token" → Token type: Fine-grained', null, null],
                ['3', 'Under Permissions → check "Make calls to the serverless Inference API"', null, null],

            </div>

              </div>
            </div>

            {/* Key input */}
            <div style={{display:'flex',gap:'8px',marginBottom:'10px'}}>
              <input
                type="password"
                value={keyInput}
                onChange={e=>setKeyInput(e.target.value)}

                placeholder="hf_xxxxxxxxxxxxxxxxxxxx"
                style={{
                  flex:1,padding:'10px 14px',borderRadius:'8px',
                  background:'rgba(10,15,30,0.9)',

                }}

              <button onClick={connect} disabled={!keyInput.trim()||status==='connecting'} className="haptic-btn"

                  padding:'10px 20px',

              </button>

            {status==='error' && (
              <div style={{padding:'10px 12px',background:'rgba(255,60,60,0.08)',border:'1px solid rgba(255,80,80,0.25)',borderRadius:'7px',fontSize:'0.72rem',color:'#ff9090',fontFamily:'Roboto Condensed',lineHeight:1.6,maxHeight:'120px',overflowY:'auto',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                {(() => {
                  const msg = errorMsg || '';
                  if (msg.startsWith('WORKER_OUTDATED:')) return (
                    <span>
                      <strong style={{color:'#ffaa44'}}>⚠ Worker needs update</strong><br/>
                      {msg.replace('WORKER_OUTDATED:','').trim()}<br/>
                      <strong style={{color:'#ffd700',marginTop:'4px',display:'block'}}>Steps: dash.cloudflare.com → Workers → your worker → Edit Code → select all → paste new pnfl_ai_proxy_worker.js → Save & Deploy</strong>
                    </span>
                  );
                  if (msg.startsWith('NO_PERMISSION:')) return (
                    <span>
                      <strong style={{color:'#ffaa44'}}>⚠ Token missing permission</strong><br/>
                      huggingface.co/settings/tokens → Edit your token → Permissions → check <strong>"Make calls to the serverless Inference API"</strong> → Save
                    </span>
                  );
                  if (msg.startsWith('INVALID_TOKEN:')) return (
                    <span><strong style={{color:'#ffaa44'}}>⚠ Invalid token</strong> — copy the full hf_... token from huggingface.co/settings/tokens</span>
                  );
                  if (msg.startsWith('NETWORK:')) return (
                    <span><strong style={{color:'#ffaa44'}}>⚠ Network error</strong> — check your Cloudflare Worker URL is correct and the worker is deployed and active</span>
                  );
                  return <span>⚠ {msg}</span>;
                })()}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Panels: Depth & Weights ──
function DepthPanel({ depth, onDepthChange }) {
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(depth)));
  const handle = (pos, val) => { const n=Math.max(1,Math.min(10,parseInt(val)||1)); setLocal(p=>({...p,[pos]:n})); };
  const apply = () => { onDepthChange(local); saveDepth(local); };
  const reset = () => { const d=JSON.parse(JSON.stringify(DEFAULT_DEPTH)); setLocal(d); onDepthChange(d); saveDepth(d); };
  const offOther=['QB','HB','WR','TE','K','P'];
  const offOL=['C','G','T'];
  const defDL=['DE','DT'];
  const defOther=['LB','CB','S'];
  const depthCard = (pos, label) => (
    <div className="depth-item" key={pos}>
      <h4 style={{color:offOL.includes(pos)?'#4a9eff':defDL.includes(pos)?'#ff8888':'#ffd700'}}>{label||pos}</h4>
      <div className="depth-row"><label>Players:</label>
        <input type="number" min="1" max="10" value={local[pos]||1} onChange={e=>handle(pos,e.target.value)}/>
      </div>
      <div className="helper-text" style={{marginTop:'5px'}}>Default: {DEFAULT_DEPTH[pos]}</div>
    </div>
  );
  return (
    <div className="panel-content">
      <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',marginBottom:'15px',fontSize:'1.1rem'}}>🔵 SKILL POSITIONS</h4>
      <div className="depth-grid">{offOther.map(p=>depthCard(p))}</div>
      <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔵 OFFENSIVE LINE</h4>
      <div className="depth-grid">{offOL.map(p=>depthCard(p,p==='C'?'Center':p==='G'?'Guard':'Tackle'))}</div>
      <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔴 DEFENSIVE LINE</h4>
      <div className="depth-grid">{defDL.map(p=>depthCard(p,p==='DE'?'Def. End':'Def. Tackle'))}</div>
      <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔴 LINEBACKERS & SECONDARY</h4>
      <div className="depth-grid">{defOther.map(p=>depthCard(p))}</div>
      <div className="button-group">
        <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
        <button className="btn-secondary" onClick={reset}>↺ Reset Defaults</button>
      </div>
    </div>
  );
}
