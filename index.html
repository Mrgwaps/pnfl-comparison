<script type="text/babel">
const { useState, useEffect, useRef } = React;

      {name:`${teamName} TE1`, attrs:[82+teamIndex,80+teamIndex,83+teamIndex,88-teamIndex,86+teamIndex,84+teamIndex,85-teamIndex,87+teamIndex].map(v=>Math.max(60,Math.min(99,v))), status:"A"},

// ── Scoring functions ──
function calculatePlayerScore(attrs, position, weights) {
  const pw = weights[position] || weights.C || weights.DE || weights.LB;
  let ws = 0, wt = 0;
  ATTRIBUTES.forEach((attr, i) => { const w = pw[attr] || 1; ws += attrs[i] * w; wt += w; });
  return ws / wt;
}
function calculateSumScore(attrs) { return attrs.reduce((s,v) => s+v, 0); }

function calculatePositionScore(teamData, position, unit, weights, depth) {
  const players = (teamData[position] || []).filter(p => p.status==='A'||p.status==='O');
  if (!players.length) return 0;
  const scored = players.map(p => ({...p, ws:calculatePlayerScore(p.attrs,position,weights), ss:calculateSumScore(p.attrs)}))
    .sort((a,b) => b.ws-a.ws);
  const maxDepth = depth || DEFAULT_DEPTH[position] || 3;
  const top = scored.slice(0, Math.min(maxDepth, scored.length));
  if (!top.length) return 0;
  const aw = top.reduce((s,p) => s+p.ws, 0) / top.length;
  const as = top.reduce((s,p) => s+p.ss, 0) / top.length;
  return (aw * 0.7) + (as * 0.03);
}

function calculateUnitScore(teamData, unit, weights, depth) {
  const positions = POSITION_GROUPS[unit];
  let total = 0, count = 0;
  positions.forEach(pos => {
    if (teamData[pos] && teamData[pos].length > 0) {
      total += calculatePositionScore(teamData, pos, unit, weights, depth[pos]);
      count++;
    }
  });
  return count > 0 ? total / count : 0;
}

// Calculate a group-level score (average of sub-positions)
function calculateGroupScore(teamData, positions, unit, weights, depth) {
  let total = 0, count = 0;
  positions.forEach(pos => {
    if (teamData[pos] && teamData[pos].length > 0) {
      total += calculatePositionScore(teamData, pos, unit, weights, depth[pos]);
      count++;
    }
  });
  return count > 0 ? total / count : 0;
}

function calculateOverallScore(teamData, weights, depth) {
  const o = calculateUnitScore(teamData, 'offense', weights, depth);
  const d = calculateUnitScore(teamData, 'defense', weights, depth);
  return (o * 0.55) + (d * 0.45);
}

        <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',margin:'20px 0 15px',fontSize:'1.1rem'}}>🔴 DEFENSIVE — Linebackers & Secondary</h4>
        <div className="depth-grid">
          {defOther.map(pos => (
            <div className="depth-item" key={pos}>
              <h4>{pos}</h4>
              <div className="depth-row"><label>Players:</label>
                <input type="number" min="1" max="10" value={local[pos]} onChange={e => handle(pos, e.target.value)} />
              </div>
              <div className="helper-text" style={{marginTop:'5px'}}>Default: {DEFAULT_DEPTH[pos]}</div>
            </div>
          ))}
        </div>
        <div className="button-group">
          <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
          <button className="btn-secondary" onClick={reset}>↺ Reset Defaults</button>
        </div>
      </div>}
    </div>
  );
}

// ── Weights Panel ──
function WeightsPanel({ weights, onWeightsChange }) {
  const [open, setOpen] = useState(false);
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(weights)));
  const handle = (pos, attr, val) => {
    const num = Math.max(0, Math.min(10, parseInt(val)||0));
    setLocal(p => ({...p, [pos]: {...p[pos], [attr]: num}}));
  };
  const apply = () => { onWeightsChange(local); saveWeights(local); };
  const reset = () => { const d = JSON.parse(JSON.stringify(DEFAULT_WEIGHTS)); setLocal(d); onWeightsChange(d); saveWeights(d); };
  const preset = (p) => {
    if (p==='balanced') {
      const b = {};
      Object.keys(DEFAULT_WEIGHTS).forEach(pos => b[pos] = {SP:2,AC:2,AG:2,ST:2,HA:2,EN:2,IN:2,DI:2});
      setLocal(b);
    } else if (p==='speed') {
      const s = {};
      Object.keys(DEFAULT_WEIGHTS).forEach(pos => s[pos] = {SP:4,AC:3,AG:2,ST:1,HA:2,EN:1,IN:1,DI:1});
      setLocal(s);
    } else if (p==='trench') {
      const t = JSON.parse(JSON.stringify(DEFAULT_WEIGHTS));
      // Boost trench positions
      ['C','G','T'].forEach(pos => { t[pos] = {SP:1,AC:1,AG:2,ST:4,HA:1,EN:4,IN:3,DI:3}; });
      ['DE','DT'].forEach(pos => { t[pos] = {SP:2,AC:2,AG:2,ST:4,HA:2,EN:3,IN:1,DI:3}; });
      setLocal(t);
    }
  };
  return (
    <div className="game-panel">
      <div className="panel-header" onClick={() => setOpen(!open)}>
        <span>⚙️ Configure Attribute Weights</span>
        <span style={{fontSize:'1.5rem'}}>{open?'▲':'▼'}</span>
      </div>
      {open && <div className="panel-content">
        <div className="helper-text" style={{marginBottom:'20px',color:'#a0d2a0'}}>
          Adjust weights (0-10) per attribute/position. Higher = more important.
        </div>
        <div className="position-weights">
          {Object.entries(local).map(([pos,attrs]) => (
            <div className="position-card" key={pos}>
              <h4>{pos}</h4>
              {ATTRIBUTES.map(attr => (
                <div className="weight-row" key={attr}>
                  <label>{attr}</label>
                  <input type="number" min="0" max="10" value={attrs[attr]} onChange={e => handle(pos,attr,e.target.value)} />
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="button-group">
          <button className="btn-primary" onClick={apply}>💾 Apply & Save</button>
          <button className="btn-secondary" onClick={reset}>↺ Reset</button>
          <button className="btn-secondary" onClick={() => preset('balanced')}>⚖️ Balanced</button>
          <button className="btn-secondary" onClick={() => preset('speed')}>⚡ Speed</button>
          <button className="btn-secondary" onClick={() => preset('trench')}>🏋️ Trench</button>
        </div>
      </div>}
    </div>
  );
}

// ── Team Selector ──
function TeamSelector({ selectedTeams, onTeamsChange }) {
  const handle = (e, idx) => {
    const t = [...selectedTeams];
    t[idx] = e.target.value;
    onTeamsChange(t);
  };
  const add = () => { if (selectedTeams.length < 4) onTeamsChange([...selectedTeams, '']); };
  const remove = (idx) => { onTeamsChange(selectedTeams.filter((_,i) => i !== idx)); };
  return (
    <div className="control-group">
      <label>🏈 Select Teams (2-4)</label>
      {selectedTeams.map((team, idx) => (
        <div key={idx} className="team-select-container">
          <div className="team-select-wrapper">
            <TeamLogo teamName={team} size="small"/>
            <select value={team} onChange={e => handle(e, idx)}>
              <option value="">-- Select Team --</option>
              {[...TEAM_NAMES].sort().map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            {selectedTeams.length > 2 && (
              <button type="button" onClick={() => remove(idx)} className="btn-danger btn-small" style={{width:'35px',padding:'8px'}}>✕</button>
            )}
          </div>
        </div>
      ))}
      {selectedTeams.length < 4 && (
        <button type="button" onClick={add} className="btn-secondary" style={{marginTop:'10px',width:'100%'}}>+ Add Team</button>
      )}
      <div className="helper-text">Compare 2-4 teams. Offense/Defense ranked separately with ✓ advantage markers.</div>
    </div>
  );
}

// ── Comparison Table ──
function ComparisonTable({ teams, data }) {
  if (!data || teams.length < 2) return null;

  const renderScoreRow = (label, scores, isGroupTotal=false, isUnitTotal=false, indent=false) => {
    const numericScores = scores.map(s => parseFloat(s));
    const max = Math.max(...numericScores.filter(s => !isNaN(s)));
    const tie = numericScores.filter(s => s === max && !isNaN(s)).length > 1;
    let rowStyle = {};
    if (isUnitTotal) rowStyle = { fontWeight:'bold', background: label.includes('OFFENSE') ? 'rgba(42,157,143,0.28)' : 'rgba(220,50,60,0.28)' };
    else if (isGroupTotal) rowStyle = { fontWeight:'bold', background:'rgba(255,215,0,0.08)', borderTop:'2px solid rgba(255,215,0,0.3)' };
    return (
      <tr key={label} style={rowStyle}>
        <td style={{paddingLeft: indent ? '28px' : '15px', color: indent ? '#c0d8c0' : isGroupTotal ? '#ffd700' : '#fff', fontSize: indent ? '0.88rem' : '0.95rem'}}>
          {indent && <span style={{color:'#4a7c4a',marginRight:'6px'}}>└</span>}
          {label}
        </td>
        {teams.map((team, i) => {
          const isWinner = numericScores[i] === max && !isNaN(numericScores[i]) && !tie;
          return (
            <td key={`${team}-${label}`} className={isWinner ? 'score-cell' : ''} style={{fontSize: indent ? '0.9rem' : '0.95rem'}}>
              {scores[i]}
              {isWinner && <span className="advantage">✓</span>}
            </td>
          );
        })}
      </tr>
    );
  };

  const renderGroupHeader = (label, color) => (
    <tr key={`hdr_${label}`} style={{background:`rgba(0,0,0,0.4)`}}>
      <td colSpan={teams.length+1} style={{padding:'8px 15px 5px', fontFamily:'Orbitron,sans-serif', fontSize:'0.8rem', fontWeight:'700', color:color, letterSpacing:'2px', textTransform:'uppercase', borderBottom:`2px solid ${color}33`}}>
        {label}
      </td>
    </tr>
  );

  // Build offense rows
  const offenseRows = [];
  // Non-OL positions first
  ['QB','HB','FB','TE','WR'].forEach(pos => {
    const scores = teams.map(t => data.teams[t]?.offensePositions[pos]?.toFixed(1) ?? 'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos], scores));
  });
  // OL group
  offenseRows.push(renderGroupHeader('── Offensive Line ──', '#4a9eff'));
  OL_POSITIONS.forEach(pos => {
    const scores = teams.map(t => data.teams[t]?.offensePositions[pos]?.toFixed(1) ?? 'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos], scores, false, false, true));
  });
  offenseRows.push(renderScoreRow('OL Group Total', teams.map(t => data.teams[t]?.offensePositions['OL_TOTAL']?.toFixed(1) ?? 'N/A'), true));
  // K/P
  ['K','P'].forEach(pos => {
    const scores = teams.map(t => data.teams[t]?.offensePositions[pos]?.toFixed(1) ?? 'N/A');
    offenseRows.push(renderScoreRow(POSITION_DISPLAY[pos], scores));
  });

  // Build defense rows
  const defenseRows = [];
  // DL group
  defenseRows.push(renderGroupHeader('── Defensive Line ──', '#ff6b6b'));
  DL_POSITIONS.forEach(pos => {
    const scores = teams.map(t => data.teams[t]?.defensePositions[pos]?.toFixed(1) ?? 'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos], scores, false, false, true));
  });
  defenseRows.push(renderScoreRow('DL Group Total', teams.map(t => data.teams[t]?.defensePositions['DL_TOTAL']?.toFixed(1) ?? 'N/A'), true));
  // LB, CB, S
  ['LB','CB','S'].forEach(pos => {
    const scores = teams.map(t => data.teams[t]?.defensePositions[pos]?.toFixed(1) ?? 'N/A');
    defenseRows.push(renderScoreRow(POSITION_DISPLAY[pos], scores));
  });

  const thStyle = {display:'flex',alignItems:'center',gap:'8px'};

  return (
    <div className="card full-width">
      <h3 className="card-title">📊 Position Comparison</h3>

      <h4 style={{margin:'20px 0 12px',color:'#4a9eff',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔵 OFFENSE</h4>
      <table>
        <thead>
          <tr>
            <th style={{width:'180px'}}>Position</th>
            {teams.map(t => <th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}
          </tr>
        </thead>
        <tbody>
          {offenseRows}
          {renderScoreRow('🔵 OFFENSE TOTAL', teams.map(t => data.teams[t]?.offenseScore?.toFixed(1) ?? 'N/A'), false, true)}
        </tbody>
      </table>

      <h4 style={{margin:'25px 0 12px',color:'#ff6b6b',fontFamily:'Orbitron',fontSize:'1.2rem'}}>🔴 DEFENSE</h4>
      <table>
        <thead>
          <tr>
            <th style={{width:'180px'}}>Position</th>
            {teams.map(t => <th key={t}><div style={thStyle}><TeamLogo teamName={t} size="small"/>{t}</div></th>)}
          </tr>
        </thead>
        <tbody>
          {defenseRows}
          {renderScoreRow('🔴 DEFENSE TOTAL', teams.map(t => data.teams[t]?.defenseScore?.toFixed(1) ?? 'N/A'), false, true)}
        </tbody>
      </table>

      <div style={{marginTop:'25px',padding:'20px',background:'rgba(0,0,0,0.3)',borderRadius:'12px',border:'2px solid #2d5a2d'}}>
        <h4 style={{marginBottom:'15px',fontFamily:'Orbitron',color:'#ffd700',fontSize:'1.3rem'}}>🏆 OVERALL TEAM RANKINGS</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'15px'}}>
          {teams.map(team => {
            const isWinner = data.overall.winner === team;
            return (
              <div key={team} style={{
                padding:'18px', borderRadius:'12px',
                background: isWinner ? 'linear-gradient(135deg,#2d5a2d,#1a3a1a)' : 'rgba(0,0,0,0.3)',
                border: isWinner ? '3px solid #ffd700' : '2px solid #2d5a2d',
                color: isWinner ? '#fff' : '#a0d2a0', textAlign:'center',
                boxShadow: isWinner ? '0 0 20px rgba(255,215,0,0.4)' : 'none',
                transform: isWinner ? 'scale(1.05)' : 'scale(1)', transition:'all 0.3s'
              }}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'10px'}}>
                  <TeamLogo teamName={team} size="small"/>
                  <div style={{fontWeight:'bold',fontSize:'1.1rem',fontFamily:'Orbitron'}}>{isWinner && '👑 '}{team}</div>
                </div>
                <div style={{fontSize:'2.2rem',fontWeight:'900',fontFamily:'Orbitron',color:isWinner?'#ffd700':'#4a9eff'}}>
                  {data.teams[team]?.overallScore?.toFixed(1)}
                </div>
                <div style={{fontSize:'0.9rem',opacity:isWinner?1:0.7,marginTop:'5px'}}>Overall Score</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Radar Chart ──
function RadarChart({ teams, data }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [type, setType] = useState('aggregate');

  useEffect(() => {
    if (!canvasRef.current || !data || teams.length < 2) return;
    const ctx = canvasRef.current.getContext('2d');
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    let labels, datasets;
    if (type === 'aggregate') {
      labels = ATTRIBUTES;
      datasets = teams.map((team, idx) => {
        const scores = ATTRIBUTES.map((attr, ai) => {
          let total = 0, count = 0;
          Object.values(ROSTER_DATA[team]||{}).forEach(pos =>
            pos.forEach(p => { if (p.status==='A'||p.status==='O') { total += p.attrs[ai]; count++; }})
          );
          return count > 0 ? total/count : 70;
        });
        return {
          label: team, data: scores,
          borderColor: `hsl(${idx*60},70%,50%)`,
          backgroundColor: `hsla(${idx*60},70%,50%,0.1)`,
          borderWidth: 2, pointRadius: 3
        };
      });
    } else {
      labels = ['Offense','Defense'];
      datasets = teams.map((team, idx) => ({
        label: team,
        data: [data.teams[team]?.offenseScore||0, data.teams[team]?.defenseScore||0],
        borderColor: `hsl(${idx*60+30},70%,50%)`,
        backgroundColor: `hsla(${idx*60+30},70%,50%,0.1)`,
        borderWidth: 2, pointRadius: 4
      }));
    }

    Chart.defaults.color = '#a0d2a0';
    Chart.defaults.borderColor = '#2d5a2d';

    chartRef.current = new Chart(ctx, {
      type: 'radar',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            angleLines: { color: 'rgba(45,90,45,0.5)' },
            grid: { color: 'rgba(45,90,45,0.3)' },
            pointLabels: { font: { size: 11, weight: '700', family: 'Orbitron' }, color: '#ffd700' },
            ticks: { display: type==='aggregate', stepSize: 10, backdropColor: 'transparent', color: '#a0d2a0' },
            min: 60, max: 100
          }
        },
        plugins: {
          legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, font: { family: 'Roboto Condensed' } } },
          tooltip: {
            callbacks: { label: (c) => `${c.dataset.label}: ${(c.parsed.r||c.parsed.y)?.toFixed(1)}` },
            titleFont: { family: 'Orbitron' }, bodyFont: { family: 'Roboto Condensed' }
          }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [teams, data, type]);

  if (!data || teams.length < 2) {
    return <div className="card"><h3 className="card-title">🕷️ Radar Chart</h3><div className="loading">Select 2+ teams to generate charts</div></div>;
  }
  return (
    <div className="card">
      <h3 className="card-title">🕷️ Radar Chart</h3>
      <div className="chart-toggle">
        <button className={type==='aggregate'?'active btn-primary':'btn-secondary'} onClick={() => setType('aggregate')}>📊 Attributes</button>
        <button className={type==='units'?'active btn-primary':'btn-secondary'} onClick={() => setType('units')}>⚔️ Units</button>
      </div>
      <div className="chart-container"><canvas ref={canvasRef}></canvas></div>
      <div className="helper-text" style={{marginTop:'15px',textAlign:'center',color:'#a0d2a0'}}>
        {type==='aggregate'?'Higher values toward edge = stronger attributes across roster':'Offense vs Defense unit scores comparison'}
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [teams, setTeams] = useState(['','']);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [weights, setWeights] = useState(loadWeights);
  const [depth, setDepth] = useState(loadDepth);

  const compare = () => {
    const valid = teams.filter(t => t && ROSTER_DATA[t]);
    if (valid.length < 2) { alert('Select at least 2 teams'); return; }
    setLoading(true);
    setTimeout(() => {
      const res = { teams: {}, offense: { winner:null, scores:{} }, defense: { winner:null, scores:{} }, overall: { winner:null, scores:{} } };
      valid.forEach(team => {
        const td = ROSTER_DATA[team];
        const oS = calculateUnitScore(td, 'offense', weights, depth);
        const dS = calculateUnitScore(td, 'defense', weights, depth);
        const oT = calculateOverallScore(td, weights, depth);
        const oP = {}, dP = {};
        POSITION_GROUPS.offense.forEach(p => { if(td[p]) oP[p] = calculatePositionScore(td, p, 'offense', weights, depth[p]); });
        POSITION_GROUPS.defense.forEach(p => { if(td[p]) dP[p] = calculatePositionScore(td, p, 'defense', weights, depth[p]); });
        // Group totals for OL and DL
        oP['OL_TOTAL'] = calculateGroupScore(td, OL_POSITIONS, 'offense', weights, depth);
        dP['DL_TOTAL'] = calculateGroupScore(td, DL_POSITIONS, 'defense', weights, depth);
        res.teams[team] = { offenseScore:oS, defenseScore:dS, overallScore:oT, offensePositions:oP, defensePositions:dP };
        res.offense.scores[team] = oS;
        res.defense.scores[team] = dS;
        res.overall.scores[team] = oT;
      });
      res.offense.winner = Object.entries(res.offense.scores).reduce((a,b) => a[1]>b[1]?a:b)[0];
      res.defense.winner = Object.entries(res.defense.scores).reduce((a,b) => a[1]>b[1]?a:b)[0];
      res.overall.winner = Object.entries(res.overall.scores).reduce((a,b) => a[1]>b[1]?a:b)[0];
      setData(res);
      setLoading(false);
      setTimeout(() => document.querySelector('.results-container')?.scrollIntoView({behavior:'smooth',block:'start'}), 100);

  };

  return (
    <div className="container">
      <header>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'18px',marginBottom:'8px'}}>
          <FootballIcon size={48} style={{filter:'drop-shadow(0 0 8px rgba(255,150,50,0.6))',transform:'rotate(-20deg)'}}/>

        </div>
        <p className="subtitle">Compare 18 teams using configurable attribute weights and position depth. Offense and Defense ranked separately.</p>
        <p style={{marginTop:'10px',color:'#5a8a6a',fontSize:'0.78rem',letterSpacing:'2px',fontFamily:"'Roboto Condensed',sans-serif",fontStyle:'italic'}}>Created by S.Hamilton</p>
      </header>
      <WeightsPanel weights={weights} onWeightsChange={setWeights} />
      <DepthPanel depth={depth} onDepthChange={setDepth} />
      <div className="game-panel">
        <div className="controls">
          <TeamSelector selectedTeams={teams} onTeamsChange={setTeams} />
          <DataHelpers />
          <div style={{display:'flex',flexDirection:'column',gap:'12px',minWidth:'220px'}}>
            <button onClick={compare} disabled={loading} className="btn-primary" style={{fontSize:'1.2rem',padding:'16px'}}>
              {loading ? '⏳ Analyzing...' : '▶️ COMPARE TEAMS'}
            </button>
            <button type="button" className="btn-secondary" onClick={() => { setTeams(['','']); setData(null); }}>↺ Reset All</button>
          </div>
        </div>
      </div>

      {loading && (
        <div className="game-panel" style={{textAlign:'center',padding:'50px'}}>
          <div style={{marginBottom:'20px',display:'flex',justifyContent:'center'}}>
            <FootballIcon size={56} style={{animation:'spin 1.2s linear infinite',filter:'drop-shadow(0 0 12px rgba(255,150,50,0.7))'}}/>
          </div>
          <style>{`@keyframes spin { from{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} to{transform:rotate(-20deg)} }`}</style>
          <div style={{fontSize:'1.8rem',fontFamily:'Orbitron',color:'#ffd700',marginBottom:'10px'}}>Analyzing Rosters...</div>
          <div style={{fontSize:'1.1rem',color:'#a0d2a0'}}>Calculating weighted scores with depth configuration</div>
        </div>
      )}

      {data && !loading && (
        <div className="results-container">
          <ComparisonTable teams={teams.filter(t=>t)} data={data} />
          <RadarChart teams={teams.filter(t=>t)} data={data} />
          {data.overall.winner && (
            <div className="winner-banner full-width">
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px'}}>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(-15deg)'}}/>
                <span>🏆 {data.overall.winner} Wins! 🏆</span>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(15deg)'}}/>
              </div>
              <div style={{fontSize:'1rem',fontWeight:'normal',marginTop:'10px',opacity:0.9,fontFamily:'Roboto Condensed'}}>
                Based on your configured weights & depth • Overall Score: {data.teams[data.overall.winner]?.overallScore?.toFixed(1)}
              </div>
            </div>
          )}
          <div className="card full-width">
            <h3 className="card-title">⚙️ Active Configuration</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
              <div>
                <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>ATTRIBUTE WEIGHTS (QB)</h4>
                <div className="attribute-grid">
                  {Object.entries(weights.QB).map(([attr,w]) => (
                    <div className="attr-card" key={attr}>
                      <div className="attr-name">{attr}</div>
                      <div className="attr-value">{w}x</div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>POSITION DEPTH</h4>
                <div className="attribute-grid">
                  {Object.entries(depth).map(([pos,d]) => (
                    <div className="attr-card" key={pos}>
                      <div className="attr-name">{pos}</div>
                      <div className="attr-value">{d}</div>
                      <div style={{fontSize:'0.7rem',color:'#80a080',marginTop:'2px'}}>players</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="helper-text" style={{marginTop:'15px',color:'#80a080'}}>
              Settings saved for this session. Click panels above to customize.
            </div>
          </div>
        </div>
      )}

      <div className="footer-note">
        <strong style={{color:'#608060'}}>PNFL Team Comparison Tool</strong> • Runs offline after initial load •
        <a href="https://pnfl.biz/pnflstats/PNFL_roster.htm#A0" target="_blank" rel="noopener noreferrer" style={{marginLeft:'8px'}}>Source Rosters →</a>
        <span style={{marginLeft:'8px',opacity:0.5}}>| Created by S.Hamilton</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
