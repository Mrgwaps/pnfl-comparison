function PowerRankings({ getTeamData, weights, depth, designation }) {
  const [rankings,setRankings]=useState(null);
  const [working,setWorking]=useState(false);
  const [sortKey,setSortKey]=useState('overall');

  const generate=()=>{
    setWorking(true);
    setTimeout(()=>{
      try {
        const res=TEAM_NAMES.map(team=>{
          const td=getTeamData(team)||buildPlaceholderRoster(team);
          const r=computeTeamResult(team,td,weights,depth,designation);
          return {team,...r};
        }).sort((a,b)=>b.overallScore-a.overallScore);
        setRankings(res);
      } catch(err) {
        alert('Rankings error: ' + err.message);
        console.error(err);
      }
      setWorking(false);
    },50);
  };

  const sorted=React.useMemo(()=>{
    if(!rankings) return null;
    return [...rankings].sort((a,b)=>{
      if(sortKey==='offense') return b.offenseScore-a.offenseScore;
      if(sortKey==='defense') return b.defenseScore-a.defenseScore;
      return b.overallScore-a.overallScore;
    });
  },[rankings,sortKey]);

  const tier=(rank)=>{
    if(rank<=3)  return {label:'ELITE',     color:'#ffd700', bg:'rgba(255,215,0,0.1)'};
    if(rank<=8)  return {label:'CONTENDER', color:'#4a9eff', bg:'rgba(74,158,255,0.07)'};
    if(rank<=13) return {label:'MID-TIER',  color:'#a0d2a0', bg:'rgba(45,90,45,0.07)'};
    return             {label:'REBUILDING', color:'#608060', bg:'rgba(0,0,0,0.08)'};
  };

  const maxOff=sorted?Math.max(...sorted.map(r=>r.offenseScore)):100;
  const maxDef=sorted?Math.max(...sorted.map(r=>r.defenseScore)):100;
  const maxOvr=sorted?Math.max(...sorted.map(r=>r.overallScore)):100;

  const SortBtn=({k,label,color})=>(
    <button className={sortKey===k?'btn-primary':'btn-secondary'} onClick={()=>setSortKey(k)}
      style={{padding:'6px 14px',fontSize:'0.8rem',borderColor:sortKey===k?color:'',color:sortKey===k?'':color}}>{label}</button>
  );
  const MiniBar=({val,max,color})=>(
    <div style={{background:'rgba(0,0,0,0.3)',borderRadius:'3px',height:'6px',width:'100%',overflow:'hidden',marginTop:'2px'}}>
      <div style={{height:'100%',width:`${Math.round((val/max)*100)}%`,background:color,borderRadius:'3px',transition:'width 0.6s ease'}}/>
    </div>
  );

  return(
    <div className="panel-content">
      <div className="helper-text" style={{marginBottom:'16px',color:'#a0d2a0'}}>All 18 teams ranked by roster strength using your current weights &amp; depth. Scores normalized against position attribute ceilings. Sortable by column.</div>
      <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'18px',alignItems:'center'}}>
        <button className="btn-primary" onClick={generate} disabled={working} style={{fontSize:'1rem',padding:'11px 22px'}}>
          {working?'⏳ Calculating...':'📊 Generate Rankings'}
        </button>
        {rankings&&<>
          <span style={{color:'#608060',fontSize:'0.85rem',marginLeft:'8px'}}>Sort:</span>
          <SortBtn k="overall" label="⚡ Overall" color="#ffd700"/>
          <SortBtn k="offense" label="🔵 Offense" color="#4a9eff"/>
          <SortBtn k="defense" label="🔴 Defense" color="#ff6b6b"/>
        </>}
      </div>
      {sorted&&(
        <div style={{borderRadius:'10px',overflow:'hidden',border:'1px solid #2d5a2d'}}>
          <div style={{display:'grid',gridTemplateColumns:'42px 1fr 80px 78px 78px 100px',alignItems:'center',padding:'8px 12px',background:'rgba(0,0,0,0.5)',fontFamily:'Orbitron',fontSize:'0.68rem',color:'#608060',textTransform:'uppercase',letterSpacing:'1px',borderBottom:'2px solid #2d5a2d'}}>
            <div>#</div><div>Team</div>
            <div style={{textAlign:'center',color:sortKey==='overall'?'#ffd700':'#608060'}}>Overall</div>
            <div style={{textAlign:'center',color:sortKey==='offense'?'#4a9eff':'#608060'}}>Off</div>
            <div style={{textAlign:'center',color:sortKey==='defense'?'#ff6b6b':'#608060'}}>Def</div>
            <div style={{textAlign:'center'}}>Tier</div>
          </div>
          {sorted.map((r,i)=>{
            const rank=i+1; const t=tier(rank); const isTop=rank===1;
            return(
              <div key={r.team} style={{display:'grid',gridTemplateColumns:'42px 1fr 80px 78px 78px 100px',alignItems:'center',padding:'9px 12px',background:isTop?'rgba(255,215,0,0.06)':t.bg,borderBottom:'1px solid rgba(45,90,45,0.25)',transition:'background 0.15s',cursor:'default'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(45,90,45,0.22)'}
                onMouseLeave={e=>e.currentTarget.style.background=isTop?'rgba(255,215,0,0.06)':t.bg}>
                <div style={{fontFamily:'Orbitron',fontWeight:'900',
                  color:rank===1?'#ffd700':rank===2?'#c0c0c0':rank===3?'#cd7f32':rank<=8?'#4a9eff':'#608060',
                  fontSize:rank<=3?'1.3rem':'1rem',textAlign:'center',
                  textShadow:rank===1?'0 0 12px rgba(255,215,0,0.7)':rank===2?'0 0 8px rgba(192,192,192,0.5)':rank===3?'0 0 8px rgba(205,127,50,0.5)':'none',
                  filter:rank<=3?`drop-shadow(0 0 4px ${rank===1?'rgba(255,215,0,0.4)':rank===2?'rgba(192,192,192,0.3)':'rgba(205,127,50,0.3)'})`:'none'}}>
                  {rank===1?'👑':rank===2?'🥈':rank===3?'🥉':rank}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <TeamLogo teamName={r.team} size="small"/>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:'700',fontSize:'0.9rem',fontFamily:'Orbitron',color:rank<=3?'#ffd700':'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.team}</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 6px',marginTop:'4px',maxWidth:'140px'}}>
                      <MiniBar val={r.offenseScore} max={maxOff} color="#4a9eff"/>
                      <MiniBar val={r.defenseScore} max={maxDef} color="#ff6b6b"/>
                    </div>
                  </div>
                </div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',fontWeight:'900',color:sortKey==='overall'?'#ffd700':'#e0e0e0',fontSize:'1rem'}}>{r.overallScore.toFixed(1)}</div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',color:sortKey==='offense'?'#4a9eff':'#9090b0',fontSize:'0.88rem'}}>{r.offenseScore.toFixed(1)}</div>
                <div style={{textAlign:'center',fontFamily:'Orbitron',color:sortKey==='defense'?'#ff6b6b':'#9090b0',fontSize:'0.88rem'}}>{r.defenseScore.toFixed(1)}</div>
                <div style={{textAlign:'center'}}>
                  <span style={{background:t.bg,color:t.color,border:`1px solid ${t.color}44`,borderRadius:'4px',padding:'2px 7px',fontSize:'0.62rem',fontFamily:'Orbitron',fontWeight:'700',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>{t.label}</span>
                </div>
              </div>
            );
          })}
          <div style={{padding:'9px 12px',background:'rgba(0,0,0,0.25)',fontSize:'0.72rem',color:'#608060',display:'flex',gap:'18px',flexWrap:'wrap'}}>
            <span>🟡 Elite: 1–3</span><span>🔵 Contender: 4–8</span><span>🟢 Mid-Tier: 9–13</span><span>⚫ Rebuilding: 14–18</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App() {
  const [teams,setTeams]=useState(['','']);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [weights,setWeights]=useState(loadWeights);
  const [depth,setDepth]=useState(loadDepth);
  const [rosterData,setRosterData]=useState(()=>loadRosterCache());
  const [standingsData,setStandingsData]=useState(()=>loadStandingsCache());
  const [contractData,setContractData]=useState(()=>loadContractCache());
  const [fetching,setFetching]=useState(false);
  const [fetchingContracts,setFetchingContracts]=useState(false);
  const [fetchError,setFetchError]=useState(null);
  const [designation,setDesignation]=useState('AO');
  const [activePanel,setActivePanel]=useState(null);

  // Clear all cached data
  const clearCache=()=>{
    if(!window.confirm('Clear all cached roster data and reset settings to defaults?')) return;
    storage.clear();
    setRosterData(null);
    setStandingsData(null);
    setContractData(null);
    setData(null);
    setWeights(JSON.parse(JSON.stringify(DEFAULT_WEIGHTS)));
    setDepth(JSON.parse(JSON.stringify(DEFAULT_DEPTH)));
    setTeams(['','']);
    alert('✓ Cache cleared. Fetch fresh rosters when ready.');
  };

  // Helper: fetch a URL through multiple CORS proxies, return raw text
  const fetchViaProxy = async (targetUrl, validator) => {
    const PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];
    let lastError = '';
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const res = await fetch(PROXIES[i](targetUrl), {signal: AbortSignal.timeout(20000)});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct = res.headers.get('content-type') || '';
        let text = ct.includes('application/json')
          ? (() => { return res.json().then(j => j.contents || j.body || ''); })()
          : res.text();
        text = await text;
        if (text && text.length > 200 && validator(text)) return { ok: true, text };
        throw new Error('Response did not pass validation');
      } catch(e) {
        lastError = e.message;
      }
    }
    return { ok: false, error: lastError };
  };

  // Fetch live roster + standings via CORS proxy (both fetched simultaneously)
  const fetchRosters=useCallback(async()=>{
    setFetching(true);
    setFetchError(null);

    const [rosterResult, standingsResult] = await Promise.all([
      fetchViaProxy(
        'https://pnfl.biz/pnflstats/PNFL_roster.htm',
        t => t.includes('Team Roster') || t.includes('PNFL')
      ),
      fetchViaProxy(
        'https://pnfl.biz/pnflstats/PNFL_standings.htm',
        t => t.includes('Power Rankings') || t.includes('PNFL') || t.includes('Miami') || t.includes('Pittsburgh')
      ),
    ]);

    let rosterOk = false, standingsOk = false;

    if (rosterResult.ok) {
      try {
        const parsed = parsePNFLRosterText(rosterResult.text);
        const teamCount = Object.keys(parsed.teams).length;
        if (teamCount === 0) throw new Error('No teams parsed');
        saveRosterCache(parsed);
        setRosterData(parsed);
        rosterOk = true;
      } catch(e) {
        console.warn('Roster parse failed:', e.message);
      }
    }

    if (standingsResult.ok) {
      try {
        const parsed = parsePNFLStandingsText(standingsResult.text);
        if (parsed.rankings.length > 0) {
          saveStandingsCache(parsed);
          setStandingsData(parsed);
          standingsOk = true;
        }
      } catch(e) {
        console.warn('Standings parse failed:', e.message);
      }
    }

    if (rosterOk || standingsOk) {
      const msgs = [];
      if (rosterOk) msgs.push(`✓ Rosters: ${Object.keys(loadRosterCache()?.teams||{}).length} teams`);
      if (standingsOk) msgs.push(`✓ Power Rankings: Week ${loadStandingsCache()?.week}`);
      if (!rosterOk) msgs.push(`⚠️ Rosters fetch failed`);
      if (!standingsOk) msgs.push(`⚠️ Standings fetch failed`);
      alert(msgs.join('\n'));
    } else {
      setFetchError(rosterResult.error || standingsResult.error || 'Unknown error');
      alert(`⚠️ All fetches failed. CORS proxies may be temporarily busy. Your built-in Week 1 data is still active.`);
    }

    setFetching(false);
  },[]);

  // Fetch and parse the contracts XLSX file
  const fetchContracts=useCallback(async()=>{
    setFetchingContracts(true);
    const CONTRACT_URL = 'https://pnfl.biz/pnflstats/Contracts.xlsx';
    const PROXIES = [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];
    let arrayBuffer = null;
    let lastError = '';

    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const res = await fetch(PROXIES[i](CONTRACT_URL), {signal: AbortSignal.timeout(30000)});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        if (buf.byteLength < 1000) throw new Error('Response too small to be a valid xlsx');
        arrayBuffer = buf;
        break;
      } catch(e) {
        lastError = e.message;
        console.warn(`Contract proxy ${i+1} failed:`, e.message);
      }
    }

    if (!arrayBuffer) {
      alert(`⚠️ Contract file fetch failed.\n${lastError}\n\nTry again in a moment.`);
      setFetchingContracts(false);
      return;
    }

    try {
      const parsed = parseContractXLSX(arrayBuffer);
      if (parsed.playerCount === 0) throw new Error('No player contracts found in file');
      saveContractCache(parsed);
      setContractData(parsed);
      alert(`✓ Contracts loaded!\n${parsed.playerCount} players across ${parsed.teamCount} teams.\nLast updated: ${new Date().toLocaleString()}`);
    } catch(e) {
      alert(`⚠️ Contract parse failed: ${e.message}`);
    }
    setFetchingContracts(false);
  },[]);
  const getTeamData=(team)=>{
    if(rosterData&&rosterData.teams&&rosterData.teams[team]) return rosterData.teams[team];
    if(HARDCODED_ROSTER_DATA&&HARDCODED_ROSTER_DATA.teams&&HARDCODED_ROSTER_DATA.teams[team]) return HARDCODED_ROSTER_DATA.teams[team];
    return null;
  };

  const compare=()=>{
    const valid=teams.filter(t=>t&&TEAM_NAMES.includes(t));
    if(valid.length<2){alert('Select at least 2 teams');return;}
    // Only warn if NO data at all (live or hardcoded)
    const missing=valid.filter(t=>!getTeamData(t));
    if(missing.length>0){
      const ok=window.confirm(`No roster data available for: ${missing.join(', ')}.\n\nProceed with placeholder data?`);
      if(!ok) return;
    }
    setLoading(true);
    setTimeout(()=>{
      try {
      const res={teams:{},rosterData:{},weights,designation,offense:{winner:null,scores:{}},defense:{winner:null,scores:{}},overall:{winner:null,scores:{}}};
      valid.forEach(team=>{
        const td=getTeamData(team)||buildPlaceholderRoster(team);
        res.rosterData[team]=td;
        const oS=calculateUnitScore(td,'offense',weights,depth,designation);
        const dS=calculateUnitScore(td,'defense',weights,depth,designation);
        const oT=calculateOverallScore(td,weights,depth,designation);
        const oP={},dP={};
        POSITION_GROUPS.offense.forEach(p=>{const s=calculatePositionScore(td,p,weights,depth[p],designation);if(s!==null)oP[p]=s;});
        POSITION_GROUPS.defense.forEach(p=>{const s=calculatePositionScore(td,p,weights,depth[p],designation);if(s!==null)dP[p]=s;});
        oP['OL_TOTAL']=calculateGroupScore(td,OL_POSITIONS,weights,depth,designation);
        dP['DL_TOTAL']=calculateGroupScore(td,DL_POSITIONS,weights,depth,designation);
        res.teams[team]={offenseScore:oS,defenseScore:dS,overallScore:oT,offensePositions:oP,defensePositions:dP};
        res.offense.scores[team]=oS;
        res.defense.scores[team]=dS;
        res.overall.scores[team]=oT;
      });
      if(Object.keys(res.offense.scores).length)
        res.offense.winner=Object.entries(res.offense.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      if(Object.keys(res.defense.scores).length)
        res.defense.winner=Object.entries(res.defense.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      if(Object.keys(res.overall.scores).length)
        res.overall.winner=Object.entries(res.overall.scores).reduce((a,b)=>a[1]>b[1]?a:b)[0];
      setData(res);
      } catch(err) {
        alert('Comparison error: ' + err.message);
        console.error(err);
      }
      setLoading(false);
      setTimeout(()=>document.querySelector('.results-container')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
    },300);
  };

  const rosterMeta = rosterData
    ? { season:rosterData.season, week:rosterData.week, date:rosterData.date, fetchedAt:rosterData.fetchedAt, source:'live' }
    : { season:HARDCODED_ROSTER_DATA.season, week:HARDCODED_ROSTER_DATA.week, date:HARDCODED_ROSTER_DATA.date, fetchedAt:HARDCODED_ROSTER_DATA.fetchedAt, source:'hardcoded' };

  return (
    <div className="container">
      <header>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'18px',marginBottom:'8px'}}>
          <FootballIcon size={48} style={{filter:'drop-shadow(0 0 8px rgba(255,150,50,0.6))',transform:'rotate(-20deg)'}}/>
          <h1>PNFL Team Comparison</h1>
          <FootballIcon size={48} style={{filter:'drop-shadow(0 0 8px rgba(255,150,50,0.6))',transform:'rotate(20deg)'}}/>
        </div>
        <p className="subtitle">Compare 18 teams using configurable attribute weights and position depth. Offense and Defense ranked separately.</p>
        <div style={{marginTop:'10px',display:'flex',alignItems:'center',justifyContent:'center',gap:'14px',flexWrap:'wrap'}}>
          <span style={{color:'#2d5a2d',fontSize:'0.72rem',letterSpacing:'2px',fontFamily:'Orbitron',padding:'3px 10px',border:'1px solid #2d5a2d',borderRadius:'4px'}}>v{APP_VERSION}</span>
          <span style={{color:'#5a8a6a',fontSize:'0.78rem',letterSpacing:'2px',fontFamily:"'Roboto Condensed',sans-serif",fontStyle:'italic'}}>Created by S.Hamilton</span>
        </div>
      </header>

      <RosterBanner rosterMeta={rosterMeta} onFetch={fetchRosters} fetching={fetching} onClearCache={clearCache} onFetchContracts={fetchContracts} fetchingContracts={fetchingContracts} contractData={contractData}/>

      {/* ── 2×3 Panel Grid ── */}
      {(()=>{
        const PANELS=[
          { id:'weights',     icon:'⚙️',  label:'Attribute\nWeights',   color:'#4a9eff' },
          { id:'depth',       icon:'📊',  label:'Position\nDepth',      color:'#4a9eff' },
          { id:'designation', icon:'🏷️',  label:'Designation\nFilter',  color:'#4a9eff' },
          { id:'roster-pr',   icon:'🏆',  label:'Roster Power\nRankings',color:'#7ec8ff' },
          { id:'league-pr',   icon:'📡',  label:'League Power\nRankings',color:'#7ec8ff' },
          { id:'trade',       icon:'🔄',  label:'Trade\nAnalyzer',      color:'#ff9944' },
        ];
        return (
          <div style={{marginBottom:'4px'}}>
            {/* Grid of 6 buttons — 2 rows × 3 cols */}
            <div className="panel-grid-6" style={{
              display:'grid',
              gridTemplateColumns:'repeat(3,1fr)',
              gap:'8px',
              marginBottom:'0',
              padding:'14px 0 0 0',
            }}>
              {PANELS.map(p=>{
                const active = activePanel===p.id;
                return (
                  <button key={p.id}
                    className="haptic-btn"
                    onClick={()=>{haptic('light');setActivePanel(active?null:p.id);}}
                    style={{
                      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                      gap:'5px',padding:'12px 8px',
                      background: active
                        ? (p.color==='#ff9944' ? 'rgba(255,153,68,0.15)' : 'rgba(74,158,255,0.15)')
                        : 'rgba(20,40,20,0.8)',
                      border:`2px solid ${active?p.color:'#2d5a2d'}`,
                      borderRadius:'10px',
                      color: active ? p.color : '#7a9a7a',
                      fontFamily:'Orbitron',
                      fontSize:'0.65rem',
                      fontWeight:'700',
                      letterSpacing:'0.3px',
                      cursor:'pointer',
                      transition:'all 0.2s',
                      boxShadow: active ? `0 0 14px ${p.color}33` : 'none',
                      textAlign:'center',
                      lineHeight:1.3,
                      whiteSpace:'pre-line',
                      minHeight:'64px',
                    }}
                    onMouseEnter={e=>{if(!active){e.currentTarget.style.borderColor=p.color+'99';e.currentTarget.style.color=p.color+'cc';}}}
                    onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor='#2d5a2d';e.currentTarget.style.color='#7a9a7a';}}}
                  >
                    <span style={{fontSize:'1.4rem',lineHeight:1}}>{p.icon}</span>
                    <span>{p.label}</span>
                    {active && <span style={{fontSize:'0.55rem',color:p.color,marginTop:'1px',letterSpacing:'1px'}}>▲ OPEN</span>}
                  </button>
                );
              })}
            </div>

            {/* Active panel content — expands below grid */}
            {activePanel && (
              <div style={{
                marginTop:'8px',
                border:'2px solid #2d5a2d',
                borderTop:`2px solid ${PANELS.find(p=>p.id===activePanel)?.color||'#2d5a2d'}`,
                borderRadius:'0 0 10px 10px',
                background:'rgba(10,22,40,0.95)',
                overflow:'hidden',
              }}>
                {activePanel==='weights'    && <WeightsPanel     weights={weights}         onWeightsChange={setWeights}/>}
                {activePanel==='depth'      && <DepthPanel       depth={depth}             onDepthChange={setDepth}/>}
                {activePanel==='designation'&& <DesignationPanel designation={designation} onDesignationChange={setDesignation}/>}
                {activePanel==='roster-pr'  && <PowerRankings    getTeamData={getTeamData} weights={weights} depth={depth} designation={designation}/>}
                {activePanel==='league-pr'  && <LeaguePowerRankings standingsData={standingsData}/>}
                {activePanel==='trade'      && <TradeAnalyzer    getTeamData={getTeamData} weights={weights} depth={depth} designation={designation}/>}
              </div>
            )}
          </div>
        );
      })()}

      <div className="game-panel">
        <div className="controls">
          <TeamSelector selectedTeams={teams} onTeamsChange={setTeams}/>
          <DataHelpers contractData={contractData} onFetchContracts={fetchContracts} fetchingContracts={fetchingContracts} rosterMeta={rosterMeta}/>
          <div style={{display:'flex',flexDirection:'column',gap:'12px',minWidth:'220px'}}>
            <button onClick={()=>{haptic('medium');compare();}} disabled={loading} className="btn-primary haptic-btn" style={{fontSize:'1.2rem',padding:'16px'}}>
              {loading?'⏳ Analyzing...':'▶️ COMPARE TEAMS'}
            </button>
            <button type="button" className="btn-secondary" onClick={()=>{setTeams(['','']);setData(null);}}>↺ Reset All</button>
          </div>
        </div>
      </div>

      {loading&&(
        <div className="game-panel" style={{textAlign:'center',padding:'50px'}}>
          <div style={{marginBottom:'20px',display:'flex',justifyContent:'center'}}>
            <FootballIcon size={56} style={{animation:'spin 1.2s linear infinite',filter:'drop-shadow(0 0 12px rgba(255,150,50,0.7))'}}/>
          </div>
          <style>{`@keyframes spin{from{transform:rotate(-20deg)}50%{transform:rotate(20deg)}to{transform:rotate(-20deg)}}`}</style>
          <div style={{fontSize:'1.8rem',fontFamily:'Orbitron',color:'#ffd700',marginBottom:'10px'}}>Analyzing Rosters...</div>
          <div style={{fontSize:'1.1rem',color:'#a0d2a0'}}>Calculating weighted scores with depth configuration</div>
        </div>
      )}

      {data&&!loading&&(
        <div className="results-container">
          <ComparisonTable teams={teams.filter(t=>t)} data={data} contractData={contractData}/>
          <ChartsPanel teams={teams.filter(t=>t)} data={data}/>
          {data.overall.winner&&(
            <div className="winner-banner full-width">
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'20px',flexWrap:'wrap'}}>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(-15deg)',flexShrink:0}}/>
                <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
                  <div style={{filter:'drop-shadow(0 0 12px rgba(255,215,0,0.6))'}}>
                    <TeamLogo teamName={data.overall.winner} size="large"/>
                  </div>
                  <span>🏆 {data.overall.winner} Wins! 🏆</span>
                </div>
                <FootballIcon size={40} style={{filter:'drop-shadow(0 0 8px rgba(255,200,50,0.8))',transform:'rotate(15deg)',flexShrink:0}}/>
              </div>
              <div style={{fontSize:'1rem',fontWeight:'normal',marginTop:'12px',opacity:0.9,fontFamily:'Roboto Condensed'}}>
                Based on your configured weights & depth • Overall Score: {data.teams[data.overall.winner]?.overallScore?.toFixed(1)}
              </div>
            </div>
          )}
          <div className="card full-width">
            <h3 className="card-title">⚙️ Active Configuration</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
              <div>
                <h4 style={{color:'#4a9eff',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>ATTRIBUTE WEIGHTS (QB)</h4>
                <div className="attribute-grid">
                  {Object.entries(weights.QB).map(([attr,w])=>(
                    <div className="attr-card" key={attr}>
                      <div className="attr-name">{attr}</div>
                      <div className="attr-value">{w}x</div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h4 style={{color:'#ff6b6b',fontFamily:'Orbitron',marginBottom:'10px',fontSize:'1rem'}}>POSITION DEPTH</h4>
                <div className="attribute-grid">
                  {Object.entries(depth).map(([pos,d])=>(
                    <div className="attr-card" key={pos}>
                      <div className="attr-name">{pos}</div>
                      <div className="attr-value">{d}</div>
                      <div style={{fontSize:'0.7rem',color:'#80a080',marginTop:'2px'}}>players</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{marginTop:'15px',fontSize:'0.85rem',color:'#80a080',fontStyle:'italic'}}>
              {rosterMeta && rosterMeta.source === 'live'
                ? `Using live PNFL roster data — Season ${rosterMeta.season}, Week ${rosterMeta.week}`
                : `Using built-in PNFL 2048 Season 1 Week 1 roster data — click Fetch Rosters to load a newer snapshot`}
              {' · '}<span style={{color:'#4a9eff'}}>Designation: {DESIGNATION_OPTIONS.find(o=>o.value===data.designation)?.label || 'Active + Open'}</span>
            </div>
          </div>
        </div>
      )}

      <div className="footer-note">
        <strong style={{color:'#608060'}}>PNFL Team Comparison Tool v{APP_VERSION}</strong> • Live data from pnfl.biz •
        <a href="https://pnfl.biz/pnflstats/PNFL_roster.htm#A0" target="_blank" rel="noopener noreferrer" style={{marginLeft:'8px'}}>Source Rosters →</a>
        <span style={{marginLeft:'8px',opacity:0.5}}>| Created by S.Hamilton</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
// Hide the pre-render loader once React mounts
document.getElementById('preloader')?.remove();

</script>
